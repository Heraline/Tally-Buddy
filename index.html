<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<!-- PWA Meta Tags -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Family Wallet">
<meta name="theme-color" content="#6C63FF">
<link rel="manifest" href="/Family-Wallet/manifest.json">
<!-- Apple touch icons (fallback for iOS since manifest icons aren't used on iOS) -->
<link rel="apple-touch-icon" href="/Family-Wallet/icon-192.png">
<title>Family Wallet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Nunito:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Figtree:wght@300;400;500;600;700&display=swap');
  /* Font pair CSS variables — overridden per font style */
  :root{--font-ui:'Sora',sans-serif;--font-num:'DM Mono',monospace;--num-tracking:-0.03em;--num-weight:700;--label-transform:uppercase;--label-tracking:0.12em;--label-size:11px;--bg:#0A0A14;--bg2:#12121E;--bg3:#1A1A2E;--accent:#6C63FF;--accent2:#4ECDC4;--green:#69D2A0;--red:#FF6B6B;--yellow:#FFE66D;--text:#F0EEF6;--muted:#8A88AA;--dim:#5A587A;--border:rgba(255,255,255,0.07)}
  :root.light{--bg:#F4F4FA;--bg2:#FFFFFF;--bg3:#ECEAF6;--accent:#6C63FF;--accent2:#4ECDC4;--green:#2EB87A;--red:#E84545;--yellow:#D4A000;--text:#1A1830;--muted:#6B6890;--dim:#9896B8;--border:rgba(0,0,0,0.08)}

  /* ── Font Style: Tally (Plus Jakarta Sans — clean fintech) ── */
  :root.font-tally{--font-ui:'Plus Jakarta Sans',sans-serif;--font-num:'Plus Jakarta Sans',sans-serif;--num-tracking:-0.02em;--num-weight:600;--label-transform:none;--label-tracking:0.01em;--label-size:12px}
  /* ── Font Style: Rounded (Nunito — friendly, soft) ── */
  :root.font-rounded{--font-ui:'Nunito',sans-serif;--font-num:'Nunito',sans-serif;--num-tracking:-0.01em;--num-weight:700;--label-transform:none;--label-tracking:0.02em;--label-size:12px}
  /* ── Font Style: Modern (DM Sans — neutral, airy) ── */
  :root.font-modern{--font-ui:'DM Sans',sans-serif;--font-num:'Figtree',sans-serif;--num-tracking:-0.025em;--num-weight:600;--label-transform:uppercase;--label-tracking:0.08em;--label-size:11px}
  /* ── Font Style: Combifi (Inter — clean, neutral fintech) ── */
  :root.font-combifi{--font-ui:'Inter',sans-serif;--font-num:'Inter',sans-serif;--num-tracking:-0.02em;--num-weight:700;--label-transform:none;--label-tracking:0.01em;--label-size:12px}
  /* ── Font Style: Tally AI (Plus Jakarta Sans — rounded fintech) ── */
  :root.font-tallyai{--font-ui:'Plus Jakarta Sans',sans-serif;--font-num:'Plus Jakarta Sans',sans-serif;--num-tracking:-0.025em;--num-weight:700;--label-transform:none;--label-tracking:0.005em;--label-size:12px}

  /* ── UI Style: Paper White ── */
  :root.ui-paper-white{--bg:#F7F7F5;--bg2:#FFFFFF;--bg3:#F0EFED;--accent:#111111;--accent2:#555555;--green:#2D9B6F;--red:#E05252;--yellow:#B8860B;--text:#111111;--muted:#888888;--dim:#AAAAAA;--border:rgba(0,0,0,0.09);--card-radius:16px;--font-weight-balance:300;--balance-letter-spacing:-0.04em}
  :root.ui-paper-white .card{border:0.5px solid rgba(0,0,0,0.09);box-shadow:none;background:var(--bg3)}
  :root.ui-paper-white .surface{background:#fff;border:0.5px solid rgba(0,0,0,0.09)}
  :root.ui-paper-white .btn-primary{background:#111;box-shadow:none}
  :root.ui-paper-white .balance-amount{font-weight:300;letter-spacing:-0.04em}
  :root.ui-paper-white .tab-btn.active{background:#111;color:#fff}
  :root.ui-paper-white .fab{background:#111;box-shadow:none}
  :root.ui-paper-white .bottom-nav{background:#F7F7F5;border-top:0.5px solid rgba(0,0,0,0.09)}
  :root.ui-paper-white .nav-btn.active{color:#111}
  :root.ui-paper-white .glow1,:root.ui-paper-white .glow2{display:none}
  :root.ui-paper-white .tx-row{background:#fff;border:0.5px solid rgba(0,0,0,0.07)}
  :root.ui-paper-white .tx-icon{border-radius:10px}
  :root.ui-paper-white .chip.active{background:#111;color:#fff}
  :root.ui-paper-white .member-pill.active{background:#111;color:#fff}
  :root.ui-paper-white .tab-bar{background:rgba(0,0,0,0.05)}
  :root.ui-paper-white .modal-sheet{background:#fff}
  :root.ui-paper-white .modal-handle{background:rgba(0,0,0,0.15)}

  /* ── UI Style: Warm Cream ── */
  :root.ui-warm-cream{--bg:#FAF8F3;--bg2:#FFFFFF;--bg3:#F0EDE6;--accent:#2C2416;--accent2:#C8B87A;--green:#2D9B6F;--red:#C05A3A;--yellow:#B8860B;--text:#2C2416;--muted:#A89880;--dim:#C4B8A8;--border:rgba(44,36,22,0.1);--card-radius:18px}
  :root.ui-warm-cream .card{border:0.5px solid rgba(44,36,22,0.1);box-shadow:none;background:#F0EDE6}
  :root.ui-warm-cream .surface{background:#fff;border:0.5px solid rgba(44,36,22,0.09)}
  :root.ui-warm-cream .btn-primary{background:#2C2416;box-shadow:none}
  :root.ui-warm-cream .balance-amount{font-weight:300;letter-spacing:-0.04em}
  :root.ui-warm-cream .tab-btn.active{background:#2C2416;color:#FAF8F3}
  :root.ui-warm-cream .fab{background:#2C2416;box-shadow:none}
  :root.ui-warm-cream .bottom-nav{background:#FAF8F3;border-top:0.5px solid rgba(44,36,22,0.1)}
  :root.ui-warm-cream .nav-btn.active{color:#2C2416}
  :root.ui-warm-cream .glow1,:root.ui-warm-cream .glow2{display:none}
  :root.ui-warm-cream .tx-row{background:#fff;border:0.5px solid rgba(44,36,22,0.07)}
  :root.ui-warm-cream .tx-icon{border-radius:12px;background:#EDE8DF}
  :root.ui-warm-cream .chip.active{background:#2C2416;color:#FAF8F3}
  :root.ui-warm-cream .member-pill.active{background:#2C2416;color:#FAF8F3}
  :root.ui-warm-cream .tab-bar{background:rgba(44,36,22,0.06)}
  :root.ui-warm-cream .modal-sheet{background:#FAF8F3}
  :root.ui-warm-cream .modal-handle{background:rgba(44,36,22,0.15)}

  /* ── UI Style: Cool Slate ── */
  :root.ui-cool-slate{--bg:#F2F4F7;--bg2:#FFFFFF;--bg3:#EAECF0;--accent:#1A2035;--accent2:#4A7FA5;--green:#2D9B6F;--red:#E05252;--yellow:#B8860B;--text:#1A2035;--muted:#8890A4;--dim:#B0B8CC;--border:rgba(26,32,53,0.1);--card-radius:14px}
  :root.ui-cool-slate .card{border:0.5px solid rgba(26,32,53,0.1);box-shadow:none;background:#EAECF0}
  :root.ui-cool-slate .surface{background:#fff;border:0.5px solid rgba(26,32,53,0.09)}
  :root.ui-cool-slate .btn-primary{background:#1A2035;box-shadow:none}
  :root.ui-cool-slate .balance-amount{font-weight:500;letter-spacing:-0.03em}
  :root.ui-cool-slate .tab-btn.active{background:#1A2035;color:#fff}
  :root.ui-cool-slate .fab{background:#1A2035;box-shadow:none}
  :root.ui-cool-slate .bottom-nav{background:#F2F4F7;border-top:0.5px solid rgba(26,32,53,0.1)}
  :root.ui-cool-slate .nav-btn.active{color:#1A2035}
  :root.ui-cool-slate .glow1,:root.ui-cool-slate .glow2{display:none}
  :root.ui-cool-slate .tx-row{background:#fff;border:0.5px solid rgba(26,32,53,0.07)}
  :root.ui-cool-slate .tx-icon{border-radius:9px;background:#EAECF0}
  :root.ui-cool-slate .chip.active{background:#1A2035;color:#fff}
  :root.ui-cool-slate .member-pill.active{background:#1A2035;color:#fff}
  :root.ui-cool-slate .tab-bar{background:rgba(26,32,53,0.06)}
  :root.ui-cool-slate .modal-sheet{background:#F2F4F7}
  :root.ui-cool-slate .modal-handle{background:rgba(26,32,53,0.15)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;transition:background-color 0.25s,color 0.15s,border-color 0.2s}

  /* Single layout that works in both Safari browser and standalone PWA */
  html,body{height:100%;overflow:hidden;background:var(--bg)}
  /* iOS PWA fix: min-height 100% + safe-area-inset-top fills the gap at bottom */
  body{font-family:var(--font-ui);background:var(--bg);color:var(--text);display:flex;justify-content:center;align-items:stretch;
    min-height:calc(100% + env(safe-area-inset-top));
    padding-top:env(safe-area-inset-top)}
  #app{width:100%;max-width:430px;height:100%;position:relative;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
  /* Safari browser mode: allow html to scroll so address bar can hide */
  html.mode-browser{overflow-y:auto}
  html.mode-browser body{min-height:calc(100% + 60px)}
  .page{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(90px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
  .page::-webkit-scrollbar{display:none}
  html.mode-standalone #scrollTrigger{display:none}
  .glow1{position:fixed;top:-80px;right:-80px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(108,99,255,0.15),transparent 70%);pointer-events:none;z-index:0}
  .glow2{position:fixed;bottom:60px;left:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(78,205,196,0.10),transparent 70%);pointer-events:none;z-index:0}
  .label{font-size:var(--label-size);color:var(--dim);letter-spacing:var(--label-tracking);text-transform:var(--label-transform)}
  .card{background:var(--bg3);border:1px solid rgba(108,99,255,0.2);border-radius:22px;box-shadow:0 0 40px rgba(108,99,255,0.08),0 8px 32px rgba(0,0,0,0.12)}
  .surface{background:rgba(128,128,128,0.06);border:1px solid var(--border);border-radius:16px}
  button{cursor:pointer;font-family:var(--font-ui);border:none;transition:all 0.18s}
  button:active{transform:scale(0.95);opacity:0.85}
  .btn-primary{width:100%;padding:17px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:16px;font-weight:700;letter-spacing:0.02em;box-shadow:0 8px 24px rgba(108,99,255,0.35)}
  .btn-ghost{background:none;color:var(--accent);font-size:13px;font-weight:600;padding:0;display:flex;align-items:center;gap:6px}
  .tab-bar{display:flex;background:rgba(255,255,255,0.05);border-radius:14px;padding:4px;margin:18px 22px 0}
  .tab-btn{flex:1;padding:10px;border-radius:11px;font-size:13px;font-weight:600;color:var(--dim);background:transparent}
  .tab-btn.active{background:rgba(108,99,255,0.8);color:#fff}
  .member-scroll{display:flex;gap:8px;padding:18px 22px 0;overflow-x:auto}
  .member-scroll::-webkit-scrollbar{display:none}
  .member-pill{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;background:rgba(255,255,255,0.07);color:var(--muted)}
  .member-pill.active{color:#fff}
  .balance-card{margin:18px 22px 0;padding:26px}
  .balance-amount{font-family:var(--font-num);font-size:38px;font-weight:var(--num-weight);letter-spacing:var(--num-tracking)}
  .mini-cards{display:flex;gap:12px;margin-top:18px}
  .mini-card{flex:1;border-radius:14px;padding:13px 15px;border:1px solid}
  .mini-card .mc-label{font-size:10px;letter-spacing:0.1em;margin-bottom:4px}
  .mini-card .mc-val{font-family:var(--font-num);font-size:16px;font-weight:500}
  .mini-card.income{background:rgba(105,210,160,0.1);border-color:rgba(105,210,160,0.2)}
  .mini-card.income .mc-label,.mini-card.income .mc-val{color:var(--green)}
  .mini-card.expense{background:rgba(255,107,107,0.1);border-color:rgba(255,107,107,0.2)}
  .mini-card.expense .mc-label,.mini-card.expense .mc-val{color:var(--red)}
  .tx-group{padding:0 22px;margin-top:20px}
  .tx-date-label{font-size:var(--label-size);color:var(--dim);letter-spacing:var(--label-tracking);text-transform:var(--label-transform);margin-bottom:10px}
  .tx-list{display:flex;flex-direction:column;gap:8px}
  .tx-row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:15px;cursor:pointer}
  .tx-row:active{transform:scale(0.98)}
  .tx-icon{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .tx-info{flex:1;min-width:0}
  .tx-desc{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tx-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
  .tag{font-size:10px;border-radius:6px;padding:2px 7px;font-weight:600}
  .tx-amount{font-family:var(--font-num);font-size:15px;font-weight:600;flex-shrink:0}
  .analytics-section{padding:0 22px;margin-top:20px}
  .cat-bar-row{margin-bottom:14px}
  .cat-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px}
  .cat-bar-track{height:8px;border-radius:999px;background:rgba(255,255,255,0.07);overflow:hidden}
  .cat-bar-fill{height:100%;border-radius:999px;transition:width 0.5s ease}
  .debt-row{display:flex;align-items:center;gap:12px;padding:12px 15px;border-radius:14px;margin-bottom:8px}
  .add-page{padding:50px 22px calc(120px + env(safe-area-inset-bottom))}
  .form-section{margin-bottom:16px}
  .input-card{padding:16px 18px;border-radius:17px}
  .input-card input,.input-card select{background:none;border:none;outline:none;color:var(--text);font-family:var(--font-ui);width:100%}
  .big-input{font-family:var(--font-num);font-size:34px;font-weight:700;width:100%;display:block;min-height:50px;padding:4px 0;-webkit-appearance:none}
  .normal-input{font-size:16px;width:100%;display:block;padding:4px 0}
  .type-toggle{display:flex;background:rgba(255,255,255,0.05);border-radius:14px;padding:4px;margin-bottom:22px}
  .type-btn{flex:1;padding:12px;border-radius:11px;font-size:14px;font-weight:700;background:transparent;color:var(--dim)}
  .type-btn.active-expense{background:var(--red);color:#fff}
  .type-btn.active-income{background:var(--green);color:#fff}
  .chip-grid{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:8px 13px;border-radius:999px;font-size:12px;font-weight:600;background:rgba(255,255,255,0.06);color:var(--muted);border:none}
  .chip.active{color:#fff}
  .subcat-chip{padding:6px 11px;border-radius:999px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.04);color:var(--dim);border:1px solid var(--border)}
  .subcat-chip.active{color:#fff;border-color:transparent}
  .member-grid{display:flex;gap:8px;flex-wrap:wrap}
  .member-box{flex:1;min-width:60px;padding:10px 6px;border-radius:13px;text-align:center;font-size:12px;font-weight:600;background:rgba(255,255,255,0.06);color:var(--muted)}
  .member-box .m-avatar{font-size:20px;margin-bottom:3px}
  .member-box.active{color:#fff}
  .split-hint{font-size:12px;color:var(--accent);text-align:center;margin-top:10px}
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:10px 30px calc(10px + env(safe-area-inset-bottom));display:flex;justify-content:space-around;align-items:center;z-index:50}
  .bottom-nav::after{content:'';position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:60px;background:var(--bg);z-index:-1}
  .nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;color:var(--dim);font-size:11px;font-weight:600;padding:4px 12px}
  .nav-btn.active{color:var(--accent)}
  .nav-btn .nav-icon{font-size:22px}
  .fab{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(108,99,255,0.4);margin-top:-18px;color:#fff}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:flex-end;justify-content:center}
  .modal-sheet{width:100%;max-width:430px;background:var(--bg2);border-radius:24px 24px 0 0;padding:26px 22px calc(48px + env(safe-area-inset-bottom));border:1px solid var(--border);animation:slideUp 0.3s cubic-bezier(.22,.68,0,1.15) both;max-height:90svh;max-height:90dvh;overflow-y:auto}
  .modal-handle{width:40px;height:4px;border-radius:999px;background:rgba(255,255,255,0.2);margin:0 auto 22px}
  @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .fade-in{animation:fadeIn 0.3s ease both}
  .slide-up{animation:slideUp 0.35s cubic-bezier(.22,.68,0,1.2) both}
  .empty{text-align:center;color:var(--dim);padding:50px 20px;font-size:14px}
  .delete-btn{font-size:11px;background:rgba(255,107,107,0.15);color:var(--red);border-radius:8px;padding:4px 10px;font-weight:600}
  .edit-btn{font-size:11px;background:rgba(108,99,255,0.15);color:var(--accent);border-radius:8px;padding:4px 10px;font-weight:600}
  .settings-page{padding:50px 22px calc(100px + env(safe-area-inset-bottom))}
  .settings-section{margin-bottom:24px}
  .settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:14px;margin-bottom:8px}
  .settings-row .sr-left{display:flex;align-items:center;gap:12px;font-size:14px;font-weight:500}
  .clear-btn{width:100%;padding:14px;border-radius:14px;background:rgba(255,107,107,0.12);color:var(--red);font-size:14px;font-weight:600;border:1px solid rgba(255,107,107,0.2)}
  .export-btn{width:100%;padding:14px;border-radius:14px;background:rgba(108,99,255,0.12);color:var(--accent);font-size:14px;font-weight:600;border:1px solid rgba(108,99,255,0.2);margin-bottom:10px}
  .auth-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 28px;animation:fadeIn 0.4s ease both;overflow-y:auto}
  .auth-tabs{display:flex;width:100%;background:rgba(255,255,255,0.05);border-radius:14px;padding:4px;margin-bottom:22px}
  .auth-tab{flex:1;padding:11px;border-radius:11px;font-size:14px;font-weight:700;background:transparent;color:var(--dim)}
  .auth-tab.active{background:rgba(108,99,255,0.8);color:#fff}
  .auth-input{width:100%;padding:15px 16px;border-radius:14px;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);font-family:var(--font-ui);font-size:16px;outline:none;transition:border-color 0.2s}
  .auth-input:focus{border-color:var(--accent)}
  .auth-error{font-size:13px;color:var(--red);margin-bottom:12px;padding:10px 14px;border-radius:10px;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.2);width:100%;text-align:center}
  .user-badge{display:flex;align-items:center;gap:8px;background:rgba(108,99,255,0.12);border:1px solid rgba(108,99,255,0.25);border-radius:12px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--accent)}
  .ledger-screen{position:fixed;inset:0;background:var(--bg);z-index:190;display:flex;flex-direction:column;animation:fadeIn 0.3s ease both}
  .ledger-card{background:var(--bg3);border:1px solid rgba(108,99,255,0.15);border-radius:18px;padding:18px;margin-bottom:12px;cursor:pointer;transition:all 0.2s}
  .ledger-card:active{transform:scale(0.97)}
  .ledger-card.active-ledger{border-color:var(--accent);background:rgba(108,99,255,0.08)}
  .invite-code-box{background:rgba(108,99,255,0.1);border:1px solid rgba(108,99,255,0.3);border-radius:18px;padding:20px;text-align:center;margin-bottom:20px}
  .invite-code{font-family:var(--font-num);font-size:28px;font-weight:700;color:var(--accent);letter-spacing:0.15em;margin:10px 0}
  .copy-btn{padding:8px 18px;border-radius:10px;background:rgba(108,99,255,0.2);color:var(--accent);font-size:13px;font-weight:600;border:1px solid rgba(108,99,255,0.3)}
  .join-input-row{display:flex;gap:10px;align-items:center}
  .join-input-row input{flex:1;padding:13px 15px;border-radius:13px;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);font-family:var(--font-num);font-size:16px;outline:none;letter-spacing:0.1em}
  .join-input-row input:focus{border-color:var(--accent)}
  .join-btn{padding:13px 18px;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:14px;font-weight:700}

  .collab-badge.owner{background:rgba(108,99,255,0.2);color:var(--accent)}
  .collab-badge.member{background:rgba(78,205,196,0.2);color:var(--accent2)}
  .collab-badge.guest{background:rgba(255,230,109,0.2);color:var(--yellow)}
  .loading-screen{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  .spinner{width:36px;height:36px;border:3px solid rgba(108,99,255,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}

  .split-amount-input:focus{border-color:var(--accent)}
  .currency-selector{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-family:var(--font-ui);font-size:14px;outline:none;width:100%}

  .color-dot.selected{border-color:#fff;transform:scale(1.15)}

  .guest-badge{font-size:9px;background:rgba(255,230,109,0.2);color:var(--yellow);border-radius:4px;padding:1px 5px;font-weight:700;margin-top:2px;display:inline-block}

  .asset-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(108,99,255,0.12),transparent 70%);pointer-events:none}
  .asset-type-pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;letter-spacing:0.06em;text-transform:uppercase}

  .recur-card{display:flex;align-items:center;gap:13px;padding:14px 16px;border-radius:15px;margin-bottom:8px}
  .recur-freq-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:rgba(78,205,196,0.15);color:var(--accent2);letter-spacing:0.05em}

  .av-pick-btn{width:42px;height:42px;border-radius:12px;font-size:21px;background:rgba(255,255,255,0.06);border:2px solid transparent;transition:all 0.15s;cursor:pointer}
  .av-pick-btn.sel{border-color:var(--accent);background:rgba(108,99,255,0.18)}

  MYR:{symbol:'RM', name:'Malaysian Ringgit',  flag:'🇲🇾', rateToMYR:1},
  USD:{symbol:'$',  name:'US Dollar',           flag:'🇺🇸', rateToMYR:4.72},

  CNY:{symbol:'¥',  name:'Chinese Yuan',        flag:'🇨🇳', rateToMYR:0.653},
};
// Convert amount from any currency to ledger currency (via MYR as base)
function convertToLedger(amount, fromCurrency){
  if(!fromCurrency||fromCurrency===S.ledgerCurrency)return amount;
  const from=CURRENCIES[fromCurrency];
  const to=CURRENCIES[S.ledgerCurrency];
  if(!from||!to)return amount;
  const inMYR=amount*(from.rateToMYR||1);
  return inMYR/(to.rateToMYR||1);
}
function fmtConverted(amount, fromCurrency){
  const converted=convertToLedger(amount,fromCurrency);
  return fmt(converted,S.ledgerCurrency);
}

function renderCatIcon(icon,size=22,rounded=false){

    const r=rounded?'border-radius:10px;':'border-radius:6px;';

}

// ── NOTIFICATIONS / ACTIVITY FEED ──
function buildActivities(){
  const uid=S.user.uid;
  const activities=[];

  const getName=(mid,lid)=>{
    const lm=(S.allLedgerMembers[lid]||{})[mid]||(S.members||{})[mid];
    if(lm)return lm.displayName||mid;
    if(mid===uid)return S.profile?.displayName||'You';
    return mid;
  };
  const getAvatar=(mid,lid)=>{
    const lm=(S.allLedgerMembers[lid]||{})[mid]||(S.members||{})[mid];
    return lm?.avatar||'👤';
  };

  // Transactions — across active ledger + all loaded totalView ledgers
  const txSources={[S.activeLedgerId]:S.txs||{},...S.allLedgerTxs};
  Object.entries(txSources).forEach(([lid,txs])=>{
    const linfo=S.ledgers[lid]||{};
    Object.entries(txs||{}).forEach(([k,t])=>{
      if(!t.type)return;
      const addedBy=t.addedBy||t.member;
      const involvedInSplit=(t.splitWith||[]).includes(uid)||(t.splitAmounts&&t.splitAmounts[uid]!=null);
      const isPayer=t.member===uid;
      const isCoPayor=(t.coPayors||[]).includes(uid);
      const involvedMe=isPayer||involvedInSplit||isCoPayor;
      if(!involvedMe)return;

      if(addedBy!==uid){
        // Someone else added a tx involving me
        const who=getName(addedBy,lid);
        activities.push({
          id:'tx_'+lid+'_'+k, ts:t.ts||0, lid,
          lname:linfo.name||lid, licon:linfo.icon||'💼',
          avatar:getAvatar(addedBy,lid),
          title:`${who} added a transaction`,
          body:`${t.description||''} · ${fmt(t.amount)}`,
          sub: involvedInSplit?'You are included in the split':isPayer?'You are the payer':'Co-payer',
          icon:t.type==='income'?'💰':'💳', type:'tx_others', txKey:k
        });
      } else if(involvedInSplit&&(t.splitWith||[]).length>0){
        // I added a split tx — activity for my own record
        const splitNames=(t.splitWith||[]).slice(0,2).map(m=>getName(m,lid)).join(', ')
          +((t.splitWith||[]).length>2?` +${(t.splitWith||[]).length-2} more`:'');
        activities.push({
          id:'txown_'+lid+'_'+k, ts:t.ts||0, lid,
          lname:linfo.name||lid, licon:linfo.icon||'💼',
          avatar:S.profile?.avatar||'👤',
          title:'You added a split transaction',
          body:`${t.description||''} · ${fmt(t.amount)}`,
          sub:`Split with ${splitNames}`,
          icon:'÷', type:'tx_own', txKey:k
        });
      }
    });
  });

  // Settlements
  const settleSources={[S.activeLedgerId]:S.settlements||{},...S.allLedgerSettlements};
  Object.entries(settleSources).forEach(([lid,settles])=>{
    const linfo=S.ledgers[lid]||{};
    Object.entries(settles||{}).forEach(([sk,s])=>{
      if(s.from!==uid&&s.to!==uid)return;
      const recorder=s.by||s.from;
      const who=recorder===uid?'You':getName(recorder,lid);
      const fromName=getName(s.from,lid);
      const toName=getName(s.to,lid);

      activities.push({
        id:'settle_'+lid+'_'+sk, ts:s.ts||0, lid,
        lname:linfo.name||lid, licon:linfo.icon||'💼',
        avatar:getAvatar(recorder,lid),
        title:recorder===uid?'You recorded a settlement':`${who} recorded a settlement`,
        body:`${fromName} → ${toName}`,
        sub:fmt(s.amount)+(s.note?` · ${s.note}`:''),
        icon:'💸', type:'settle', settleKey:sk,
        reviewed:s.reviewed
      });
    });
  });

  // Deduplicate + sort newest first
  const seen=new Set();
  return activities
    .filter(a=>{if(seen.has(a.id))return false;seen.add(a.id);return true;})
    .sort((a,b)=>b.ts-a.ts)
    .slice(0,60);
}

// ── DEBT ENGINE ──
// Formula: debt[person] = incurred_share - cash_paid
// Positive → they owe others; negative → others owe them.
// We accumulate as directional "X owes Y" pairs, then net out.
function _computeDebts(txList, settlements, rate){
  rate=rate||1;
  const d={};
  txList.forEach(t=>{
    if(t.type!=='expense')return;
    const total=(t.amount||0)*rate;
    if(total<=0)return;

    // Who paid cash and how much
    // payerAmounts is the authoritative source (new model).
    // Fall back to coPayorAmounts for backward-compat with old records.
    let paid={};
    if(t.payerAmounts&&Object.keys(t.payerAmounts).length>0){
      paid={...t.payerAmounts};
    }else if(t.coPayors?.length&&t.coPayorAmounts){
      // Legacy: reconstruct payer map from coPayorAmounts
      const coSum=t.coPayors.reduce((s,id)=>s+(parseFloat(t.coPayorAmounts[id])||0),0);
      paid[t.member]=Math.max(0,total-coSum);
      t.coPayors.forEach(id=>paid[id]=(parseFloat(t.coPayorAmounts[id])||0)*rate);
    }else{
      paid[t.member]=total; // sole payer
    }

    // Who incurred the expense and their share
    let incurred={};
    if(t.splitAmounts&&Object.keys(t.splitAmounts).length>0){
      Object.entries(t.splitAmounts).forEach(([uid,amt])=>incurred[uid]=(parseFloat(amt)||0)*rate);
    }else if(t.splitWith?.length){
      const all=[t.member,...t.splitWith];
      const sh=total/all.length;
      all.forEach(uid=>incurred[uid]=sh);
    }else{
      incurred[t.member]=total; // sole incurrer
    }

    // Debt = incurred - paid for each person involved
    const allPeople=new Set([...Object.keys(paid),...Object.keys(incurred)]);
    allPeople.forEach(uid=>{
      const owes=(incurred[uid]||0)-(paid[uid]||0);
      // owes > 0 means uid needs to pay someone back
      // We distribute who they owe proportionally to payers who overpaid
      if(owes>0.005){
        // Find payers who paid more than their incurred share (they are owed)
        const overpayers=Object.entries(paid)
          .map(([pid,pamt])=>({pid,surplus:(pamt||0)-(incurred[pid]||0)}))
          .filter(x=>x.surplus>0.005);
        const totalSurplus=overpayers.reduce((s,x)=>s+x.surplus,0);
        if(totalSurplus>0.005){
          overpayers.forEach(({pid,surplus})=>{
            const share=owes*(surplus/totalSurplus);
            if(share>0.005){
              const k=uid+'->'+pid;
              d[k]=(d[k]||0)+share;
            }
          });
        }
      }
    });
  });

  // Subtract settlements
  Object.values(settlements||{}).forEach(s=>{
    const k=s.from+'->'+s.to;
    d[k]=(d[k]||0)-s.amount*rate;
  });

  // Net out opposing debts
  const netted={};
  Object.entries(d).forEach(([k,v])=>{
    const[f,t]=k.split('->');
    const rev=t+'->'+f;
    if(netted[rev]!==undefined){
      if(v>netted[rev]){netted[k]=v-netted[rev];delete netted[rev];}
      else{netted[rev]=netted[rev]-v;if(netted[rev]<=0.005)delete netted[rev];}
    }else{netted[k]=v;}
  });
  return Object.entries(netted).filter(([,v])=>v>0.005).map(([k,v])=>{
    const[f,t]=k.split('->');return{from:f,to:t,amount:v};
  });
}

function debts(){
  return _computeDebts(txArr(),S.settlements||{},1);
}

// Compute debts across all ledgers for total view
function totalDebts(){
  const result=[]; // [{lid, lname, licon, from, to, amount}]
  Object.entries(S.ledgers).forEach(([lid,linfo])=>{
    if(S.excludedFromTotal.has(lid))return;
    const txs=Object.values(S.allLedgerTxs[lid]||{});
    const settlements=S.allLedgerSettlements[lid]||{};
    const cur=S.allLedgerCurrencies[lid]||'MYR';
    const rate=(CURRENCIES[cur]?.rateToMYR||1)/(CURRENCIES['MYR']?.rateToMYR||1);
    _computeDebts(txs,settlements,rate).forEach(({from,to,amount})=>{
      result.push({lid,lname:linfo.name||lid,licon:linfo.icon||'💼',from,to,amount});
    });
  });
  return result;
}

function allTimeTotals(){
  const all=txArr();
  const inc=all.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=all.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  return{inc,exp,bal:inc-exp};
}
function monthlyTotals(ym){
  const now=new Date();
  const month=ym||(now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'));
  const m=txArr().filter(t=>t.date&&t.date.startsWith(month));

  const exp=m.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

async function mkLedger(name,icon,currency='MYR'){

async function switchLedger(lid){
  S.listeners.forEach(({r,fn})=>{try{off(r,'value',fn);}catch(e){}});
  S.listeners=[];S.activeLedgerId=lid;S.filterMember='all';S.view='home';
  localStorage.setItem('fw_lid_'+S.user.uid,lid);
  const listen=(path,cb,tag)=>{const r=ref(db,path);const fn=s=>cb(s);onValue(r,fn);S.listeners.push({r,fn,tag});};
  listen('ledgerTransactions/'+lid,s=>{S.txs=s.exists()?s.val():{};safeRender();});
  listen('ledgerMembers/'+lid,s=>{S.members=s.exists()?s.val():{};safeRender();});
  listen('ledgerCategories/'+lid,s=>{S.cats=s.exists()?s.val():{};safeRender();});
  listen('ledgers/'+lid+'/budgets/'+S.budgetMonth,s=>{S.budgets=s.exists()?s.val():{};safeRender();},'budget');
  listen('users/'+S.user.uid+'/budgets/'+S.budgetMonth,s=>{S.allBudgets=s.exists()?s.val():{};safeRender();},'allbudget');
  listen('ledgers/'+lid+'/currency',s=>{S.ledgerCurrency=s.exists()?s.val():'MYR';safeRender();});
  listen('ledgers/'+lid+'/assets',s=>{S.assets=s.exists()?s.val():{};safeRender();});
  listen('ledgers/'+lid+'/recurring',s=>{S.recurring=s.exists()?s.val():{};safeRender();});
  listen('ledgers/'+lid+'/settlements',s=>{S.settlements=s.exists()?s.val():{};safeRender();});

  listen('ledgers/'+lid+'/paymentMethods',s=>{
    if(s.exists()){
      S.paymentMethods=Object.values(s.val()||{});
    } else {
      // First time — migrate from localStorage if anything exists
      const legacy=JSON.parse(localStorage.getItem('fw_payment_methods')||'[]');
      S.paymentMethods=legacy;
      if(legacy.length){
        // Migrate to Firebase silently
        const up={};
        legacy.forEach((m,i)=>{const k=push(ref(db,'ledgers/'+lid+'/paymentMethods')).key;up[k]=m;});
        update(ref(db,'ledgers/'+lid+'/paymentMethods'),up).then(()=>localStorage.removeItem('fw_payment_methods')).catch(()=>{});
      }
    }
    safeRender();
  });
  const ms=await get(ref(db,`ledgerMembers/${lid}/${S.user.uid}`));
  if(!ms.exists())await set(ref(db,`ledgerMembers/${lid}/${S.user.uid}`),{displayName:S.profile.displayName,avatar:S.profile.avatar,color:S.profile.color,role:'member',joinedAt:Date.now()});
  setTimeout(()=>processRecurring(),1500);
}

// ── FUZZY CATEGORY MATCHING ──
function fuzzyMatchCat(raw,cats){
  if(!raw)return Object.keys(cats).filter(k=>k!=='income')[0]||'other';
  var r=raw.toLowerCase().trim();
  var keys=Object.keys(cats).filter(k=>k!=='income');
  if(cats[r]&&r!=='income')return r;
  for(var i=0;i<keys.length;i++){var k=keys[i];var label=(cats[k].label||'').toLowerCase();if(r.includes(k)||k.includes(r)||r.includes(label)||label.includes(r))return k;}
  var fallback={food:['food','dining','restaurant','meal','grocery','groceries','cafe','coffee','drink','beverage','breakfast','lunch','dinner'],transport:['transport','transportation','travel','grab','taxi','fuel','petrol','parking','toll','ride','bus','train','flight'],shopping:['shopping','retail','clothes','clothing','electronics','household','beauty','fashion'],health:['health','medical','pharmacy','clinic','hospital','gym','fitness','dental','optical'],entertainment:['entertainment','movie','movies','game','games','sport','streaming','event','leisure'],utilities:['utilities','utility','electric','electricity','water','internet','phone','telco','subscription','bill','broadband'],education:['education','school','tuition','book','course','training','class','fees'],other:['other','misc','miscellaneous','general']};
  for(var cat in fallback){var words=fallback[cat];for(var j=0;j<words.length;j++){if(r.includes(words[j])){for(var m=0;m<keys.length;m++){if(keys[m]===cat||keys[m].includes(cat)||cat.includes(keys[m]))return keys[m];}break;}}}
  return keys[0]||'other';
}

function fuzzyMatchSubcat(raw,catKey,cats){
  if(!raw||!catKey)return'';
  var cat=cats[catKey];
  if(!cat||!cat.subcats)return'';
  var r=raw.toLowerCase().trim();
  var subcatKeys=Object.keys(cat.subcats);
  if(cat.subcats[r])return r;
  for(var i=0;i<subcatKeys.length;i++){var sk=subcatKeys[i];var sv=cat.subcats[sk];var slabel=(typeof sv==='object'?(sv.label||sk):sv).toLowerCase();if(r.includes(sk)||sk.includes(r)||r.includes(slabel)||slabel.includes(r))return sk;}
  return'';
}

window.doCreateLedger=async()=>{
  const name=document.getElementById('nlName')?.value.trim(),msg=document.getElementById('clMsg'),cur=document.getElementById('nlCur')?.value||'MYR';
  if(!name){if(msg){msg.style.color='var(--red)';msg.textContent='Enter a name.';}return;}
  try{const id=await mkLedger(name,LEDGER_ICONS[selIcon],cur);S.ledgers[id]={name,icon:LEDGER_ICONS[selIcon],role:'owner'};
    if(msg){msg.style.color='var(--green)';msg.textContent='✓ Ledger created!';}
    await switchLedger(id);setTimeout(()=>{closeLedgerPicker();showApp();toast('✓ '+name+' created');},700);
  }catch(e){if(msg){msg.style.color='var(--red)';msg.textContent='Error: '+e.message;}}
};
async function joinByCode(code,msgEl){
  if(!code||code.length!==6){if(msgEl){msgEl.style.color='var(--red)';msgEl.textContent='Enter a valid 6-character code.';}return;}
  try{
    const snap=await get(ref(db,'ledgers'));if(!snap.exists()){if(msgEl){msgEl.style.color='var(--red)';msgEl.textContent='No ledgers found.';}return;}
    let tid=null,tl=null;snap.forEach(c=>{if(c.val().inviteCode===code){tid=c.key;tl=c.val();}});
    if(!tid){if(msgEl){msgEl.style.color='var(--red)';msgEl.textContent='Invalid invite code.';}return;}
    if(S.ledgers[tid]){if(msgEl){msgEl.style.color='var(--accent2)';msgEl.textContent='Already a member!';}return;}
    const up={};
    up[`ledgers/${tid}/members/${S.user.uid}`]=true;
    up[`userLedgers/${S.user.uid}/${tid}`]={name:tl.name,icon:tl.icon||'💼',role:'member'};
    up[`ledgerMembers/${tid}/${S.user.uid}`]={displayName:S.profile.displayName,avatar:S.profile.avatar,color:S.profile.color,role:'member',joinedAt:Date.now()};
    await update(ref(db),up);S.ledgers[tid]={name:tl.name,icon:tl.icon||'💼',role:'member'};
    if(msgEl){msgEl.style.color='var(--green)';msgEl.textContent='✓ Joined "'+tl.name+'"!';}
    await switchLedger(tid);return tl.name;
  }catch(e){if(msgEl){msgEl.style.color='var(--red)';msgEl.textContent='Error: '+e.message;}}
}
window.doJoin=async()=>{const code=document.getElementById('jCode')?.value.trim().toUpperCase(),msg=document.getElementById('jMsg');const name=await joinByCode(code,msg);if(name)setTimeout(()=>{closeLedgerPicker();showApp();toast('✓ Joined '+name);},700);};
window.pickTotalView=()=>{closeLedgerPicker();enterTotalView();};
window.toggleLedgerInTotal=id=>{
  if(S.excludedFromTotal.has(id)){
    S.excludedFromTotal.delete(id);
  } else {
    S.excludedFromTotal.add(id);
  }
  localStorage.setItem('fw_excl_total',JSON.stringify([...S.excludedFromTotal]));
  // If currently in total view, re-subscribe to reflect the change
  if(S.totalView){
    S.totalListeners.forEach(({r,fn})=>{try{off(r,'value',fn);}catch(e){}});
    S.totalListeners=[];S.allLedgerTxs={};S.allLedgerCurrencies={};
    Object.keys(S.ledgers).forEach(lid=>{
      if(S.excludedFromTotal.has(lid))return;
      if(!S.allLedgerTxs[lid])S.allLedgerTxs[lid]={};
      const rTx=ref(db,'ledgerTransactions/'+lid);
      const fnTx=s=>{S.allLedgerTxs[lid]=s.exists()?s.val():{};safeRender();};
      onValue(rTx,fnTx);S.totalListeners.push({r:rTx,fn:fnTx});
      const rCur=ref(db,'ledgers/'+lid+'/currency');
      const fnCur=s=>{S.allLedgerCurrencies[lid]=s.exists()?s.val():'MYR';safeRender();};
      onValue(rCur,fnCur);S.totalListeners.push({r:rCur,fn:fnCur});
      const rSet=ref(db,'ledgers/'+lid+'/settlements');
      const fnSet=s=>{S.allLedgerSettlements[lid]=s.exists()?s.val():{};safeRender();};
      onValue(rSet,fnSet);S.totalListeners.push({r:rSet,fn:fnSet});
      const rMem=ref(db,'ledgerMembers/'+lid);
      const fnMem=s=>{S.allLedgerMembers[lid]=s.exists()?s.val():{};safeRender();};
      onValue(rMem,fnMem);S.totalListeners.push({r:rMem,fn:fnMem});
    });
  }
  // Re-render the picker in place
  document.getElementById('ledgerContainer').innerHTML=renderLedgerPicker();
};
window.pickLedger=async id=>{if(S.totalView)exitTotalView();showLoad();await switchLedger(id);hideLoad();closeLedgerPicker();showApp();};

// ── HOME ──
function renderHome(){
  // Total view: aggregate across all ledgers (all amounts normalised to MYR)
  if(S.totalView){
    const uid=S.user.uid;
    const allTxs=totalTxArr();
    const nowYm=new Date().toISOString().slice(0,7);
    const todayStr=td();
    const cats=getCats();
    const [y,mo]=nowYm.split('-').map(Number);
    const prevYm=`${mo===1?y-1:y}-${String(mo===1?12:mo-1).padStart(2,'0')}`;

    // Helper: true split = 2+ people with non-zero share
    const isTotalSplit=t=>{
      const keys=Object.keys(t.splitAmounts||{});
      if(keys.length>0) return keys.filter(k=>(parseFloat(t.splitAmounts[k])||0)>0).length>=2;
      return (t.splitWith?.length||0)>0;
    };

    // Helper: get user's personal share of a tx (in that ledger's currency)
    const userShare=(t)=>{
      if(t.splitAmounts){
        return parseFloat(t.splitAmounts[uid])||0;
      }
      if(t.splitWith?.length>0){
        const all=[t.member,...t.splitWith];
        return all.includes(uid)?t.amount/all.length:0;
      }
      return t.member===uid?t.amount:0;
    };

    // For each tx, compute user's share converted to MYR
    const userShareMYR=t=>{
      const share=userShare(t);
      if(share===0)return 0;
      const cur=S.allLedgerCurrencies[t._lid]||'MYR';
      const rate=(CURRENCIES[cur]?.rateToMYR||1)/(CURRENCIES['MYR']?.rateToMYR||1);
      return share*rate;
    };

    // Filter to txs that involve the user (paid or in split)
    const userTxs=allTxs.filter(t=>
      t.member===uid||
      (t.splitWith||[]).includes(uid)||
      (t.splitAmounts&&t.splitAmounts[uid]!=null)
    );

    const nowUserTxs=userTxs.filter(t=>t.type==='expense'&&t.date?.startsWith(nowYm));
    const prevUserTxs=userTxs.filter(t=>t.type==='expense'&&t.date?.startsWith(prevYm));

    // User's personal expense this month (their actual share only)
    const myExp=nowUserTxs.reduce((s,t)=>s+userShareMYR(t),0);
    const myInc=userTxs.filter(t=>t.type==='income'&&t.date?.startsWith(nowYm)&&t.member===uid).reduce((s,t)=>s+t._amtMYR,0);
    const myExpPrev=prevUserTxs.reduce((s,t)=>s+userShareMYR(t),0);
    const vsLastMonth=myExpPrev>0?((myExp-myExpPrev)/myExpPrev*100):null;

    // Split vs solo breakdown for the month
    const mySplitExp=nowUserTxs.filter(t=>isTotalSplit(t)).reduce((s,t)=>s+userShareMYR(t),0);
    const mySoloExp=myExp-mySplitExp;

    // Spent today (user's share)
    const spentToday=userTxs.filter(t=>t.type==='expense'&&t.date===todayStr).reduce((s,t)=>s+userShareMYR(t),0);

    // All-time balance (user's share)
    const myAllInc=userTxs.filter(t=>t.type==='income'&&t.member===uid).reduce((s,t)=>s+t._amtMYR,0);
    const myAllExp=allTxs.filter(t=>t.type==='expense'&&(t.member===uid||(t.splitWith||[]).includes(uid)||(t.splitAmounts&&t.splitAmounts[uid]!=null))).reduce((s,t)=>s+userShareMYR(t),0);
    const myBalance=myAllInc-myAllExp;

    // Per-ledger breakdown (user's share per ledger)
    const ledgerBreakdown=Object.entries(S.ledgers).map(([lid,l])=>{
      const cur=S.allLedgerCurrencies[lid]||'MYR';
      const rate=(CURRENCIES[cur]?.rateToMYR||1)/(CURRENCIES['MYR']?.rateToMYR||1);
      const lTxs=Object.values(S.allLedgerTxs[lid]||{});
      let lMyExp=0,lMySplit=0,lMySolo=0;
      lTxs.filter(t=>t.type==='expense'&&t.date?.startsWith(nowYm)).forEach(t=>{
        const involved=t.member===uid||(t.splitWith||[]).includes(uid)||(t.splitAmounts&&t.splitAmounts[uid]!=null);
        if(!involved)return;
        let share=0;
        if(t.splitAmounts){share=parseFloat(t.splitAmounts[uid])||0;}
        else if(t.splitWith?.length>0){const all=[t.member,...t.splitWith];share=all.includes(uid)?t.amount/all.length:0;}
        else{share=t.member===uid?t.amount:0;}
        const shareMYR=share*rate;
        lMyExp+=shareMYR;
        const keys=Object.keys(t.splitAmounts||{});
        const trueSplit=keys.length>0?keys.filter(k=>(parseFloat(t.splitAmounts[k])||0)>0).length>=2:(t.splitWith?.length||0)>0;
        if(trueSplit)lMySplit+=shareMYR; else lMySolo+=shareMYR;
      });
      return{lid,...l,exp:lMyExp,split:lMySplit,solo:lMySolo};
    }).filter(l=>l.exp>0).sort((a,b)=>b.exp-a.exp);

    // Latest 5 user-involved txs
    const latest=userTxs.slice(0,5);
    const hasMore=userTxs.length>5;
    const txRows=latest.map(t=>{
      const cat=cats[t.category]||DEFAULT_CATS.other;
      const myAmt=userShareMYR(t);
      const isShared=isTotalSplit(t);
      return`<div class="tx-row surface">
        <div class="tx-icon" style="background:${cat.color}22">${renderCatIcon(cat.icon,22,true)}</div>
        <div class="tx-info">
          <p class="tx-desc">${t.description}</p>
          <div class="tx-meta">
            <span class="tag" style="background:rgba(108,99,255,0.15);color:var(--accent)">${t._licon} ${t._lname}</span>
            ${isShared?`<span class="tag" style="background:rgba(108,99,255,0.15);color:var(--accent)">÷ split</span>`:`<span class="tag" style="background:rgba(255,255,255,0.06);color:var(--muted)">solo</span>`}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <p class="tx-amount" style="color:${t.type==='income'?'var(--green)':'var(--text)'}">${t.type==='income'?'+':'-'}RM ${myAmt.toFixed(2)}</p>
          ${myAmt!==t._amtMYR?`<p style="font-size:10px;color:var(--dim);font-family:var(--font-num)">of RM ${t._amtMYR.toFixed(2)}</p>`:''}
        </div>
      </div>`;
    }).join('');

    const ledgerRows=ledgerBreakdown.map(l=>{
      const pct=myExp>0?Math.round(l.exp/myExp*100):0;
      return`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:14px;background:rgba(255,255,255,0.04);margin-bottom:8px">
        <div style="width:36px;height:36px;border-radius:50%;background:rgba(108,99,255,0.15);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${l.icon||'💼'}</div>
        <div style="flex:1;min-width:0">
          <p style="font-size:14px;font-weight:600">${l.name}</p>
          <p style="font-size:10px;color:var(--accent);margin-top:1px">${l.split>0?`÷ RM ${l.split.toFixed(2)} split`:''}${l.split>0&&l.solo>0?' + ':''}${l.solo>0?`RM ${l.solo.toFixed(2)} solo`:''}</p>
        </div>
        <p style="font-family:var(--font-num);font-size:14px;font-weight:600">RM ${l.exp.toFixed(2)}</p>
        <span style="font-size:12px;color:var(--muted);min-width:36px;text-align:right">(${pct}%)</span>
      </div>`;
    }).join('');

    // All Ledgers budget (personal, stored in users/{uid}/budgets/{ym})
    const allBudgetData=S.allBudgets||{};
    const allCatBudgetTotal=Object.entries(allBudgetData).filter(([k])=>k!=='_total'&&!k.includes('__')).reduce((s,[,v])=>s+(parseFloat(v)||0),0);
    const allManualBudgetTotal=parseFloat(allBudgetData._total)||0;
    const allTotalBudget=allManualBudgetTotal>0?allManualBudgetTotal:allCatBudgetTotal;
    const allBudgetUsedPct=allTotalBudget>0?Math.min(100,(myExp/allTotalBudget)*100):0;
    const allBudgetBarColor=myExp>allTotalBudget?'var(--red)':allBudgetUsedPct>80?'var(--yellow)':'#6C63FF';
    const allRemaining=allTotalBudget-myExp;
    const todayDateTv=new Date();
    const daysInMonthTv=new Date(todayDateTv.getFullYear(),todayDateTv.getMonth()+1,0).getDate();
    const daysLeftTv=daysInMonthTv-todayDateTv.getDate()+1;
    const allDailySafe=allTotalBudget>0&&allRemaining>0?allRemaining/daysLeftTv:0;

    return`<div class="fade-in">
      <!-- HEADER -->
      <div style="padding:52px 20px 0;display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <p style="font-size:12px;color:var(--muted);margin-bottom:2px">${new Date().toLocaleDateString('en-MY',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</p>
          <p style="font-size:22px;font-weight:700;letter-spacing:-0.02em">Today</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div style="background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:20px;padding:4px;display:flex;align-items:center;gap:0">
            <button onclick="" style="background:rgba(255,255,255,0.10);border:none;border-radius:14px;width:32px;height:32px;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0">🌐</button>
            <button onclick="openLedgerPicker()" style="background:none;border:none;padding:3px 8px 3px 6px;display:flex;align-items:center;gap:4px;color:var(--text);font-family:var(--font-ui);font-size:13px;font-weight:600">
              <span>All Ledgers</span><span style="color:var(--dim);font-size:12px">⌄</span>
            </button>
          </div>
          <button onclick="goSearch()" style="background:rgba(255,255,255,0.07);border:none;border-radius:12px;padding:8px 10px;font-size:16px">🔍</button>
        <button onclick="goNotifications()" style="position:relative;background:rgba(255,255,255,0.07);border:none;border-radius:12px;padding:8px 10px;font-size:16px">${unreadCount()>0?`<span style="position:absolute;top:4px;right:4px;background:var(--red);border-radius:999px;min-width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;padding:0 2px">${unreadCount()>9?'9+':unreadCount()}</span>`:''}🔔</button>
        <button onclick="goSettings()" style="background:rgba(255,255,255,0.07);border:none;border-radius:12px;padding:8px 10px;font-size:16px">⚙️</button>
        </div>
      </div>

      <!-- SPENT TODAY + BALANCE -->
      <div style="padding:18px 20px 0;display:flex;align-items:flex-end;justify-content:space-between">
        <div>
          <p style="font-size:12px;color:var(--muted);margin-bottom:4px">My Spend Today</p>
          <p style="font-family:var(--font-num);font-size:36px;font-weight:700;letter-spacing:-0.03em;color:var(--text)">RM ${spentToday.toFixed(2)}</p>

          <span style="font-size:11px;color:var(--muted);font-weight:500">My Balance</span>
          <span style="font-family:var(--font-num);font-size:14px;font-weight:700;color:${myBalance>=0?'var(--accent)':'var(--red)'}"> RM ${Math.abs(myBalance).toFixed(2)}</span>
        </div>
      </div>

      <!-- MAIN SUMMARY CARD -->
      <div style="margin:14px 20px 0">
        <div class="card balance-card slide-up" style="padding:20px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
            <p style="font-size:15px;font-weight:700">${new Date().toLocaleDateString('en-MY',{month:'long'})} · My Finance</p>
            <div style="background:rgba(108,99,255,0.15);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--accent)">${Object.keys(S.ledgers).length} ledgers</div>
          </div>

          <!-- Expense / Income -->
          <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px">
            <div>
              <p style="font-size:11px;color:var(--muted);margin-bottom:3px">My Expense</p>
              <p style="font-family:var(--font-num);font-size:28px;font-weight:700">RM ${myExp.toFixed(2)}</p>
            </div>
            <div style="text-align:right">
              <p style="font-size:11px;color:var(--muted);margin-bottom:3px">Income</p>
              <p style="font-family:var(--font-num);font-size:20px;font-weight:700;color:var(--accent)">RM ${myInc.toFixed(2)}</p>
            </div>
