        <p style="font-family:var(--font-num);font-size:14px;font-weight:600;color:var(--accent)">${fmt(sharedTotal)}</p>
        <span style="font-size:12px;color:var(--muted);min-width:36px;text-align:right">(${totalMemberSpend>0?Math.round(sharedTotal/mth.exp*100):0}%)</span>
        <span style="color:var(--dim);font-size:16px;margin-left:2px">›</span>
      </div>`:''}
      ${memberSpend.map(m=>{
        const pct=mth.exp>0?Math.round(m.spent/mth.exp*100):0;
        // How much of their share came from true splits (2+ non-zero holders)?
        const splitShare=nowTxs.filter(t=>isTrueSplit(t)).reduce((s,t)=>{
          if(t.splitAmounts){
            // Use their exact recorded amount — 0 means pay-on-behalf payer, don't count
            const myAmt=parseFloat(t.splitAmounts[m.id])||0;
            return s+myAmt;
          }
          // Equal split (splitWith, no splitAmounts): divide evenly if they're involved
          if(t.member===m.id||(t.splitWith||[]).includes(m.id)){
            const all=[t.member,...(t.splitWith||[])];
            return s+t.amount/all.length;
          }
          return s;
        },0);
        const soloShare=m.spent-splitShare;
        return`<div onclick="goTxByMember('${m.id}')" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:14px;background:rgba(255,255,255,0.04);margin-bottom:8px;cursor:pointer;active:opacity:0.7">
          <div style="width:36px;height:36px;border-radius:50%;background:${m.color||'#6C63FF'}22;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${m.avatar}</div>
          <div style="flex:1;min-width:0">
            <p style="font-size:14px;font-weight:600">${m.displayName}${m.guest?'<span class="guest-badge">G</span>':''}</p>
            ${splitShare>0?`<p style="font-size:10px;color:var(--accent);margin-top:1px">÷ ${fmt(splitShare)} split${soloShare>0?` + ${fmt(soloShare)} solo`:''}</p>`:''}
          </div>
          <p style="font-family:var(--font-num);font-size:14px;font-weight:600">${fmt(m.spent)}</p>
          <span style="font-size:12px;color:var(--muted);min-width:36px;text-align:right">(${pct}%)</span>
          <span style="color:var(--dim);font-size:16px;margin-left:2px">›</span>
        </div>`;
      }).join('')}`:``}

      <!-- vs last month chip -->
      ${vsLastMonth!==null?`
      <div style="margin-top:4px;text-align:center">
        <span style="display:inline-block;background:rgba(255,255,255,0.06);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--muted)">
          Compared to last month:
          <strong style="color:${vsLastMonth<=0?'var(--green)':'var(--red)'}">${vsLastMonth>0?'+':''}${vsLastMonth.toFixed(1)}% ${vsLastMonth<=0?'decrease':'increase'}</strong>
        </span>
      </div>`:``}
    </div>

    <!-- SPLITS & BALANCES QUICK BUTTONS -->
    ${(()=>{
      const dbs=debts();
      const pendingCount=dbs.length;
      const allSArr=Object.values(S.settlements||{});
      const settledCount=allSArr.length;
      const unreviewedCount=allSArr.filter(s=>!s.reviewed).length;
      return`<div style="display:flex;gap:10px;margin:14px 20px 0">
        <button onclick="goSplits()" style="flex:1;display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid ${pendingCount>0?'rgba(255,107,107,0.3)':'var(--border)'};cursor:pointer;text-align:left">
          <div style="width:34px;height:34px;border-radius:10px;background:${pendingCount>0?'rgba(255,107,107,0.15)':'rgba(105,210,160,0.12)'};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${pendingCount>0?'⏳':'✅'}</div>
          <div style="flex:1;min-width:0">
            <p style="font-size:12px;font-weight:700;color:${pendingCount>0?'var(--red)':'var(--green)'}">${pendingCount>0?`${pendingCount} Pending`:'All Settled!'}</p>
            <p style="font-size:10px;color:var(--dim);margin-top:1px">${pendingCount>0?'Tap to settle':'No outstanding amounts'}</p>
          </div>
          <span style="color:var(--dim);font-size:16px">›</span>
        </button>
        <button onclick="goSplits(true)" style="flex:1;display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);cursor:pointer;text-align:left">
          <div style="position:relative;width:34px;height:34px;border-radius:10px;background:rgba(105,210,160,0.1);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">
            📋
            ${unreviewedCount>0?'<span style="position:absolute;top:-4px;right:-4px;background:var(--yellow);color:#000;font-size:9px;font-weight:700;border-radius:999px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px">'+unreviewedCount+'</span>':''}
          </div>
          <div style="flex:1;min-width:0">
            <p style="font-size:12px;font-weight:700;color:${unreviewedCount>0?'var(--yellow)':'var(--text)'}"> ${unreviewedCount>0?unreviewedCount+' To Review':'All Reviewed'}</p>
            <p style="font-size:10px;color:var(--dim);margin-top:1px">Settlement history</p>
          </div>
          <span style="color:var(--dim);font-size:16px">›</span>
        </button>
      </div>`;
    })()}

    <!-- TABS -->
    <div class="tab-bar">
      <button class="tab-btn ${S.tab==='transactions'?'active':''}" onclick="setTab('transactions')">Transactions</button>
      <button class="tab-btn ${S.tab==='analytics'?'active':''}" onclick="setTab('analytics')">Analytics</button>
    </div>
    ${tc}
  </div>`;
}




// ── STATISTICS VIEW ──
function renderStats(){
  const ym=S.statsMonth;
  const [yr,mo]=ym.split('-').map(Number);
  const nowYm=new Date().toISOString().slice(0,7);
  const isCurrentMonth=ym===nowYm;
  const monthLabel=new Date(yr,mo-1,1).toLocaleDateString('en-MY',{month:'short',year:'numeric'});
  const cats=getCats();

  // ── TOTAL VIEW: use normalised cross-ledger tx set ──
  let _txArr=txArr,_getCur=getCur,_fmt=fmt;
  if(S.totalView){
    const _uid=S.user.uid;
    const _rawAll=totalTxArr();
    const _userShareMYR=t=>{
      let share=0;
      if(t.splitAmounts){share=parseFloat(t.splitAmounts[_uid])||0;}
      else if(t.splitWith?.length>0){const a=[t.member,...t.splitWith];share=a.includes(_uid)?t.amount/a.length:0;}
      else{share=t.member===_uid?t.amount:0;}
      const cur=S.allLedgerCurrencies[t._lid]||'MYR';
      const rate=(CURRENCIES[cur]?.rateToMYR||1)/(CURRENCIES['MYR']?.rateToMYR||1);
      return share*rate;
    };
    const _norm=_rawAll
      .filter(t=>t.type==='income'?t.member===_uid:(t.member===_uid||(t.splitWith||[]).includes(_uid)||(t.splitAmounts&&t.splitAmounts[_uid]!=null)))
      .map(t=>({...t,amount:t.type==='expense'?_userShareMYR(t):t._amtMYR}))
      .filter(t=>t.amount>0);
    _txArr=()=>_norm;
    _getCur=()=>CURRENCIES['MYR'];
    _fmt=(n)=>'RM '+Number(n).toFixed(2);
  }

  const mems=S.totalView?{}:(S.members||{});
  const memList=S.totalView?[]:[
    {id:'all',displayName:'All',avatar:'👥',color:'#6C63FF'},
    {id:'shared',displayName:'Shared',avatar:'🔗',color:'#4ECDC4'},
    ...Object.entries(mems).map(([id,m])=>({id,...m}))
  ];
  const memFilter=S.totalView?'all':S.statsMember;
  const isFiltered=!S.totalView&&memFilter!=='all'&&memFilter!=='shared';
  const isShared=!S.totalView&&memFilter==='shared';
  const filteredMem=isFiltered?getMem(memFilter):null;

  // All txs for month
  const all=_txArr();
  const monthAll=all.filter(t=>t.date&&t.date.startsWith(ym));

  // For filtered member: include txs where they paid OR they're in splitWith/splitAmounts
  // For shared: only txs that involve 2+ people (have splitWith or splitAmounts with >1 person)
  const isSharedTx=t=>(t.splitWith?.length>0)||(t.splitAmounts&&Object.keys(t.splitAmounts).length>1);
  const monthTxs=isFiltered
    ?monthAll.filter(t=>t.member===memFilter||(t.splitWith||[]).includes(memFilter)||(t.splitAmounts&&t.splitAmounts[memFilter]!=null))
    :isShared
      ?monthAll.filter(isSharedTx)
      :monthAll;

  // Helper: get a member's actual share from a tx
  function getMemberShare(t,uid){
    if(t.type!=='expense')return 0;
    if(t.splitAmounts&&t.splitAmounts[uid]!=null)return t.splitAmounts[uid];
    if(t.splitWith?.length>0){
      const all=[t.member,...t.splitWith];
      if(all.includes(uid))return t.amount/all.length;
    }
    if(t.member===uid&&!t.splitWith?.length&&(!t.splitAmounts||Object.keys(t.splitAmounts).length<=1))return t.amount;
    return 0;
  }

  // Filtered income/expense: for a specific member, expense = their share
  let inc,exp;
  if(isFiltered){
    inc=monthTxs.filter(t=>t.type==='income'&&t.member===memFilter).reduce((s,t)=>s+t.amount,0);
    exp=monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+getMemberShare(t,memFilter),0);
  } else {
    inc=monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    exp=monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  }
  const net=inc-exp;

  // Prev month
  const prevYm=`${mo===1?yr-1:yr}-${String(mo===1?12:mo-1).padStart(2,'0')}`;
  const prevAll=all.filter(t=>t.date&&t.date.startsWith(prevYm));
  const prevTxs=isFiltered
    ?prevAll.filter(t=>t.member===memFilter||(t.splitWith||[]).includes(memFilter)||(t.splitAmounts&&t.splitAmounts[memFilter]!=null))
    :isShared
      ?prevAll.filter(isSharedTx)
      :prevAll;
  let prevInc,prevExp2;
  if(isFiltered){
    prevInc=prevTxs.filter(t=>t.type==='income'&&t.member===memFilter).reduce((s,t)=>s+t.amount,0);
    prevExp2=prevTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+getMemberShare(t,memFilter),0);
  } else {
    prevInc=prevTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    prevExp2=prevTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  }
  const prevNet=prevInc-prevExp2;
  const incChg=prevInc>0?((inc-prevInc)/prevInc*100):null;
  const expChg=prevExp2>0?((exp-prevExp2)/prevExp2*100):null;
  const netChg=prevNet!==0?((net-prevNet)/Math.abs(prevNet)*100):null;

  // Category breakdown
  const catData=Object.entries(cats).filter(([k])=>k!=='income').map(([key,cat])=>{
    let total;
    if(isFiltered){
      total=monthTxs.filter(t=>t.category===key&&t.type==='expense').reduce((s,t)=>s+getMemberShare(t,memFilter),0);
    } else {
      total=monthTxs.filter(t=>t.category===key&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
    }
    const subcats=cat.subcats?Object.entries(cat.subcats).map(([sk,sv])=>({
      key:sk,label:sv,
      total:isFiltered
        ?monthTxs.filter(t=>t.category===key&&t.subcat===sk&&t.type==='expense').reduce((s,t)=>s+getMemberShare(t,memFilter),0)
        :monthTxs.filter(t=>t.category===key&&t.subcat===sk&&t.type==='expense').reduce((s,t)=>s+t.amount,0)
    })).filter(s=>s.total>0):[];
    return{key,...cat,total,subcats};
  }).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  // Member split breakdown — shown in overview when "All" selected
  const memberShareData=Object.entries(mems).map(([id,m])=>{
    const share=monthAll.filter(t=>t.type==='expense').reduce((s,t)=>s+getMemberShare(t,id),0);
    const splitShare=monthAll.filter(t=>t.type==='expense'&&(t.splitWith?.length>0||Object.keys(t.splitAmounts||{}).length>1)).reduce((s,t)=>s+getMemberShare(t,id),0);
    const soloShare=share-splitShare;
    const earned=monthAll.filter(t=>t.type==='income'&&t.member===id).reduce((s,t)=>s+t.amount,0);
    return{id,...m,share,splitShare,soloShare,earned};
  }).filter(m=>m.share>0||m.earned>0).sort((a,b)=>b.share-a.share);
  const totalShare=memberShareData.reduce((s,m)=>s+m.share,0);
  const sharedExpTotal=monthAll.filter(t=>t.type==='expense'&&(t.splitWith?.length>0||Object.keys(t.splitAmounts||{}).length>1)).reduce((s,t)=>s+t.amount,0);

  // Filtered member's split transactions detail
  const memberSplitTxs=isFiltered?monthTxs.filter(t=>t.type==='expense'&&(t.splitWith?.length>0||Object.keys(t.splitAmounts||{}).length>1)):[];

  // Trend: last 6 months
  const trendMonths=[];
  for(let i=5;i>=0;i--){
    const d=new Date(yr,mo-1-i,1);
    const tym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    let tExp,tInc;
    if(isFiltered){
      const ttxs=all.filter(t=>t.date&&t.date.startsWith(tym)&&(t.member===memFilter||(t.splitWith||[]).includes(memFilter)||(t.splitAmounts&&t.splitAmounts[memFilter]!=null)));
      tExp=ttxs.filter(t=>t.type==='expense').reduce((s,t)=>s+getMemberShare(t,memFilter),0);
      tInc=ttxs.filter(t=>t.type==='income'&&t.member===memFilter).reduce((s,t)=>s+t.amount,0);
    } else if(isShared){
      const ttxs=all.filter(t=>t.date&&t.date.startsWith(tym)&&isSharedTx(t));
      tExp=ttxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
      tInc=ttxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    } else {
      tExp=all.filter(t=>t.date&&t.date.startsWith(tym)&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
      tInc=all.filter(t=>t.date&&t.date.startsWith(tym)&&t.type==='income').reduce((s,t)=>s+t.amount,0);
    }
    trendMonths.push({ym:tym,label:d.toLocaleDateString('en-MY',{month:'short'}),exp:tExp,inc:tInc});
  }
  const maxTrend=Math.max(...trendMonths.map(t=>Math.max(t.exp,t.inc)),1);

  // Build donut
  function buildDonut(data,totalVal,colorFn,labelFn){
    if(!totalVal)return`<circle cx="110" cy="110" r="70" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="28"/>`;
    let off=0;
    return data.map(item=>{
      const pct=item.val/totalVal*100;
      const circ=2*Math.PI*70;
      const dash=pct/100*circ;
      const seg=`<circle cx="110" cy="110" r="70" fill="none" stroke="${colorFn(item)}" stroke-width="28"
        stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-circ*off/100}"
        transform="rotate(-90 110 110)"/>`;
      off+=pct;return seg;
    }).join('');
  }

  const overviewContent=`
    <!-- Income / Expense cards -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:14px">
        <p style="font-size:11px;color:var(--muted);margin-bottom:5px">Income</p>
        <p style="font-family:var(--font-num);font-size:20px;font-weight:700;color:#4A9EFF">${_fmt(inc)}</p>
        ${incChg!==null?`<div style="margin-top:6px;padding:4px 8px;border-radius:8px;background:${incChg<=0?'rgba(255,107,107,0.15)':'rgba(105,210,160,0.15)'};display:inline-block">
          <p style="font-size:10px;color:${incChg<=0?'var(--red)':'var(--green)'};font-weight:600">${incChg>0?'+':''}${incChg.toFixed(1)}% vs last mo</p>
        </div>`:''}
      </div>
      <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:14px">
        <p style="font-size:11px;color:var(--muted);margin-bottom:5px">Expense</p>
        <p style="font-family:var(--font-num);font-size:20px;font-weight:700;color:var(--text)">${_fmt(exp)}</p>
        ${expChg!==null?`<div style="margin-top:6px;padding:4px 8px;border-radius:8px;background:${expChg>=0?'rgba(255,107,107,0.15)':'rgba(105,210,160,0.15)'};display:inline-block">
          <p style="font-size:10px;color:${expChg>=0?'var(--red)':'var(--green)'};font-weight:600">${expChg>0?'+':''}${expChg.toFixed(1)}% vs last mo</p>
        </div>`:''}
      </div>
    </div>
    <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
      <p style="font-size:13px;color:var(--muted)">Net Income</p>
      <div style="text-align:right">
        <p style="font-family:var(--font-num);font-size:18px;font-weight:700;color:${net>=0?'#4A9EFF':'var(--red)'}">${_fmt(Math.abs(net))}</p>
        ${netChg!==null?`<p style="font-size:10px;color:${netChg>=0?'var(--green)':'var(--red)'};margin-top:2px">${netChg>0?'+':''}${netChg.toFixed(1)}% vs last mo</p>`:''}
      </div>
    </div>

    ${isFiltered?`
    <!-- Filtered member split detail -->
    <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <span style="font-size:24px">${filteredMem?.avatar||'👤'}</span>
        <div>
          <p style="font-size:14px;font-weight:700">${filteredMem?.displayName||'Member'}</p>
          <p style="font-size:11px;color:var(--dim)">Total share: ${_fmt(exp)}</p>
        </div>
      </div>
      ${memberSplitTxs.length>0?`
      <p style="font-size:11px;color:var(--dim);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px">Split Transactions</p>
      ${memberSplitTxs.map(t=>{
        const share=getMemberShare(t,memFilter);
        const cat=cats[t.category]||DEFAULT_CATS.other;
        const all=[t.member,...(t.splitWith||[])];
        const splitCount=t.splitAmounts?Object.keys(t.splitAmounts).length:all.length;
        const isPayer=t.member===memFilter;
        return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
          <div style="width:32px;height:32px;border-radius:9px;background:${cat.color}22;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${renderCatIcon(cat.icon,22,true)}</div>
          <div style="flex:1;min-width:0">
            <p style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description}</p>
            <p style="font-size:10px;color:var(--dim);margin-top:1px">${t.date}${t.time?' · '+t.time:''} · ÷${splitCount} split${isPayer?' · paid by you':''}</p>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <p style="font-family:var(--font-num);font-size:13px;font-weight:600;color:var(--red)">-${_fmt(share)}</p>
            <p style="font-size:10px;color:var(--dim)">of ${_fmt(t.amount)}</p>
          </div>
        </div>`;
      }).join('')}
      `:''}
      ${monthTxs.filter(t=>t.type==='expense'&&t.member===memFilter&&!t.splitWith?.length&&(!t.splitAmounts||Object.keys(t.splitAmounts).length<=1)).length>0?`
      <p style="font-size:11px;color:var(--dim);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-top:12px;margin-bottom:10px">Solo Transactions</p>
      ${monthTxs.filter(t=>t.type==='expense'&&t.member===memFilter&&!t.splitWith?.length&&(!t.splitAmounts||Object.keys(t.splitAmounts).length<=1)).map(t=>{
        const cat=cats[t.category]||DEFAULT_CATS.other;
        return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
          <div style="width:32px;height:32px;border-radius:9px;background:${cat.color}22;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${renderCatIcon(cat.icon,22,true)}</div>
          <div style="flex:1;min-width:0">
            <p style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description}</p>
            <p style="font-size:10px;color:var(--dim);margin-top:1px">${t.date}${t.time?' · '+t.time:''}</p>
          </div>
          <p style="font-family:var(--font-num);font-size:13px;font-weight:600;color:var(--red)">-${_fmt(t.amount)}</p>
        </div>`;
      }).join('')}
      `:''}
    </div>`:''}

    <!-- Donut + category breakdown -->
    <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px">
      <p style="font-size:14px;font-weight:700;margin-bottom:14px">Expenses by Category</p>
      ${catData.length?`
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
        <svg width="120" height="120" viewBox="0 0 220 220" style="flex-shrink:0">
          <circle cx="110" cy="110" r="70" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="28"/>
          ${buildDonut(catData.map(c=>({...c,val:c.total})),exp,c=>c.color,c=>c.label)}
          <text x="110" y="106" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="700" font-family="var(--font-num)">${_getCur().symbol}${exp>=1000?(exp/1000).toFixed(1)+'K':exp.toFixed(0)}</text>
          <text x="110" y="122" text-anchor="middle" fill="var(--muted)" font-size="10">total</text>
        </svg>
        <div style="flex:1;min-width:0">
          ${catData.slice(0,5).map(c=>{
            const pct=exp>0?Math.round(c.total/exp*100):0;
            return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
              <div style="width:9px;height:9px;border-radius:3px;background:${c.color};flex-shrink:0"></div>
              <span style="font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${renderCatIcon(c.icon,16)} ${c.label}</span>
              <span style="font-size:11px;font-weight:600">${pct}%</span>
            </div>`;
          }).join('')}
        </div>
      </div>
      ${catData.map(c=>{
        const pct=exp>0?Math.round(c.total/exp*100):0;
        return`<div style="margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <div style="width:30px;height:30px;border-radius:9px;background:${c.color}22;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${renderCatIcon(c.icon,20,true)}</div>
            <div style="flex:1">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
                <span style="font-size:12px;font-weight:600">${c.label}</span>
                <span style="font-family:var(--font-num);font-size:12px">${_fmt(c.total)}</span>
              </div>
              <div style="height:4px;border-radius:999px;background:rgba(255,255,255,0.07)"><div style="height:100%;border-radius:999px;background:${c.color};width:${pct}%"></div></div>
            </div>
            <span style="font-size:10px;color:var(--dim);min-width:26px;text-align:right">${pct}%</span>
          </div>
          ${c.subcats.length?`<div style="padding-left:38px">${c.subcats.map(s=>{
            const sp=c.total>0?Math.round(s.total/c.total*100):0;
            return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
              <span style="font-size:11px;color:var(--muted);flex:1">${s.label}</span>
              <div style="width:50px;height:3px;border-radius:999px;background:rgba(255,255,255,0.07)"><div style="height:100%;border-radius:999px;background:${c.color}88;width:${sp}%"></div></div>
              <span style="font-size:10px;color:var(--dim);min-width:40px;text-align:right">${_fmt(s.total)}</span>
            </div>`;
          }).join('')}</div>`:''}
        </div>`;
      }).join('')}`
      :'<p style="font-size:13px;color:var(--dim);text-align:center;padding:20px 0">No expenses this month</p>'}
    </div>

    ${!isFiltered?`
    <!-- Member spending section (All view only) -->
    <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px">
      <p style="font-size:14px;font-weight:700;margin-bottom:14px">Member Spending</p>
      <!-- Member donut -->
      ${memberShareData.length&&totalShare>0?`
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
        <svg width="100" height="100" viewBox="0 0 220 220" style="flex-shrink:0">
          <circle cx="110" cy="110" r="70" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="40"/>
          ${buildDonut(memberShareData.map(m=>({...m,val:m.share})),totalShare,m=>m.color||'#6C63FF',m=>m.displayName)}
        </svg>
        <div style="flex:1;min-width:0">
          ${memberShareData.map(m=>{
            const pct=Math.round(m.share/totalShare*100);
            return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
              <div style="width:9px;height:9px;border-radius:50%;background:${m.color||'#6C63FF'};flex-shrink:0"></div>
              <span style="font-size:11px;color:var(--muted);flex:1">${m.avatar} ${m.displayName}</span>
              <span style="font-size:11px;font-weight:600">${pct}%</span>
            </div>`;
          }).join('')}
        </div>
      </div>`:''}
      <!-- Shared row -->
      ${sharedExpTotal>0?`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:rgba(108,99,255,0.1);border:1px solid rgba(108,99,255,0.2);margin-bottom:8px">
        <span style="font-size:20px">👥</span>
        <div style="flex:1">
          <p style="font-size:13px;font-weight:600;color:var(--accent)">Shared Expenses</p>
          <p style="font-size:10px;color:var(--dim)">Split across multiple members</p>
        </div>
        <p style="font-family:var(--font-num);font-size:13px;font-weight:700;color:var(--accent)">${_fmt(sharedExpTotal)}</p>
      </div>`:''}
      <!-- Per-member rows with split detail -->
      ${memberShareData.map(m=>{
        const pct=totalShare>0?Math.round(m.share/totalShare*100):0;
        return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
          <div style="width:34px;height:34px;border-radius:50%;background:${m.color||'#6C63FF'}22;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${m.avatar}</div>
          <div style="flex:1;min-width:0">
            <p style="font-size:13px;font-weight:600">${m.displayName}</p>
            <p style="font-size:10px;color:var(--accent);margin-top:1px">
              ${m.splitShare>0?`÷ ${_fmt(m.splitShare)} split`:''} ${m.soloShare>0?`${m.splitShare>0?'+ ':''}${_fmt(m.soloShare)} solo`:''}
            </p>
          </div>
          <div style="text-align:right">
            <p style="font-family:var(--font-num);font-size:13px;font-weight:600;color:var(--red)">${_fmt(m.share)}</p>
            ${m.earned>0?`<p style="font-family:var(--font-num);font-size:10px;color:var(--green)">+${_fmt(m.earned)}</p>`:''}
            <p style="font-size:10px;color:var(--dim)">${pct}%</p>
          </div>
        </div>`;
      }).join('')}
    </div>`:''}`;

  // ── BUDGET TAB CONTENT ──
  // Sync budget data: use S.budgets only if S.budgetMonth matches statsMonth
  const budgetForMonth=S.budgetMonth===ym?S.budgets:{};
  const catBudgetTotal=Object.entries(budgetForMonth).filter(([k])=>k!=='_total'&&!k.includes('__')).reduce((s,[,v])=>s+(parseFloat(v)||0),0);
  const manualBudgetTotal=parseFloat(budgetForMonth._total)||0;
  const monthBudget=manualBudgetTotal>0?manualBudgetTotal:catBudgetTotal;

  // All-time category data with monthly breakdown
  const allTimeCatData=Object.entries(cats).filter(([k])=>k!=='income').map(([key,cat])=>{
    const allTimeTotal=txArr().filter(t=>t.type==='expense'&&t.category===key).reduce((s,t)=>s+t.amount,0);
    const monthTotal=isFiltered
      ?monthTxs.filter(t=>t.type==='expense'&&t.category===key).reduce((s,t)=>s+getMemberShare(t,memFilter),0)
      :monthAll.filter(t=>t.type==='expense'&&t.category===key).reduce((s,t)=>s+t.amount,0);
    const bgt=parseFloat(budgetForMonth[key])||0;
    const txCountAll=txArr().filter(t=>t.type==='expense'&&t.category===key).length;
    const txCountMonth=monthAll.filter(t=>t.type==='expense'&&t.category===key).length;
    const subcats=cat.subcats?Object.entries(cat.subcats).map(([sk,sv])=>({
      key:sk,label:sv,
      allTimeTotal:txArr().filter(t=>t.type==='expense'&&t.category===key&&t.subcat===sk).reduce((s,t)=>s+t.amount,0),
      monthTotal:isFiltered
        ?monthTxs.filter(t=>t.type==='expense'&&t.category===key&&t.subcat===sk).reduce((s,t)=>s+getMemberShare(t,memFilter),0)
        :monthAll.filter(t=>t.type==='expense'&&t.category===key&&t.subcat===sk).reduce((s,t)=>s+t.amount,0),
    })).filter(s=>s.allTimeTotal>0):[];
    return{key,...cat,allTimeTotal,monthTotal,bgt,txCountAll,txCountMonth,subcats};
  });

  // Month-only categories (for the monthly card)
  const monthCatData=allTimeCatData.filter(c=>c.monthTotal>0||c.bgt>0).sort((a,b)=>b.monthTotal-a.monthTotal);
  // All-time categories (for the all-time card)
  const allTimeCatDataFiltered=allTimeCatData.filter(c=>c.allTimeTotal>0).sort((a,b)=>b.allTimeTotal-a.allTimeTotal);

  const allTimeExpTotal=allTimeCatDataFiltered.reduce((s,c)=>s+c.allTimeTotal,0);
  const maxCatAllTime=allTimeCatDataFiltered.reduce((a,c)=>Math.max(a,c.allTimeTotal),1);
  const monthExpCount=monthAll.filter(t=>t.type==='expense').length;
  const allTimeExpCount=txArr().filter(t=>t.type==='expense').length;

  const budgetContent=`
    <!-- Month budget summary -->
    <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${monthBudget>0?12:6}px">
        <p style="font-size:14px;font-weight:700">${monthLabel} Budget</p>
        ${S.budgetMonth!==ym
          ?`<span style="font-size:11px;color:var(--dim);font-style:italic">Loading…</span>`
          :monthBudget>0
            ?`<span style="font-size:12px;font-weight:600;background:rgba(255,255,255,0.07);padding:4px 10px;border-radius:10px">${_fmt(monthBudget)}</span>`
            :`<button onclick="goBudget()" style="font-size:11px;padding:5px 12px;border-radius:8px;background:rgba(108,99,255,0.12);color:var(--accent);border:1px solid rgba(108,99,255,0.2);cursor:pointer;font-family:var(--font-ui)">+ Set Budget</button>`}
      </div>
      ${monthBudget>0?`
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px">
          <span>Spent ${_fmt(exp)}</span>
          <span style="color:${exp>monthBudget?'var(--red)':exp/monthBudget>0.8?'var(--yellow)':'var(--green)'};font-weight:600">${Math.round(exp/monthBudget*100)}% used</span>
        </div>
        <div class="budget-bar-track" style="height:7px"><div class="budget-bar-fill" style="width:${Math.min(100,exp/monthBudget*100)}%;background:${exp>monthBudget?'var(--red)':exp/monthBudget>0.8?'var(--yellow)':'var(--green)'}"></div></div>
        <p style="font-size:11px;margin-top:6px;color:${exp>monthBudget?'var(--red)':'var(--accent2)'}">
          ${exp>monthBudget?'⚠️ Over by '+_fmt(exp-monthBudget):'✓ Remaining: '+_fmt(monthBudget-exp)}
        </p>`
      :`<p style="font-size:11px;color:var(--dim)">No budget set for this month.</p>`}
    </div>

    <!-- THIS MONTH category breakdown -->
    <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <p style="font-size:14px;font-weight:700">${monthLabel} — by Category</p>
        <p style="font-size:11px;color:var(--dim)">${_fmt(exp)}</p>
      </div>
      <p style="font-size:11px;color:var(--dim);margin-bottom:14px">${monthExpCount} transactions this month</p>
      ${monthCatData.length?monthCatData.map(c=>{
        const pct=exp>0?Math.round(c.monthTotal/exp*100):0;
        const bgtOver=c.bgt>0&&c.monthTotal>c.bgt;
        const bgtPct=c.bgt>0?Math.min(100,Math.round(c.monthTotal/c.bgt*100)):0;
        const monthSubcats=c.subcats.filter(s=>s.monthTotal>0);
        return`<div style="margin-bottom:14px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <div style="width:32px;height:32px;border-radius:9px;background:${c.color}22;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${renderCatIcon(c.icon,20,true)}</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
                <span style="font-size:13px;font-weight:600">${c.label}</span>
                <div style="text-align:right">
                  <span style="font-family:var(--font-num);font-size:13px;font-weight:700">${_fmt(c.monthTotal)}</span>
                  ${c.bgt>0?`<span style="font-size:10px;color:${bgtOver?'var(--red)':'var(--dim)'}"> / ${_fmt(c.bgt)}</span>`:''}
                </div>
              </div>
              <div style="height:6px;border-radius:999px;background:rgba(255,255,255,0.07)">
                <div style="height:100%;border-radius:999px;background:${bgtOver?'var(--red)':c.color};width:${c.bgt>0?bgtPct:pct}%"></div>
              </div>
              <div style="display:flex;justify-content:space-between;margin-top:3px">
                <span style="font-size:10px;color:var(--dim)">${c.txCountMonth} txns this month</span>
                <span style="font-size:10px;color:${bgtOver?'var(--red)':'var(--dim)'}">${c.bgt>0?bgtPct+'% of budget':pct+'% of total'}${bgtOver?' ⚠️':''}</span>
              </div>
            </div>
          </div>
          ${monthSubcats.length?`<div style="padding-left:40px;border-left:2px solid ${c.color}33;margin-left:16px">
            ${monthSubcats.map(s=>{
              const sp=c.monthTotal>0?Math.round(s.monthTotal/c.monthTotal*100):0;
              return`<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
                <span style="font-size:11px;color:var(--muted);flex:1">${s.label}</span>
                <div style="width:60px;height:3px;border-radius:999px;background:rgba(255,255,255,0.07)">
                  <div style="height:100%;border-radius:999px;background:${c.color}88;width:${sp}%"></div>
                </div>
                <span style="font-family:var(--font-num);font-size:11px;color:var(--muted);min-width:55px;text-align:right">${_fmt(s.monthTotal)}</span>
                <span style="font-size:10px;color:var(--dim);min-width:24px;text-align:right">${sp}%</span>
              </div>`;
            }).join('')}
          </div>`:''}
        </div>`;
      }).join('')
      :`<p style="font-size:13px;color:var(--dim);text-align:center;padding:16px 0">No expenses in ${monthLabel}</p>`}
    </div>

    <!-- ALL-TIME category breakdown -->
    <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <p style="font-size:14px;font-weight:700">All-Time by Category</p>
        <p style="font-size:11px;color:var(--dim)">${_fmt(allTimeExpTotal)}</p>
      </div>
      <p style="font-size:11px;color:var(--dim);margin-bottom:14px">${allTimeExpCount} transactions total</p>
      ${allTimeCatDataFiltered.length?allTimeCatDataFiltered.map(c=>{
        const barPct=Math.round(c.allTimeTotal/maxCatAllTime*100);
        const ofTotal=allTimeExpTotal>0?Math.round(c.allTimeTotal/allTimeExpTotal*100):0;
        return`<div style="margin-bottom:14px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <div style="width:32px;height:32px;border-radius:9px;background:${c.color}22;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${renderCatIcon(c.icon,20,true)}</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
                <span style="font-size:13px;font-weight:600">${c.label}</span>
                <span style="font-family:var(--font-num);font-size:13px;font-weight:700">${_fmt(c.allTimeTotal)}</span>
              </div>
              <div style="height:6px;border-radius:999px;background:rgba(255,255,255,0.07)">
                <div style="height:100%;border-radius:999px;background:${c.color};width:${barPct}%"></div>
              </div>
              <div style="display:flex;justify-content:space-between;margin-top:3px">
                <span style="font-size:10px;color:var(--dim)">${c.txCountAll} txns · ${ofTotal}% of all spending</span>
              </div>
            </div>
            <span style="font-size:10px;color:var(--dim);min-width:26px;text-align:right;flex-shrink:0">${ofTotal}%</span>
          </div>
          ${c.subcats.length?`<div style="padding-left:40px;border-left:2px solid ${c.color}33;margin-left:16px">
            ${c.subcats.map(s=>{
              const sp=c.allTimeTotal>0?Math.round(s.allTimeTotal/c.allTimeTotal*100):0;
              return`<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
                <span style="font-size:11px;color:var(--muted);flex:1">${s.label}</span>
                <div style="width:60px;height:3px;border-radius:999px;background:rgba(255,255,255,0.07)">
                  <div style="height:100%;border-radius:999px;background:${c.color}88;width:${sp}%"></div>
                </div>
                <span style="font-family:var(--font-num);font-size:11px;color:var(--muted);min-width:55px;text-align:right">${_fmt(s.allTimeTotal)}</span>
                <span style="font-size:10px;color:var(--dim);min-width:24px;text-align:right">${sp}%</span>
              </div>`;
            }).join('')}
          </div>`:''}
        </div>`;
      }).join('')
      :'<p style="font-size:13px;color:var(--dim);text-align:center;padding:16px 0">No expense history yet</p>'}
    </div>`;

  const trendContent=`
    <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px">
      <p style="font-size:14px;font-weight:700;margin-bottom:16px">6-Month Trend${isFiltered?` · ${filteredMem?.displayName||''}`:isShared?' · Shared only':''}
      </p>
      <div style="display:flex;align-items:flex-end;gap:6px;height:120px;margin-bottom:8px">
        ${trendMonths.map(m=>{
          const expH=maxTrend>0?Math.round(m.exp/maxTrend*100):0;
          const incH=maxTrend>0?Math.round(m.inc/maxTrend*100):0;
          const isThis=m.ym===ym;
          return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
            <div style="width:100%;display:flex;gap:2px;align-items:flex-end;height:100px">
              <div style="flex:1;border-radius:4px 4px 0 0;background:${isThis?'var(--green)':'rgba(105,210,160,0.4)'};height:${incH}%;min-height:${m.inc>0?3:0}px"></div>
              <div style="flex:1;border-radius:4px 4px 0 0;background:${isThis?'var(--red)':'rgba(255,107,107,0.4)'};height:${expH}%;min-height:${m.exp>0?3:0}px"></div>
            </div>
            <p style="font-size:9px;color:${isThis?'var(--accent)':'var(--dim)'};font-weight:${isThis?'700':'400'}">${m.label}</p>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:12px;justify-content:center">
        <div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:3px;background:var(--green)"></div><span style="font-size:11px;color:var(--muted)">Income</span></div>
        <div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:3px;background:var(--red)"></div><span style="font-size:11px;color:var(--muted)">Expense</span></div>
      </div>
    </div>
    <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:16px">
      <p style="font-size:14px;font-weight:700;margin-bottom:14px">Monthly Summary</p>
      ${trendMonths.slice().reverse().map(m=>{
        const mNet=m.inc-m.exp;
        const isThis=m.ym===ym;
        return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
          <p style="font-size:12px;font-weight:${isThis?'700':'500'};color:${isThis?'var(--accent)':'var(--text)'};min-width:44px">${m.label}</p>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;font-size:11px">
              <span style="color:var(--green)">+${_fmt(m.inc)}</span>
              <span style="color:var(--red)">-${_fmt(m.exp)}</span>
            </div>
          </div>
          <p style="font-family:var(--font-num);font-size:12px;font-weight:600;color:${mNet>=0?'var(--green)':'var(--red)'};min-width:70px;text-align:right">${mNet>=0?'+':''}${_fmt(Math.abs(mNet))}</p>
        </div>`;
      }).join('')}
    </div>`;

  const tabs=['overview','budget','trend'];
  const tabLabels={overview:'Overview',budget:'Budget',trend:'Trend'};

  return`<div class="fade-in settings-page" style="padding-top:0">
    <div style="position:sticky;top:0;z-index:20;background:var(--bg);padding-top:52px">
      <div style="display:flex;border-bottom:1px solid var(--border);padding:0 4px">
        ${tabs.map(t=>`<button data-stab="${t}" style="flex:1;padding:12px 8px;font-size:13px;font-weight:700;background:none;border:none;border-bottom:2px solid ${S.statsTab===t?'var(--accent)':'transparent'};color:${S.statsTab===t?'var(--accent)':'var(--muted)'};cursor:pointer;font-family:var(--font-ui)">${tabLabels[t]}</button>`).join('')}
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px">
        <button id="statsPrevBtn" style="width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.07);border:none;color:var(--text);font-size:16px;cursor:pointer">‹</button>
        <p style="font-size:16px;font-weight:700">${monthLabel}${S.totalView?' · My Finance':''}</p>

function attachStatsListeners(){
  // Remove old listeners by cloning
  ['statsPrevBtn','statsNextBtn'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){const clone=el.cloneNode(true);el.parentNode.replaceChild(clone,el);}
  });
  document.querySelectorAll('[data-stab],[data-smem],[data-sync-budget]').forEach(btn=>{
    const clone=btn.cloneNode(true);btn.parentNode.replaceChild(clone,btn);
  });

  document.querySelectorAll('[data-stab]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      S.statsTab=btn.dataset.stab;
      if(S.statsTab==='budget'&&S.budgetMonth!==S.statsMonth)switchBudgetMonth(S.statsMonth);
      renderPage();
    });
  });
  document.getElementById('statsPrevBtn')?.addEventListener('click',()=>{
    const[yr,mo]=S.statsMonth.split('-').map(Number);
    S.statsMonth=`${mo===1?yr-1:yr}-${String(mo===1?12:mo-1).padStart(2,'0')}`;
    if(S.statsTab==='budget')switchBudgetMonth(S.statsMonth);
    else renderPage();
  });
  document.getElementById('statsNextBtn')?.addEventListener('click',()=>{
    const[yr,mo]=S.statsMonth.split('-').map(Number);
    const next=`${mo===12?yr+1:yr}-${String(mo===12?1:mo+1).padStart(2,'0')}`;
    if(next<=new Date().toISOString().slice(0,7)){
      S.statsMonth=next;
      if(S.statsTab==='budget')switchBudgetMonth(S.statsMonth);
      else renderPage();
    }
  });
  document.querySelectorAll('[data-smem]').forEach(btn=>{
    btn.addEventListener('click',()=>{S.statsMember=btn.dataset.smem;renderPage();});
  });
  document.querySelector('[data-sync-budget]')?.addEventListener('click',()=>{
    switchBudgetMonth(S.statsMonth);
  });
}

// ── CALENDAR VIEW ──
function renderCalendar(){
  const ym=S.calendarMonth;
  const [yr,mo]=ym.split('-').map(Number);
  const nowYm=new Date().toISOString().slice(0,7);
  const todayStr=td();
  const isCurrentMonth=ym===nowYm;
  const monthLabel=new Date(yr,mo-1,1).toLocaleDateString('en-MY',{month:'short',year:'numeric'});

  // ── TOTAL VIEW: normalise cross-ledger txs to user's personal share in MYR ──
  let _calTxArr;
  if(S.totalView){
    const _uid=S.user.uid;
    const _rawAll=totalTxArr();
    const _userShareMYR=t=>{
      let share=0;
      if(t.splitAmounts){share=parseFloat(t.splitAmounts[_uid])||0;}
      else if(t.splitWith?.length>0){const a=[t.member,...t.splitWith];share=a.includes(_uid)?t.amount/a.length:0;}
      else{share=t.member===_uid?t.amount:0;}
      const cur=S.allLedgerCurrencies[t._lid]||'MYR';
      const rate=(CURRENCIES[cur]?.rateToMYR||1)/(CURRENCIES['MYR']?.rateToMYR||1);
      return share*rate;
    };
    _calTxArr=_rawAll
      .filter(t=>t.type==='income'?t.member===_uid:(t.member===_uid||(t.splitWith||[]).includes(_uid)||(t.splitAmounts&&t.splitAmounts[_uid]!=null)))
      .map(t=>({...t,amount:t.type==='expense'?_userShareMYR(t):t._amtMYR}))
      .filter(t=>t.amount>0);
  } else {
    _calTxArr=txArr();
  }
  const cur=S.totalView?CURRENCIES['MYR']:getCur();

  // All txs for this month
  const all=_calTxArr;
  const monthTxs=all.filter(t=>t.date&&t.date.startsWith(ym));

  // Build daily totals map: date -> {inc, exp}
  const daily={};
  monthTxs.forEach(t=>{
    if(!daily[t.date])daily[t.date]={inc:0,exp:0};
    if(t.type==='income')daily[t.date].inc+=t.amount;
    else daily[t.date].exp+=t.amount;
  });

  // Month summary
  const totalInc=monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const totalExp=monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance=totalInc-totalExp;

  // Carry-over: sum of all transactions before this month
  const carryOver=all.filter(t=>t.date&&t.date<ym+'-01').reduce((s,t)=>s+(t.type==='income'?t.amount:-t.amount),0);

  // Calendar grid: find first day of month (0=Sun)
  const firstDay=new Date(yr,mo-1,1).getDay();
  const daysInMonth=new Date(yr,mo,0).getDate();

  // Build grid cells
  const cells=[];
  // Empty cells before first day
  for(let i=0;i<firstDay;i++)cells.push(null);
  // Day cells
  for(let d=1;d<=daysInMonth;d++)cells.push(d);

  const DAY_LABELS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // Selected day transactions
  const selDay=S.calendarDay;
  const selDayTxs=selDay?all.filter(t=>t.date===selDay).sort((a,b)=>(b.ts||0)-(a.ts||0)):[];
  const cats=getCats();

  return`<div class="fade-in" style="display:flex;flex-direction:column;height:100%">

    <!-- HEADER -->
    <div style="padding:52px 16px 0;display:flex;align-items:center;gap:8px">
      <button id="calPrevBtn" style="width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.07);border:none;color:var(--text);font-size:18px;cursor:pointer;flex-shrink:0">‹</button>
      <div style="flex:1;text-align:center">
        <p style="font-size:17px;font-weight:700;letter-spacing:-0.01em">${monthLabel}${S.totalView?' · My Finance':''} <span style="color:var(--dim);font-size:14px">▾</span></p>
      </div>
      <button id="calNextBtn" style="width:34px;height:34px;border-radius:10px;background:${isCurrentMonth?'rgba(255,255,255,0.03)':'rgba(255,255,255,0.07)'};border:none;color:${isCurrentMonth?'var(--dim)':'var(--text)'};font-size:18px;cursor:pointer;flex-shrink:0" ${isCurrentMonth?'disabled':''}>›</button>
    </div>

    <!-- SUMMARY ROW -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;margin:12px 16px 0;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;overflow:hidden">
      <div style="padding:10px 14px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)">
        <p style="font-size:10px;color:var(--muted);margin-bottom:2px">Income</p>
        <p style="font-family:var(--font-num);font-size:14px;font-weight:700;color:#4A9EFF">${fmt(totalInc)}</p>
      </div>
      <div style="padding:10px 14px;border-bottom:1px solid var(--border)">
        <p style="font-size:10px;color:var(--muted);margin-bottom:2px">Expense</p>
        <p style="font-family:var(--font-num);font-size:14px;font-weight:700;color:var(--red)">${fmt(totalExp)}</p>
      </div>
      <div style="padding:10px 14px;border-right:1px solid var(--border)">
        <p style="font-size:10px;color:var(--muted);margin-bottom:2px">Carry-over</p>
        <p style="font-family:var(--font-num);font-size:14px;font-weight:700;color:var(--text)">${fmt(Math.abs(carryOver))}</p>
      </div>
      <div style="padding:10px 14px">
        <p style="font-size:10px;color:var(--muted);margin-bottom:2px">Balance</p>
        <p style="font-family:var(--font-num);font-size:14px;font-weight:700;color:${balance+carryOver>=0?'#4A9EFF':'var(--red)'}"> ${fmt(Math.abs(balance+carryOver))}</p>
      </div>
    </div>

    <!-- DAY LABELS -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);padding:10px 16px 0;gap:0">
      ${DAY_LABELS.map((d,i)=>`<div style="text-align:center;font-size:11px;font-weight:700;color:${i===0?'var(--red)':i===6?'#4A9EFF':'var(--muted)'};padding:4px 0">${d}</div>`).join('')}
    </div>

    <!-- CALENDAR GRID -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);padding:0 16px;gap:0;flex:1">
      ${cells.map((d,i)=>{
        if(!d)return`<div style="border:0.5px solid rgba(255,255,255,0.05);min-height:62px"></div>`;
        const dateStr=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dd=daily[dateStr]||{inc:0,exp:0};
        const isToday=dateStr===todayStr;
        const isSel=dateStr===selDay;
        const col=(i%7);
        const dayColor=col===0?'var(--red)':col===6?'#4A9EFF':'var(--text)';
        const future=dateStr>todayStr;
        return`<div onclick="selectCalDay('${dateStr}')" style="border:0.5px solid rgba(255,255,255,0.05);min-height:62px;padding:5px 4px;cursor:pointer;background:${isSel?'rgba(108,99,255,0.25)':isToday?'rgba(108,99,255,0.15)':'transparent'};position:relative;transition:background 0.15s">
          <p style="font-size:12px;font-weight:${isToday?'700':'500'};color:${isToday?'var(--accent)':future?'var(--dim)':dayColor};text-align:center;line-height:1.2">${d}</p>
          ${dd.inc>0?`<p style="font-size:9px;color:#4A9EFF;text-align:center;margin-top:2px;font-family:var(--font-num);line-height:1.2">${shortFmt(dd.inc)}</p>`:''}
          ${dd.exp>0?`<p style="font-size:9px;color:var(--red);text-align:center;margin-top:1px;font-family:var(--font-num);line-height:1.2">${shortFmt(dd.exp)}</p>`:''}
          ${isToday?`<div style="position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--accent)"></div>`:''}
        </div>`;
      }).join('')}
    </div>

    <!-- SELECTED DAY PANEL -->
    ${selDay?`
    <div style="margin:0 16px 8px;border-top:1px solid var(--border);padding-top:12px;max-height:240px;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <p style="font-size:13px;font-weight:700">${new Date(selDay+'T00:00:00').toLocaleDateString('en-MY',{weekday:'long',day:'numeric',month:'long'})}</p>
        <button onclick="selectCalDay(null)" style="background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:0 4px">×</button>
      </div>
      ${selDayTxs.length===0
        ?`<p style="font-size:13px;color:var(--dim);text-align:center;padding:12px 0">No transactions</p>`
        :selDayTxs.map(t=>{
          const cat=cats[t.category]||DEFAULT_CATS.other;
          const mem=getMem(t.member);
          return`<div class="tx-row surface" onclick="openTxModal('${t._k}')" style="margin-bottom:6px">
            <div class="tx-icon" style="background:${cat.color}22;width:36px;height:36px;border-radius:11px">${renderCatIcon(cat.icon,22,true)}</div>
            <div class="tx-info">
              <p class="tx-desc" style="font-size:13px">${t.description}</p>
              <span class="tag" style="background:${(mem.color||'#999')}33;color:${mem.color||'#999'};font-size:10px">${mem.avatar} ${mem.displayName}</span>
            </div>
            <p class="tx-amount" style="color:${t.type==='income'?'var(--green)':'var(--text)'}; font-size:14px">${t.type==='income'?'+':'-'}${fmt(t.amount)}</p>
          </div>`;
        }).join('')}
    </div>`
    :`<div style="height:8px"></div>`}
  </div>`;
}

// Short format: show K for thousands to fit in calendar cell
function shortFmt(n){
  const c=getCur();
  const sym=c?c.symbol:'RM';
  if(n>=1000)return sym+(n/1000).toFixed(1)+'K';
  return sym+n.toFixed(0);
}

function attachCalendarListeners(){
  document.getElementById('calPrevBtn')?.addEventListener('click',()=>{
    const[yr,mo]=S.calendarMonth.split('-').map(Number);
    const ny=mo===1?yr-1:yr,nm=mo===1?12:mo-1;
    S.calendarMonth=`${ny}-${String(nm).padStart(2,'0')}`;
    S.calendarDay=null;
    renderPage();
  });
  document.getElementById('calNextBtn')?.addEventListener('click',()=>{
    const[yr,mo]=S.calendarMonth.split('-').map(Number);
    const ny=mo===12?yr+1:yr,nm=mo===12?1:mo+1;
    const next=`${ny}-${String(nm).padStart(2,'0')}`;
    if(next<=new Date().toISOString().slice(0,7)){
      S.calendarMonth=next;S.calendarDay=null;renderPage();
    }
  });
}

function renderSearchPage(){
  const q=(S.searchQuery||'').toLowerCase().trim();
  // In total view, search across ALL ledger transactions; otherwise just the active ledger
  const all=S.totalView?totalTxArr():txArr();
  const cats=getCats();
  const results=q.length>=1?all.filter(t=>{
    const desc=(t.description||'').toLowerCase();
    const catLabel=(getCats()[t.category]?.label||'').toLowerCase();
    const mem=getMem(t.member);
    const memName=(mem.displayName||'').toLowerCase();
    const amt=String(t.amount);
    const ledgerName=(t._lname||'').toLowerCase(); // for total view
    return desc.includes(q)||catLabel.includes(q)||memName.includes(q)||amt.includes(q)||ledgerName.includes(q);
  }):[];
  const g={};results.forEach(t=>{if(!g[t.date])g[t.date]=[];g[t.date].push(t);});
  return`<div class="fade-in" style="padding-bottom:40px">
    <div style="padding:52px 20px 0;display:flex;align-items:center;gap:12px">
      <button onclick="goHome()" style="background:rgba(255,255,255,0.07);border:none;border-radius:12px;padding:8px 12px;font-size:16px;color:var(--text);cursor:pointer">←</button>
      <div style="flex:1;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:14px;padding:10px 14px">
        <span style="font-size:16px;color:var(--dim)">🔍</span>
        <input id="searchInput" type="text" value="${(S.searchQuery||'').replace(/"/g,'&quot;')}" placeholder="Search transactions..." autofocus
          style="flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font-ui);font-size:16px"
          oninput="doSearch(this.value)">
        ${q?`<button onclick="doSearch('',true)" style="background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:0">×</button>`:''}
      </div>
    </div>
    <div style="padding:12px 20px 0">
      ${!q?`<p style="font-size:13px;color:var(--dim);text-align:center;padding:40px 0">Type to search across all transactions</p>`
      :results.length===0?`<p style="font-size:13px;color:var(--dim);text-align:center;padding:40px 0">No results for "${S.searchQuery}"</p>`
      :`<p style="font-size:12px;color:var(--dim);margin-bottom:14px">${results.length} result${results.length!==1?'s':''} for "${S.searchQuery}"</p>
      ${Object.entries(g).map(([date,txs])=>{
        const dayInc=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
        const dayExp=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
        const incPart=dayInc>0?`<span style="color:var(--green);font-weight:600">Income ${fmt(dayInc)}</span>`:'';
        const expPart=dayExp>0?`<span style="color:var(--red);font-weight:600">Expense ${fmt(dayExp)}</span>`:'';
        const sep=dayInc>0&&dayExp>0?`<span style="color:var(--dim)"> · </span>`:'';
        return`<div style="margin-bottom:18px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <p class="tx-date-label" style="margin-bottom:0">${dlabel(date)}</p>
            <p style="font-size:11px">${incPart}${sep}${expPart}</p>
          </div>
          <div class="tx-list">
            ${txs.map(t=>{
              const cat=cats[t.category]||DEFAULT_CATS.other;
              const mem=getMem(t.member);
              const hs=(t.splitWith?.length>0)||(Object.keys(t.splitAmounts||{}).length>1);
              return`<div class="tx-row surface" onclick="openTxModal('${t._k}')">
                <div class="tx-icon" style="background:${cat.color}22">${renderCatIcon(cat.icon,22,true)}</div>
                <div class="tx-info">
                  <p class="tx-desc">${t.description}</p>
                  <div class="tx-meta">
                    <span class="tag" style="background:${(mem.color||'#999')}33;color:${mem.color||'#999'}">${mem.avatar} ${mem.displayName}</span>
                    ${hs?`<span class="tag" style="background:rgba(108,99,255,0.15);color:var(--accent)">÷split</span>`:''}
                    <span class="tag" style="background:rgba(255,255,255,0.05);color:var(--dim);font-size:10px">${cat.label}</span>
                    ${t._lname?`<span class="tag" style="background:rgba(108,99,255,0.1);color:var(--accent);font-size:10px">${t._licon||''} ${t._lname}</span>`:''}
                  </div>
                </div>
                <p class="tx-amount" style="color:${t.type==='income'?'var(--green)':'var(--text)'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</p>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}`}
    </div>
  </div>`;
}

function renderSplitsPage(){
  const tab=S.splitsTab||'pending';
  const me=S.user.uid;
  const histFilter=S.splitsHistFilter||'all';

  const resolveMem=(uid,lid)=>{
    const lmems=lid?S.allLedgerMembers[lid]:null;
    if(lmems&&lmems[uid])return{...lmems[uid],id:uid};
    return getMem(uid);
  };
  const fmtMYR=(n)=>'RM '+Number(n).toFixed(2);

  // ── filter pills for Settled tab ──
  const buildFilterPills=(allCount,activeCount,completeCount)=>{
    const pills=[
      {key:'all',label:'All',count:allCount,activeColor:'var(--accent)',activeBg:'rgba(108,99,255,0.2)'},
      {key:'active',label:'Active',count:activeCount,activeColor:'var(--yellow)',activeBg:'rgba(255,230,109,0.15)'},
      {key:'complete',label:'Complete',count:completeCount,activeColor:'var(--green)',activeBg:'rgba(105,210,160,0.15)'},
    ];
    return'<div style="display:flex;gap:8px;padding:14px 20px 0;overflow-x:auto;-webkit-overflow-scrolling:touch">'+
      pills.map(p=>{
        const isActive=histFilter===p.key;
        return'<button onclick="setSplitsHistFilter(\''+p.key+'\')" style="flex-shrink:0;padding:7px 16px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid '+(isActive?p.activeColor:'var(--border)')+';background:'+(isActive?p.activeBg:'rgba(255,255,255,0.04)')+';color:'+(isActive?p.activeColor:'var(--muted)')+'">'+p.label+' ('+p.count+')</button>';
      }).join('')+
    '</div>';
  };

  // ── settlement row builder ──
  const buildSettleRow=(sk,s,f,t,isTotal,amtDisplay,extraLabel)=>{
    const isReviewed=!!s.reviewed;
    const reviewBtn=isReviewed?'':'<button onclick="markSettleReviewed(\''+sk+'\''+(isTotal?',\''+s._lid+'\'':'')+' )" style="font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(105,210,160,0.2);color:var(--green);font-weight:700;border:1px solid rgba(105,210,160,0.3);cursor:pointer">✓ Reviewed</button>';
    const undoBtn=isReviewed?'<button onclick="unmarkSettleReviewed(\''+sk+'\''+(isTotal?',\''+s._lid+'\'':'')+' )" style="font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(255,230,109,0.15);color:var(--yellow);font-weight:600;border:1px solid rgba(255,230,109,0.3);cursor:pointer">↩ Undo</button>':'';
    const delBtn='<button onclick="deleteSettle(\''+sk+'\''+(isTotal?',\''+s._lid+'\'':'')+' )" style="font-size:10px;padding:3px 7px;border-radius:6px;background:rgba(255,107,107,0.12);color:var(--red);font-weight:600;border:none;cursor:pointer">✕</button>';
    return'<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;background:'+(isReviewed?'rgba(105,210,160,0.06)':'rgba(255,230,109,0.06)')+';border:1px solid '+(isReviewed?'rgba(105,210,160,0.15)':'rgba(255,230,109,0.25)')+';margin-bottom:8px">'+
      '<div style="width:38px;height:38px;border-radius:12px;background:'+(isReviewed?'rgba(105,210,160,0.15)':'rgba(255,230,109,0.15)')+';display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">'+(isReviewed?'✅':'⏳')+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<p style="font-size:13px;font-weight:600">'+(f.displayName||'?')+' → '+(t.displayName||'?')+'</p>'+
        '<p style="font-size:11px;color:var(--dim)">'+(s.note||'Settled')+' · '+(s.date||'')+(extraLabel?' · '+extraLabel:'')+'</p>'+
      '</div>'+
      '<div style="text-align:right;flex-shrink:0">'+
        '<p style="font-family:\'DM Mono\',monospace;font-size:14px;color:var(--green);font-weight:600">'+amtDisplay+'</p>'+
        '<div style="display:flex;gap:4px;justify-content:flex-end;margin-top:4px">'+reviewBtn+undoBtn+delBtn+'</div>'+
      '</div>'+
    '</div>';
  };

  // ── split history row builder ──
  const buildSplitHistRow=(t,isTotal)=>{
    const payer=isTotal?resolveMem(t.member,t._lid):getMem(t.member);
    const cats=getCats();
    const cat=cats[t.category]||DEFAULT_CATS.other;
    const splitPeople=t.splitAmounts?Object.keys(t.splitAmounts).filter(u=>u!==t.member):t.splitWith||[];
    const splitNames=splitPeople.map(u=>isTotal?resolveMem(u,t._lid).displayName:getMem(u).displayName).join(', ');
    const ledgerTag=isTotal?'<span style="background:rgba(108,99,255,0.12);color:var(--accent);padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600">'+t._licon+' '+t._lname+'</span>':'';
    return`<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);margin-bottom:8px">
      <div style="width:38px;height:38px;border-radius:12px;background:rgba(108,99,255,0.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${renderCatIcon(cat.icon,22,true)}</div>
      <div style="flex:1;min-width:0">
        <p style="font-size:13px;font-weight:600">${t.description}</p>
        <p style="font-size:11px;color:var(--dim);margin-top:2px">${payer.displayName} paid · ${t.date||''}${t.time?' · '+t.time:''}</p>
        ${splitNames?`<p style="font-size:11px;color:var(--muted);margin-top:2px">÷ with ${splitNames}</p>`:''}
        ${isTotal?'<div style="margin-top:4px">'+ledgerTag+'</div>':''}
      </div>
      <p style="font-family:var(--font-num);font-size:14px;font-weight:700;flex-shrink:0">${isTotal?fmtMYR(t.amount):fmt(t.amount)}</p>
    </div>`;
  };

  if(S.totalView){
    const allDbs=totalDebts();
    const totalPending=allDbs.reduce((s,d)=>s+d.amount,0);

    const allSettleLog=[];
    Object.entries(S.allLedgerSettlements||{}).forEach(([lid,settles])=>{
      const linfo=S.ledgers[lid]||{};
      const cur=S.allLedgerCurrencies[lid]||'MYR';
      const rate=(CURRENCIES[cur]?.rateToMYR||1)/(CURRENCIES['MYR']?.rateToMYR||1);
      Object.entries(settles||{}).forEach(([sk,s])=>{
        allSettleLog.push({...s,_sk:sk,_lid:lid,_lname:linfo.name||lid,_licon:linfo.icon||'💼',_amtMYR:(s.amount||0)*rate});
      });
    });
    allSettleLog.sort((a,b)=>(b.ts||0)-(a.ts||0));
    const totalSettled=allSettleLog.reduce((s,e)=>s+e._amtMYR,0);
    const unreviewedAll=allSettleLog.filter(s=>!s.reviewed).length;
    const filteredAll=histFilter==='active'?allSettleLog.filter(s=>!s.reviewed):histFilter==='complete'?allSettleLog.filter(s=>s.reviewed):allSettleLog;

    // All split transactions across ledgers
    const allSplitTxs=[];
    Object.entries(S.allLedgerTxs||{}).forEach(([lid,txs])=>{
      const linfo=S.ledgers[lid]||{};
      const cur=S.allLedgerCurrencies[lid]||'MYR';
      const rate=(CURRENCIES[cur]?.rateToMYR||1)/(CURRENCIES['MYR']?.rateToMYR||1);
      Object.values(txs||{}).forEach(t=>{
        const isSplit=(t.splitWith?.length>0)||(t.splitAmounts&&Object.keys(t.splitAmounts).length>1);
        if(t.type==='expense'&&isSplit){
          allSplitTxs.push({...t,_lid:lid,_lname:linfo.name||lid,_licon:linfo.icon||'💼',amount:(t.amount||0)*rate});
        }
      });
    });
    allSplitTxs.sort((a,b)=>(b.ts||0)-(a.ts||0));

    const pendingRows=allDbs.length?allDbs.map(d=>{
      const f=resolveMem(d.from,d.lid),t=resolveMem(d.to,d.lid);
      const iOwe=d.from===me;const theyOwe=d.to===me;
      return`<div style="padding:16px;background:rgba(255,255,255,0.04);border:1px solid ${iOwe?'rgba(255,107,107,0.2)':theyOwe?'rgba(105,210,160,0.2)':'var(--border)'};border-radius:16px;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="font-size:11px;background:rgba(108,99,255,0.15);color:var(--accent);padding:3px 8px;border-radius:8px;font-weight:600">${d.licon} ${d.lname}</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <span style="font-size:26px">${f.avatar||'👤'}</span>
          <div style="flex:1">
            <p style="font-size:14px;font-weight:700">${f.displayName||d.from} → ${t.displayName||d.to}</p>
            <p style="font-size:11px;color:var(--dim)">${iOwe?'You owe':theyOwe?'You are owed':'Outstanding balance'}</p>
          </div>
          <p style="font-family:var(--font-num);font-size:18px;font-weight:700;color:${iOwe?'var(--red)':theyOwe?'var(--green)':'var(--yellow)'}">${fmtMYR(d.amount)}</p>
        </div>
        <div style="display:flex;gap:8px">
          <button onclick="openSettleModal('${d.from}','${d.to}',${d.amount.toFixed(2)},'${d.lid}')" style="flex:1;padding:10px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer">✓ Settle Up</button>
          ${theyOwe?`<button onclick="goPaymentMethods()" style="padding:10px 14px;border-radius:12px;background:rgba(255,255,255,0.06);color:var(--muted);font-size:13px;font-weight:600;border:1px solid var(--border);cursor:pointer">💳</button>`:''}
        </div>
      </div>`;
    }).join(''):`<div style="text-align:center;padding:30px 0">
      <p style="font-size:32px;margin-bottom:10px">🎉</p>
      <p style="font-size:16px;font-weight:700;color:var(--green)">All settled up!</p>
      <p style="font-size:13px;color:var(--dim);margin-top:4px">No outstanding amounts across all ledgers</p>
    </div>`;

    const settledRows=filteredAll.length
      ?filteredAll.map(s=>buildSettleRow(s._sk,s,resolveMem(s.from,s._lid),resolveMem(s.to,s._lid),true,fmtMYR(s._amtMYR),'<span style="color:var(--accent)">'+s._licon+' '+s._lname+'</span>')).join('')
      :`<div style="text-align:center;padding:30px 0;color:var(--dim);font-size:13px">No ${histFilter==='active'?'unreviewed':histFilter==='complete'?'reviewed':'settlement'} records.</div>`;

    const splitHistRows=allSplitTxs.length
      ?allSplitTxs.map(t=>buildSplitHistRow(t,true)).join('')
      :`<div style="text-align:center;padding:30px 0;color:var(--dim);font-size:13px">No split transactions yet.</div>`;

    const settledTabLabel='Settled'+( unreviewedAll>0?' <span style="background:var(--yellow);color:#000;font-size:9px;font-weight:700;border-radius:999px;padding:1px 5px;margin-left:2px">'+unreviewedAll+'</span>':' ('+allSettleLog.length+')');

    return`<div class="fade-in" style="padding-bottom:40px">
      <div style="padding:52px 20px 0;display:flex;align-items:center;gap:14px">
        <button onclick="goHome()" style="background:rgba(255,255,255,0.07);border:none;border-radius:12px;padding:8px 12px;font-size:16px;color:var(--text);cursor:pointer">←</button>
        <div style="flex:1">
          <p style="font-size:20px;font-weight:700">Splits & Settle</p>
          <p style="font-size:11px;color:var(--muted)">🌐 All Ledgers</p>
        </div>
      </div>
      <div style="display:flex;gap:10px;padding:16px 20px 0">
        <div style="flex:1;background:${allDbs.length?'rgba(255,107,107,0.08)':'rgba(105,210,160,0.08)'};border:1px solid ${allDbs.length?'rgba(255,107,107,0.2)':'rgba(105,210,160,0.2)'};border-radius:14px;padding:12px">
          <p style="font-size:10px;color:${allDbs.length?'var(--red)':'var(--green)'};font-weight:600;letter-spacing:0.06em;margin-bottom:4px">PENDING</p>
          <p style="font-family:var(--font-num);font-size:18px;font-weight:700">${fmtMYR(totalPending)}</p>
          <p style="font-size:10px;color:var(--dim);margin-top:2px">${allDbs.length} balance${allDbs.length!==1?'s':''}</p>
        </div>
        <div style="flex:1;background:rgba(105,210,160,0.06);border:1px solid rgba(105,210,160,0.2);border-radius:14px;padding:12px">
          <p style="font-size:10px;color:var(--green);font-weight:600;letter-spacing:0.06em;margin-bottom:4px">SETTLED</p>
          <p style="font-family:var(--font-num);font-size:18px;font-weight:700">${fmtMYR(totalSettled)}</p>
          <p style="font-size:10px;color:var(--dim);margin-top:2px">${allSettleLog.length} record${allSettleLog.length!==1?'s':''}</p>
        </div>
      </div>
      <div class="tab-bar" style="margin-top:14px">
        <button class="tab-btn ${tab==='pending'?'active':''}" onclick="setSplitsTab('pending')">Pending (${allDbs.length})</button>
        <button class="tab-btn ${tab==='settled'?'active':''}" onclick="setSplitsTab('settled')">${settledTabLabel}</button>
        <button class="tab-btn ${tab==='splitHistory'?'active':''}" onclick="setSplitsTab('splitHistory')">History (${allSplitTxs.length})</button>
      </div>
      ${tab==='settled'?buildFilterPills(allSettleLog.length,unreviewedAll,allSettleLog.length-unreviewedAll):''}
      <div style="padding:${tab==='pending'?'16':'12'}px 20px 0">
        ${tab==='pending'?pendingRows:tab==='settled'?settledRows:splitHistRows}
      </div>
    </div>`;
  }

  // ── SINGLE LEDGER VIEW ──
  const dbs=debts();
  const settleLog=Object.entries(S.settlements||{}).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0));
  const unreviewedCount=settleLog.filter(([,s])=>!s.reviewed).length;
  const filteredSettleLog=histFilter==='active'?settleLog.filter(([,s])=>!s.reviewed):histFilter==='complete'?settleLog.filter(([,s])=>s.reviewed):settleLog;

  // All split transactions for this ledger
  const splitTxs=txArr().filter(t=>{
    if(t.type!=='expense')return false;
    return(t.splitWith?.length>0)||(t.splitAmounts&&Object.keys(t.splitAmounts).length>1);
  }).sort((a,b)=>(b.ts||0)-(a.ts||0));

  const pendingRows=dbs.length?dbs.map(d=>{
    const f=getMem(d.from),t=getMem(d.to);
    const iOwe=d.from===me;const theyOwe=d.to===me;
    return`<div style="padding:16px;background:rgba(255,255,255,0.04);border:1px solid ${iOwe?'rgba(255,107,107,0.2)':theyOwe?'rgba(105,210,160,0.2)':'var(--border)'};border-radius:16px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <span style="font-size:26px">${f.avatar}</span>
        <div style="flex:1">
          <p style="font-size:14px;font-weight:700">${f.displayName} → ${t.displayName}</p>
          <p style="font-size:11px;color:var(--dim)">${iOwe?'You owe':theyOwe?'You are owed':'Outstanding balance'}</p>
        </div>
        <p style="font-family:var(--font-num);font-size:18px;font-weight:700;color:${iOwe?'var(--red)':theyOwe?'var(--green)':'var(--yellow)'}">${fmt(d.amount)}</p>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="openSettleModal('${d.from}','${d.to}',${d.amount.toFixed(2)})" style="flex:1;padding:10px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer">✓ Settle Up</button>
        ${theyOwe?`<button onclick="goPaymentMethods()" style="padding:10px 14px;border-radius:12px;background:rgba(255,255,255,0.06);color:var(--muted);font-size:13px;font-weight:600;border:1px solid var(--border);cursor:pointer">💳 Payment Info</button>`:''}
      </div>
    </div>`;
  }).join(''):`<div style="text-align:center;padding:30px 0">
    <p style="font-size:32px;margin-bottom:10px">🎉</p>
    <p style="font-size:16px;font-weight:700;color:var(--green)">All settled up!</p>
    <p style="font-size:13px;color:var(--dim);margin-top:4px">No outstanding amounts</p>
  </div>`;

  const settledRows=filteredSettleLog.length
    ?filteredSettleLog.map(([sk,s])=>buildSettleRow(sk,s,getMem(s.from),getMem(s.to),false,fmt(s.amount),'')).join('')
    :`<div style="text-align:center;padding:30px 0;color:var(--dim);font-size:13px">No ${histFilter==='active'?'unreviewed':histFilter==='complete'?'reviewed':'settlement'} records.</div>`;

  const splitHistRows=splitTxs.length
    ?splitTxs.map(t=>buildSplitHistRow(t,false)).join('')
    :`<div style="text-align:center;padding:30px 0;color:var(--dim);font-size:13px">No split transactions yet.</div>`;

  const settledTabLabel='Settled'+(unreviewedCount>0?' <span style="background:var(--yellow);color:#000;font-size:9px;font-weight:700;border-radius:999px;padding:1px 5px;margin-left:2px">'+unreviewedCount+'</span>':' ('+settleLog.length+')');

  return`<div class="fade-in" style="padding-bottom:40px">
    <div style="padding:52px 20px 0;display:flex;align-items:center;gap:14px">
      <button onclick="goHome()" style="background:rgba(255,255,255,0.07);border:none;border-radius:12px;padding:8px 12px;font-size:16px;color:var(--text);cursor:pointer">←</button>
      <p style="font-size:20px;font-weight:700;flex:1">Splits & Settle</p>
    </div>
    <div class="tab-bar" style="margin-top:18px">
      <button class="tab-btn ${tab==='pending'?'active':''}" onclick="setSplitsTab('pending')">Pending (${dbs.length})</button>
      <button class="tab-btn ${tab==='settled'?'active':''}" onclick="setSplitsTab('settled')">${settledTabLabel}</button>
      <button class="tab-btn ${tab==='splitHistory'?'active':''}" onclick="setSplitsTab('splitHistory')">History (${splitTxs.length})</button>
    </div>
    ${tab==='settled'?buildFilterPills(settleLog.length,unreviewedCount,settleLog.length-unreviewedCount):''}
    <div style="padding:${tab==='pending'?'16':'12'}px 20px 0">
      ${tab==='pending'?pendingRows:tab==='settled'?settledRows:splitHistRows}
    </div>
  </div>`;
}


// ── Ledger context badge — shown on preference pages so user knows which ledger they're editing ──

  if(S.totalView){
    return`<div style="display:inline-flex;align-items:center;gap:7px;background:rgba(108,99,255,0.1);border:1px solid rgba(108,99,255,0.22);border-radius:10px;padding:5px 12px;margin-bottom:18px">
      <span style="font-size:14px">🌐</span>
      <span style="font-size:12px;font-weight:600;color:var(--accent)">All Ledgers</span>
    </div>`;
  }
  const linfo=S.ledgers[S.activeLedgerId]||{};
  const name=linfo.name||'This Ledger';
  const icon=linfo.icon||'📒';
  return`<div style="display:inline-flex;align-items:center;gap:7px;background:rgba(108,99,255,0.1);border:1px solid rgba(108,99,255,0.22);border-radius:10px;padding:5px 12px;margin-bottom:18px">
    <span style="font-size:14px">${icon}</span>
    <span style="font-size:12px;font-weight:600;color:var(--accent)">${name}</span>
  </div>`;
}

        <div style="display:flex;align-items:center;gap:10px">

      <button onclick="copyPaymentDetail(${i})" style="margin-top:12px;width:100%;padding:10px;border-radius:12px;background:rgba(108,99,255,0.1);color:var(--accent);font-size:13px;font-weight:600;border:1px solid rgba(108,99,255,0.2);cursor:pointer">📋 Copy Details</button>

    <div style="padding:52px 20px 0;display:flex;align-items:center;gap:14px">
      <button onclick="goHome()" style="background:rgba(255,255,255,0.07);border:none;border-radius:12px;padding:8px 12px;font-size:16px;color:var(--text);cursor:pointer">←</button>
      <p style="font-size:20px;font-weight:700;flex:1">Payment Methods</p>
    </div>
    <div style="padding:16px 20px 0">
      ${ledgerContextBadge()}
      <p style="font-size:13px;color:var(--muted);margin-bottom:18px">Add your payment details or QR codes so friends and family can easily pay you back.</p>
      ${methodCards||`<div style="text-align:center;padding:20px 0 28px">
        <p style="font-size:32px;margin-bottom:10px">💳</p>
        <p style="font-size:14px;font-weight:600">No payment methods yet</p>
        <p style="font-size:12px;color:var(--dim);margin-top:4px">Add a bank account, e-wallet, or QR code</p>
      </div>`}

      <!-- Add new method -->
      <div class="surface" style="padding:18px;border-radius:18px;margin-top:4px">
        <p style="font-size:14px;font-weight:700;margin-bottom:14px">➕ Add Payment Method</p>
        <div style="margin-bottom:10px">
          <p class="label" style="margin-bottom:8px">Icon</p>
          ${buildIconPicker('pm')}
        </div>
        <div style="margin-bottom:10px">
          <p class="label" style="margin-bottom:6px">Name</p>
          <input id="pmName" class="fw-input" type="text" placeholder="e.g. Maybank, Touch N Go, DuitNow...">
        </div>
        <div style="margin-bottom:10px">
          <p class="label" style="margin-bottom:6px">Account / Number / Username</p>
          <input id="pmDetail" class="fw-input" type="text" placeholder="e.g. 012-3456789, @username...">
        </div>
        <div style="margin-bottom:14px">
          <p class="label" style="margin-bottom:6px">QR Code Image <span style="font-size:10px;color:var(--dim);text-transform:none;letter-spacing:0">(optional)</span></p>
          <label style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.15);cursor:pointer">
            <span style="font-size:18px">📷</span>
            <span style="font-size:13px;color:var(--muted)">Tap to upload QR image</span>
            <input id="pmQrInput" type="file" accept="image/*" style="display:none" onchange="previewQr(this)">

          <div>
            <p id="pmNamePreview" style="font-size:14px;font-weight:600;color:var(--text)">Payment Method</p>
