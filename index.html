const auth=getAuth(app),db=getDatabase(app);

// ── CURRENCIES ──
const CURRENCIES={
  MYR:{symbol:'RM', name:'Malaysian Ringgit',  flag:'🇲🇾', rateToMYR:1},
  USD:{symbol:'$',  name:'US Dollar',           flag:'🇺🇸', rateToMYR:4.72},

// Convert amount from any currency to ledger currency (via MYR as base)
function convertToLedger(amount, fromCurrency){
  if(!fromCurrency||fromCurrency===S.ledgerCurrency)return amount;
  const from=CURRENCIES[fromCurrency];
  const to=CURRENCIES[S.ledgerCurrency];
  if(!from||!to)return amount;
  const inMYR=amount*(from.rateToMYR||1);
  return inMYR/(to.rateToMYR||1);
}
function fmtConverted(amount, fromCurrency){
  const converted=convertToLedger(amount,fromCurrency);

function td(){return new Date().toISOString().slice(0,10);}
function getCats(){return Object.keys(S.cats).length?S.cats:DEFAULT_CATS;}
function getCur(){return CURRENCIES[S.ledgerCurrency]||CURRENCIES.MYR;}
function fmt(n,cur){const c=cur?CURRENCIES[cur]:getCur();return(c?c.symbol:'RM')+' '+Number(n).toFixed(2);}
function genCode(n=6){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:n},()=>c[~~(Math.random()*c.length)]).join('');}
function dlabel(str){const now=new Date();now.setHours(0,0,0,0);const d=new Date(str+'T00:00:00');const diff=Math.round((now-d)/86400000);if(diff===0)return'Today';if(diff===1)return'Yesterday';return d.toLocaleDateString('en-MY',{weekday:'short',month:'short',day:'numeric'});}
function txArr(){return Object.entries(S.txs||{}).map(([k,v])=>({...v,_k:k})).sort((a,b)=>b.date.localeCompare(a.date)||(b.ts||0)-(a.ts||0));}
// getMem handles both real Firebase members AND guest members (guest:true stored in ledgerMembers)
function getMem(id){return(S.members&&S.members[id])?{...S.members[id],id}:{id,displayName:id,avatar:'👤',color:'#999',guest:false};}
function allMembers(){return Object.entries(S.members||{}).map(([id,m])=>({id,...m}));}
function filtered(){const f=S.filterMember,all=txArr();return f==='all'?all:all.filter(t=>t.member===f||(t.splitWith||[]).includes(f));}
function debts(){
  const d={};
  txArr().forEach(t=>{
    if(t.type==='expense'&&t.splitAmounts&&Object.keys(t.splitAmounts).length>1){
      Object.entries(t.splitAmounts).forEach(([uid,amt])=>{if(uid!==t.member){const k=uid+'->'+t.member;d[k]=(d[k]||0)+amt;}});
    }else if(t.splitWith?.length&&t.type==='expense'){
      const sh=t.amount/(t.splitWith.length+1);
      t.splitWith.forEach(p=>{const k=p+'->'+t.member;d[k]=(d[k]||0)+sh;});
    }
  });
  // subtract settlements
  Object.values(S.settlements||{}).forEach(s=>{
    const k=s.from+'->'+s.to;
    d[k]=(d[k]||0)-s.amount;
    // also reduce the reverse direction if negative
  });
  // net out: if A owes B and B owes A, simplify
  const netted={};
  Object.entries(d).forEach(([k,v])=>{
    const[f,t]=k.split('->');
    const rev=t+'->'+f;
    if(netted[rev]!==undefined){
      if(v>netted[rev]){netted[k]=v-netted[rev];delete netted[rev];}
      else{netted[rev]=netted[rev]-v;if(netted[rev]<=0.005)delete netted[rev];}
    } else { netted[k]=v; }
  });
  return Object.entries(netted).filter(([,v])=>v>0.005).map(([k,v])=>{const[f,t]=k.split('->');return{from:f,to:t,amount:v};});
}
function allTimeTotals(){
  const all=txArr();
  const inc=all.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=all.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  return{inc,exp,bal:inc-exp};
}
function monthlyTotals(ym){
  const now=new Date();
  const month=ym||(now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'));
  const m=txArr().filter(t=>t.date&&t.date.startsWith(month));
  const inc=m.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=m.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  return{inc,exp,bal:inc-exp,month};
}

async function mkLedger(name,icon,currency='MYR'){
  const lid=push(ref(db,'ledgers')).key;
  const up={};
  up[`ledgers/${lid}`]={id:lid,name,icon,inviteCode:genCode(6),owner:S.user.uid,createdAt:Date.now(),members:{[S.user.uid]:true},currency};
  up[`userLedgers/${S.user.uid}/${lid}`]={name,icon,role:'owner'};
  up[`ledgerMembers/${lid}/${S.user.uid}`]={displayName:S.profile.displayName,avatar:S.profile.avatar,color:S.profile.color,role:'owner',joinedAt:Date.now()};
  await update(ref(db),up);return lid;
}
async function switchLedger(lid){
  S.listeners.forEach(({r,fn})=>{try{off(r,'value',fn);}catch(e){}});
  S.listeners=[];S.activeLedgerId=lid;S.filterMember='all';S.view='home';
  localStorage.setItem('fw_lid_'+S.user.uid,lid);
  const listen=(path,cb,tag)=>{const r=ref(db,path);const fn=s=>cb(s);onValue(r,fn);S.listeners.push({r,fn,tag});};
  listen('ledgerTransactions/'+lid,s=>{S.txs=s.exists()?s.val():{};safeRender();});
  listen('ledgerMembers/'+lid,s=>{S.members=s.exists()?s.val():{};safeRender();});
  listen('ledgerCategories/'+lid,s=>{S.cats=s.exists()?s.val():{};safeRender();});
  listen('ledgers/'+lid+'/budgets/'+S.budgetMonth,s=>{S.budgets=s.exists()?s.val():{};safeRender();},'budget');
  listen('ledgers/'+lid+'/currency',s=>{S.ledgerCurrency=s.exists()?s.val():'MYR';safeRender();});
  listen('ledgers/'+lid+'/assets',s=>{S.assets=s.exists()?s.val():{};safeRender();});
  listen('ledgers/'+lid+'/recurring',s=>{S.recurring=s.exists()?s.val():{};safeRender();});
  listen('ledgers/'+lid+'/settlements',s=>{S.settlements=s.exists()?s.val():{};safeRender();});
  const ms=await get(ref(db,`ledgerMembers/${lid}/${S.user.uid}`));
  if(!ms.exists())await set(ref(db,`ledgerMembers/${lid}/${S.user.uid}`),{displayName:S.profile.displayName,avatar:S.profile.avatar,color:S.profile.color,role:'member',joinedAt:Date.now()});
  // Small delay so listeners populate S.recurring before we process
  setTimeout(()=>processRecurring(),1500);
}

// Re-subscribe budget listener when month changes
function switchBudgetMonth(ym){

  S.listeners=S.listeners.filter(({r,fn,tag})=>{

    return true;

  onValue(r,fn);S.listeners.push({r,fn,tag:'budget'});
}

async function joinByCode(code,msgEl){
  if(!code||code.length!==6){if(msgEl){msgEl.style.color='var(--red)';msgEl.textContent='Enter a valid 6-character code.';}return;}
  try{
    const snap=await get(ref(db,'ledgers'));if(!snap.exists()){if(msgEl){msgEl.style.color='var(--red)';msgEl.textContent='No ledgers found.';}return;}
    let tid=null,tl=null;snap.forEach(c=>{if(c.val().inviteCode===code){tid=c.key;tl=c.val();}});
    if(!tid){if(msgEl){msgEl.style.color='var(--red)';msgEl.textContent='Invalid invite code.';}return;}
    if(S.ledgers[tid]){if(msgEl){msgEl.style.color='var(--accent2)';msgEl.textContent='Already a member!';}return;}
    const up={};
    up[`ledgers/${tid}/members/${S.user.uid}`]=true;
    up[`userLedgers/${S.user.uid}/${tid}`]={name:tl.name,icon:tl.icon||'💼',role:'member'};
    up[`ledgerMembers/${tid}/${S.user.uid}`]={displayName:S.profile.displayName,avatar:S.profile.avatar,color:S.profile.color,role:'member',joinedAt:Date.now()};
    await update(ref(db),up);S.ledgers[tid]={name:tl.name,icon:tl.icon||'💼',role:'member'};
    if(msgEl){msgEl.style.color='var(--green)';msgEl.textContent='✓ Joined "'+tl.name+'"!';}
    await switchLedger(tid);return tl.name;
  }catch(e){if(msgEl){msgEl.style.color='var(--red)';msgEl.textContent='Error: '+e.message;}}
}

// ── STATISTICS VIEW ──
function renderStats(){
  const ym=S.statsMonth;
  const [yr,mo]=ym.split('-').map(Number);
  const nowYm=new Date().toISOString().slice(0,7);
  const isCurrentMonth=ym===nowYm;
  const monthLabel=new Date(yr,mo-1,1).toLocaleDateString('en-MY',{month:'short',year:'numeric'});
  const cats=getCats();
  const mems=S.members||{};
  const memList=[{id:'all',displayName:'All',avatar:'👥',color:'#6C63FF'},...Object.entries(mems).map(([id,m])=>({id,...m}))];
  const memFilter=S.statsMember;
  const isFiltered=memFilter!=='all';
  const filteredMem=isFiltered?getMem(memFilter):null;

  // All txs for month
  const all=txArr();
  const monthAll=all.filter(t=>t.date&&t.date.startsWith(ym));

  // For filtered member: include txs where they paid OR they're in splitWith/splitAmounts
  const monthTxs=isFiltered
    ?monthAll.filter(t=>t.member===memFilter||(t.splitWith||[]).includes(memFilter)||(t.splitAmounts&&t.splitAmounts[memFilter]!=null))
    :monthAll;

  // Helper: get a member's actual share from a tx
  function getMemberShare(t,uid){
    if(t.type!=='expense')return 0;
    if(t.splitAmounts&&t.splitAmounts[uid]!=null)return t.splitAmounts[uid];
    if(t.splitWith?.length>0){
      const all=[t.member,...t.splitWith];
      if(all.includes(uid))return t.amount/all.length;
    }
    if(t.member===uid&&!t.splitWith?.length&&(!t.splitAmounts||Object.keys(t.splitAmounts).length<=1))return t.amount;
    return 0;
  }

  // Filtered income/expense: for a specific member, expense = their share
  let inc,exp;
  if(isFiltered){
    inc=monthTxs.filter(t=>t.type==='income'&&t.member===memFilter).reduce((s,t)=>s+t.amount,0);
    exp=monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+getMemberShare(t,memFilter),0);
  } else {
    inc=monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    exp=monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  }
  const net=inc-exp;

  // Prev month
  const prevYm=`${mo===1?yr-1:yr}-${String(mo===1?12:mo-1).padStart(2,'0')}`;
  const prevAll=all.filter(t=>t.date&&t.date.startsWith(prevYm));
  const prevTxs=isFiltered
    ?prevAll.filter(t=>t.member===memFilter||(t.splitWith||[]).includes(memFilter)||(t.splitAmounts&&t.splitAmounts[memFilter]!=null))
    :prevAll;
  let prevInc,prevExp2;
  if(isFiltered){
    prevInc=prevTxs.filter(t=>t.type==='income'&&t.member===memFilter).reduce((s,t)=>s+t.amount,0);
    prevExp2=prevTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+getMemberShare(t,memFilter),0);
  } else {
    prevInc=prevTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    prevExp2=prevTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  }
  const prevNet=prevInc-prevExp2;
  const incChg=prevInc>0?((inc-prevInc)/prevInc*100):null;
  const expChg=prevExp2>0?((exp-prevExp2)/prevExp2*100):null;
  const netChg=prevNet!==0?((net-prevNet)/Math.abs(prevNet)*100):null;

  // Category breakdown
  const catData=Object.entries(cats).filter(([k])=>k!=='income').map(([key,cat])=>{
    let total;
    if(isFiltered){
      total=monthTxs.filter(t=>t.category===key&&t.type==='expense').reduce((s,t)=>s+getMemberShare(t,memFilter),0);
    } else {
      total=monthTxs.filter(t=>t.category===key&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
    }
    const subcats=cat.subcats?Object.entries(cat.subcats).map(([sk,sv])=>({
      key:sk,label:sv,
      total:isFiltered
        ?monthTxs.filter(t=>t.category===key&&t.subcat===sk&&t.type==='expense').reduce((s,t)=>s+getMemberShare(t,memFilter),0)
        :monthTxs.filter(t=>t.category===key&&t.subcat===sk&&t.type==='expense').reduce((s,t)=>s+t.amount,0)
    })).filter(s=>s.total>0):[];
    return{key,...cat,total,subcats};
  }).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  // Member split breakdown — shown in overview when "All" selected
  const memberShareData=Object.entries(mems).map(([id,m])=>{
    const share=monthAll.filter(t=>t.type==='expense').reduce((s,t)=>s+getMemberShare(t,id),0);
    const splitShare=monthAll.filter(t=>t.type==='expense'&&(t.splitWith?.length>0||Object.keys(t.splitAmounts||{}).length>1)).reduce((s,t)=>s+getMemberShare(t,id),0);
    const soloShare=share-splitShare;
    const earned=monthAll.filter(t=>t.type==='income'&&t.member===id).reduce((s,t)=>s+t.amount,0);
    return{id,...m,share,splitShare,soloShare,earned};
  }).filter(m=>m.share>0||m.earned>0).sort((a,b)=>b.share-a.share);
  const totalShare=memberShareData.reduce((s,m)=>s+m.share,0);
  const sharedExpTotal=monthAll.filter(t=>t.type==='expense'&&(t.splitWith?.length>0||Object.keys(t.splitAmounts||{}).length>1)).reduce((s,t)=>s+t.amount,0);

  // Filtered member's split transactions detail
  const memberSplitTxs=isFiltered?monthTxs.filter(t=>t.type==='expense'&&(t.splitWith?.length>0||Object.keys(t.splitAmounts||{}).length>1)):[];

  // Trend: last 6 months
  const trendMonths=[];
  for(let i=5;i>=0;i--){
    const d=new Date(yr,mo-1-i,1);
    const tym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    let tExp,tInc;
    if(isFiltered){
      const ttxs=all.filter(t=>t.date&&t.date.startsWith(tym)&&(t.member===memFilter||(t.splitWith||[]).includes(memFilter)||(t.splitAmounts&&t.splitAmounts[memFilter]!=null)));
      tExp=ttxs.filter(t=>t.type==='expense').reduce((s,t)=>s+getMemberShare(t,memFilter),0);
      tInc=ttxs.filter(t=>t.type==='income'&&t.member===memFilter).reduce((s,t)=>s+t.amount,0);
    } else {
      tExp=all.filter(t=>t.date&&t.date.startsWith(tym)&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
      tInc=all.filter(t=>t.date&&t.date.startsWith(tym)&&t.type==='income').reduce((s,t)=>s+t.amount,0);
    }
    trendMonths.push({ym:tym,label:d.toLocaleDateString('en-MY',{month:'short'}),exp:tExp,inc:tInc});
  }
  const maxTrend=Math.max(...trendMonths.map(t=>Math.max(t.exp,t.inc)),1);

  // Build donut
  function buildDonut(data,totalVal,colorFn,labelFn){
    if(!totalVal)return`<circle cx="110" cy="110" r="70" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="28"/>`;
    let off=0;
    return data.map(item=>{
      const pct=item.val/totalVal*100;
      const circ=2*Math.PI*70;
      const dash=pct/100*circ;
      const seg=`<circle cx="110" cy="110" r="70" fill="none" stroke="${colorFn(item)}" stroke-width="28"
        stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-circ*off/100}"
        transform="rotate(-90 110 110)"/>`;
      off+=pct;return seg;
    }).join('');
  }

  const overviewContent=`
    <!-- Income / Expense cards -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:14px">
        <p style="font-size:11px;color:var(--muted);margin-bottom:5px">Income</p>
        <p style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:#4A9EFF">${fmt(inc)}</p>
        ${incChg!==null?`<div style="margin-top:6px;padding:4px 8px;border-radius:8px;background:${incChg<=0?'rgba(255,107,107,0.15)':'rgba(105,210,160,0.15)'};display:inline-block">
          <p style="font-size:10px;color:${incChg<=0?'var(--red)':'var(--green)'};font-weight:600">${incChg>0?'+':''}${incChg.toFixed(1)}% vs last mo</p>
        </div>`:''}
      </div>
      <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:14px">
        <p style="font-size:11px;color:var(--muted);margin-bottom:5px">Expense</p>
        <p style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--text)">${fmt(exp)}</p>
        ${expChg!==null?`<div style="margin-top:6px;padding:4px 8px;border-radius:8px;background:${expChg>=0?'rgba(255,107,107,0.15)':'rgba(105,210,160,0.15)'};display:inline-block">
          <p style="font-size:10px;color:${expChg>=0?'var(--red)':'var(--green)'};font-weight:600">${expChg>0?'+':''}${expChg.toFixed(1)}% vs last mo</p>
        </div>`:''}

            <div style="display:flex;justify-content:space-between;font-size:11px">
              <span style="color:var(--green)">+${fmt(m.inc)}</span>
              <span style="color:var(--red)">-${fmt(m.exp)}</span>
            </div>
          </div>
          <p style="font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:${mNet>=0?'var(--green)':'var(--red)'};min-width:70px;text-align:right">${mNet>=0?'+':''}${fmt(Math.abs(mNet))}</p>
        </div>`;

  const tabs=['overview','budget','trend'];
  const tabLabels={overview:'Overview',budget:'Budget',trend:'Trend'};

  return`<div class="fade-in settings-page" style="padding-top:0">
    <div style="position:sticky;top:0;z-index:20;background:var(--bg);padding-top:52px">

        ${tabs.map(t=>`<button data-stab="${t}" style="flex:1;padding:12px 8px;font-size:13px;font-weight:700;background:none;border:none;border-bottom:2px solid ${S.statsTab===t?'var(--accent)':'transparent'};color:${S.statsTab===t?'var(--accent)':'var(--muted)'};cursor:pointer;font-family:'Sora',sans-serif">${tabLabels[t]}</button>`).join('')}

function attachStatsListeners(){
  // Remove old listeners by cloning
  ['statsPrevBtn','statsNextBtn'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){const clone=el.cloneNode(true);el.parentNode.replaceChild(clone,el);}
  });
  document.querySelectorAll('[data-stab],[data-smem],[data-sync-budget]').forEach(btn=>{
    const clone=btn.cloneNode(true);btn.parentNode.replaceChild(clone,btn);
  });

  document.querySelectorAll('[data-stab]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      S.statsTab=btn.dataset.stab;
      if(S.statsTab==='budget'&&S.budgetMonth!==S.statsMonth)switchBudgetMonth(S.statsMonth);
      renderPage();
    });
  });
  document.getElementById('statsPrevBtn')?.addEventListener('click',()=>{
    const[yr,mo]=S.statsMonth.split('-').map(Number);
    S.statsMonth=`${mo===1?yr-1:yr}-${String(mo===1?12:mo-1).padStart(2,'0')}`;
    if(S.statsTab==='budget')switchBudgetMonth(S.statsMonth);
    else renderPage();
  });
  document.getElementById('statsNextBtn')?.addEventListener('click',()=>{
    const[yr,mo]=S.statsMonth.split('-').map(Number);
    const next=`${mo===12?yr+1:yr}-${String(mo===12?1:mo+1).padStart(2,'0')}`;
    if(next<=new Date().toISOString().slice(0,7)){
      S.statsMonth=next;
      if(S.statsTab==='budget')switchBudgetMonth(S.statsMonth);
      else renderPage();
    }
  });
  document.querySelectorAll('[data-smem]').forEach(btn=>{
    btn.addEventListener('click',()=>{S.statsMember=btn.dataset.smem;renderPage();});
  });
  document.querySelector('[data-sync-budget]')?.addEventListener('click',()=>{
    switchBudgetMonth(S.statsMonth);
  });
}

// ── CALENDAR VIEW ──
function renderCalendar(){
  const ym=S.calendarMonth;
  const [yr,mo]=ym.split('-').map(Number);
  const nowYm=new Date().toISOString().slice(0,7);
  const todayStr=td();
  const isCurrentMonth=ym===nowYm;
  const monthLabel=new Date(yr,mo-1,1).toLocaleDateString('en-MY',{month:'short',year:'numeric'});

  // All txs for this month
  const all=txArr();
  const monthTxs=all.filter(t=>t.date&&t.date.startsWith(ym));

  // Build daily totals map: date -> {inc, exp}
  const daily={};
  monthTxs.forEach(t=>{
    if(!daily[t.date])daily[t.date]={inc:0,exp:0};
    if(t.type==='income')daily[t.date].inc+=t.amount;
    else daily[t.date].exp+=t.amount;
  });

  // Month summary
  const totalInc=monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const totalExp=monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance=totalInc-totalExp;

  // Carry-over: sum of all transactions before this month
  const carryOver=all.filter(t=>t.date&&t.date<ym+'-01').reduce((s,t)=>s+(t.type==='income'?t.amount:-t.amount),0);

  // Calendar grid: find first day of month (0=Sun)
  const firstDay=new Date(yr,mo-1,1).getDay();
  const daysInMonth=new Date(yr,mo,0).getDate();
  const cur=getCur();

  // Build grid cells
  const cells=[];
  // Empty cells before first day
  for(let i=0;i<firstDay;i++)cells.push(null);
  // Day cells
  for(let d=1;d<=daysInMonth;d++)cells.push(d);

  const DAY_LABELS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // Selected day transactions
  const selDay=S.calendarDay;
  const selDayTxs=selDay?all.filter(t=>t.date===selDay).sort((a,b)=>(b.ts||0)-(a.ts||0)):[];
  const cats=getCats();

  return`<div class="fade-in" style="display:flex;flex-direction:column;height:100%">

    <!-- HEADER -->
    <div style="padding:52px 16px 0;display:flex;align-items:center;gap:8px">
      <button id="calPrevBtn" style="width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.07);border:none;color:var(--text);font-size:18px;cursor:pointer;flex-shrink:0">‹</button>
      <div style="flex:1;text-align:center">
        <p style="font-size:17px;font-weight:700;letter-spacing:-0.01em">${monthLabel}${isCurrentMonth?'':''} <span style="color:var(--dim);font-size:14px">▾</span></p>
      </div>
      <button id="calNextBtn" style="width:34px;height:34px;border-radius:10px;background:${isCurrentMonth?'rgba(255,255,255,0.03)':'rgba(255,255,255,0.07)'};border:none;color:${isCurrentMonth?'var(--dim)':'var(--text)'};font-size:18px;cursor:pointer;flex-shrink:0" ${isCurrentMonth?'disabled':''}>›</button>
    </div>

    <!-- SUMMARY ROW -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;margin:12px 16px 0;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;overflow:hidden">
      <div style="padding:10px 14px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)">
        <p style="font-size:10px;color:var(--muted);margin-bottom:2px">Income</p>
        <p style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:#4A9EFF">${fmt(totalInc)}</p>
      </div>
      <div style="padding:10px 14px;border-bottom:1px solid var(--border)">
        <p style="font-size:10px;color:var(--muted);margin-bottom:2px">Expense</p>
        <p style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--red)">${fmt(totalExp)}</p>
      </div>
      <div style="padding:10px 14px;border-right:1px solid var(--border)">
        <p style="font-size:10px;color:var(--muted);margin-bottom:2px">Carry-over</p>
        <p style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--text)">${fmt(Math.abs(carryOver))}</p>
      </div>
      <div style="padding:10px 14px">
        <p style="font-size:10px;color:var(--muted);margin-bottom:2px">Balance</p>
        <p style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:${balance+carryOver>=0?'#4A9EFF':'var(--red)'}"> ${fmt(Math.abs(balance+carryOver))}</p>
      </div>
    </div>

    <!-- DAY LABELS -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);padding:10px 16px 0;gap:0">
      ${DAY_LABELS.map((d,i)=>`<div style="text-align:center;font-size:11px;font-weight:700;color:${i===0?'var(--red)':i===6?'#4A9EFF':'var(--muted)'};padding:4px 0">${d}</div>`).join('')}
    </div>

    <!-- CALENDAR GRID -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);padding:0 16px;gap:0;flex:1">
      ${cells.map((d,i)=>{
        if(!d)return`<div style="border:0.5px solid rgba(255,255,255,0.05);min-height:62px"></div>`;
        const dateStr=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dd=daily[dateStr]||{inc:0,exp:0};
        const isToday=dateStr===todayStr;
        const isSel=dateStr===selDay;
        const col=(i%7);
        const dayColor=col===0?'var(--red)':col===6?'#4A9EFF':'var(--text)';
        const future=dateStr>todayStr;
        return`<div onclick="selectCalDay('${dateStr}')" style="border:0.5px solid rgba(255,255,255,0.05);min-height:62px;padding:5px 4px;cursor:pointer;background:${isSel?'rgba(108,99,255,0.25)':isToday?'rgba(108,99,255,0.15)':'transparent'};position:relative;transition:background 0.15s">
          <p style="font-size:12px;font-weight:${isToday?'700':'500'};color:${isToday?'var(--accent)':future?'var(--dim)':dayColor};text-align:center;line-height:1.2">${d}</p>
          ${dd.inc>0?`<p style="font-size:9px;color:#4A9EFF;text-align:center;margin-top:2px;font-family:'DM Mono',monospace;line-height:1.2">${shortFmt(dd.inc)}</p>`:''}
          ${dd.exp>0?`<p style="font-size:9px;color:var(--red);text-align:center;margin-top:1px;font-family:'DM Mono',monospace;line-height:1.2">${shortFmt(dd.exp)}</p>`:''}
          ${isToday?`<div style="position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--accent)"></div>`:''}
        </div>`;
      }).join('')}
    </div>

    <!-- SELECTED DAY PANEL -->
    ${selDay?`
    <div style="margin:0 16px 8px;border-top:1px solid var(--border);padding-top:12px;max-height:240px;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <p style="font-size:13px;font-weight:700">${new Date(selDay+'T00:00:00').toLocaleDateString('en-MY',{weekday:'long',day:'numeric',month:'long'})}</p>
        <button onclick="selectCalDay(null)" style="background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:0 4px">×</button>
      </div>
      ${selDayTxs.length===0
        ?`<p style="font-size:13px;color:var(--dim);text-align:center;padding:12px 0">No transactions</p>`
        :selDayTxs.map(t=>{
          const cat=cats[t.category]||DEFAULT_CATS.other;
          const mem=getMem(t.member);
          return`<div class="tx-row surface" onclick="openTxModal('${t._k}')" style="margin-bottom:6px">
            <div class="tx-icon" style="background:${cat.color}22;width:36px;height:36px;border-radius:11px">${cat.icon}</div>
            <div class="tx-info">
              <p class="tx-desc" style="font-size:13px">${t.description}</p>
              <span class="tag" style="background:${(mem.color||'#999')}33;color:${mem.color||'#999'};font-size:10px">${mem.avatar} ${mem.displayName}</span>
            </div>
            <p class="tx-amount" style="color:${t.type==='income'?'var(--green)':'var(--text)'}; font-size:14px">${t.type==='income'?'+':'-'}${fmt(t.amount)}</p>
          </div>`;
        }).join('')}
    </div>`
    :`<div style="height:8px"></div>`}
  </div>`;
}

// Short format: show K for thousands to fit in calendar cell
function shortFmt(n){
  const c=getCur();
  const sym=c?c.symbol:'RM';
  if(n>=1000)return sym+(n/1000).toFixed(1)+'K';
  return sym+n.toFixed(0);
}

function attachCalendarListeners(){
  document.getElementById('calPrevBtn')?.addEventListener('click',()=>{
    const[yr,mo]=S.calendarMonth.split('-').map(Number);
    const ny=mo===1?yr-1:yr,nm=mo===1?12:mo-1;
    S.calendarMonth=`${ny}-${String(nm).padStart(2,'0')}`;
    S.calendarDay=null;
    renderPage();
  });
  document.getElementById('calNextBtn')?.addEventListener('click',()=>{
    const[yr,mo]=S.calendarMonth.split('-').map(Number);

      S.calendarMonth=next;S.calendarDay=null;renderPage();
    }
  });
}

// ── HISTORY VIEW ──
function renderHistory(){
  const ym=S.historyMonth;
  const [yr,mo]=ym.split('-').map(Number);
  const nowYm=new Date().toISOString().slice(0,7);
  const monthLabel=new Date(yr,mo-1,1).toLocaleDateString('en-MY',{month:'long',year:'numeric'});
  const prevYm=`${mo===1?yr-1:yr}-${String(mo===1?12:mo-1).padStart(2,'0')}`;
  const nextYm=`${mo===12?yr+1:yr}-${String(mo===12?1:mo+1).padStart(2,'0')}`;
  const isCurrentMonth=ym===nowYm;

  // All transactions for this month, respecting member filter
  const f=S.filterMember;
  const all=txArr();
  const filtered=f==='all'?all:all.filter(t=>t.member===f||(t.splitWith||[]).includes(f));
  const monthTxs=filtered.filter(t=>t.date&&t.date.startsWith(ym));
  const inc=monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal=inc-exp;

  // Month budget
  const nowMonthBudgets=ym===S.budgetMonth?S.budgets:{};
  // We only have budget data for S.budgetMonth so we just don't show it for other months — budget is managed separately
  const catBgt=Object.entries(S.budgets||{}).filter(([k])=>k!=='_total'&&ym===S.budgetMonth).reduce((s,[,v])=>s+(parseFloat(v)||0),0);
  const manualBgt=ym===S.budgetMonth?parseFloat(S.budgets?._total)||0:0;
  const totalBudget=manualBgt>0?manualBgt:catBgt;
  const budgetUsedPct=totalBudget>0?Math.min(100,(exp/totalBudget)*100):0;
  const budgetBarColor=exp>totalBudget?'var(--red)':budgetUsedPct>80?'var(--yellow)':'#6C63FF';

  // Category breakdown for this month
  const cats=getCats();
  const catBreakdown=Object.entries(cats).filter(([k])=>k!=='income').map(([key,cat])=>({
    key,...cat,
    total:monthTxs.filter(t=>t.category===key&&t.type==='expense').reduce((s,t)=>s+t.amount,0)
  })).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  // Member breakdown for this month
  const mems=S.members||{};
  const memberBreakdown=Object.entries(mems).map(([id,m])=>({
    id,...m,
    spent:monthTxs.filter(t=>t.member===id&&t.type==='expense').reduce((s,t)=>s+t.amount,0),
    earned:monthTxs.filter(t=>t.member===id&&t.type==='income').reduce((s,t)=>s+t.amount,0)
  })).filter(m=>m.spent>0||m.earned>0).sort((a,b)=>b.spent-a.spent);

  // vs prev month
  const prevMonthTxs=all.filter(t=>t.type==='expense'&&t.date?.startsWith(prevYm));
  const prevExp=prevMonthTxs.reduce((s,t)=>s+t.amount,0);
  const vsLast=prevExp>0?((exp-prevExp)/prevExp*100):null;

  // Group transactions by date for the list
  const g={};
  monthTxs.sort((a,b)=>b.date.localeCompare(a.date)||(b.ts||0)-(a.ts||0)).forEach(t=>{
    if(!g[t.date])g[t.date]=[];g[t.date].push(t);
  });

  // Get all months that have any transactions, for the month selector dots
  const allMonths=[...new Set(all.map(t=>t.date?.slice(0,7)).filter(Boolean))].sort().reverse();

  return`<div class="fade-in" style="padding-bottom:20px">

    <!-- Header -->
    <div style="padding:52px 20px 0;display:flex;justify-content:space-between;align-items:center">
      <p style="font-size:22px;font-weight:700;letter-spacing:-0.02em">History</p>
      <div style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:20px;padding:7px 13px">
        <span style="font-size:11px;color:var(--muted)">Total Balance</span>
        <span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--accent)">${fmt(Math.abs(allTimeTotals().bal))}</span>
      </div>
    </div>

    <!-- Month Navigator -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0">
      <button id="histPrevBtn" style="width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center">‹</button>
      <div style="text-align:center">
        <p style="font-size:17px;font-weight:700">${monthLabel}</p>
        ${isCurrentMonth?'<p style="font-size:10px;color:var(--accent);font-weight:600;letter-spacing:0.06em">CURRENT MONTH</p>':''}
      </div>
      <button id="histNextBtn" style="width:38px;height:38px;border-radius:12px;background:${isCurrentMonth?'rgba(255,255,255,0.03)':'rgba(255,255,255,0.07)'};border:1px solid var(--border);color:${isCurrentMonth?'var(--dim)':'var(--text)'};font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center" ${isCurrentMonth?'disabled':''}>›</button>
    </div>

    <!-- Month dots: quick jump to any month with transactions -->
    ${allMonths.length>1?`<div style="display:flex;gap:6px;padding:12px 20px 0;overflow-x:auto;-webkit-overflow-scrolling:touch">

        <div class="budget-bar-track"><div class="budget-bar-fill" style="width:${budgetUsedPct}%;background:${budgetBarColor}"></div></div>

          ${exp>totalBudget?'⚠️ Over by '+fmt(exp-totalBudget):'✓ Remaining: '+fmt(totalBudget-exp)+' ('+Math.round(100-budgetUsedPct)+'%)'}
        </p>
      </div>`:''}

      <!-- Category breakdown -->
      ${catBreakdown.length?`
      <p style="font-size:11px;color:var(--dim);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px">By Category</p>
      ${catBreakdown.map(c=>{
        const pct=exp>0?Math.round(c.total/exp*100):0;
        return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div style="width:32px;height:32px;border-radius:10px;background:${c.color}22;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${c.icon}</div>

          <span style="font-size:11px;color:var(--dim);min-width:30px;text-align:right">${pct}%</span>

      <!-- Member breakdown -->
      ${memberBreakdown.length?`
      <p style="font-size:11px;color:var(--dim);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-top:${catBreakdown.length?12:0}px;margin-bottom:10px">By Member</p>
      ${memberBreakdown.map(m=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:12px;background:rgba(255,255,255,0.03);margin-bottom:6px">
        <span style="font-size:20px">${m.avatar}</span>
        <span style="font-size:13px;font-weight:600;flex:1">${m.displayName}</span>
        ${m.spent>0?`<span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--red)">-${fmt(m.spent)}</span>`:''}
        ${m.earned>0?`<span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--green);margin-left:6px">+${fmt(m.earned)}</span>`:''}
      </div>`).join('')}`:''}

      <!-- vs last month -->
      ${vsLast!==null?`<div style="margin-top:12px;text-align:center">

          vs last month: <strong style="color:${vsLast<=0?'var(--green)':'var(--red)'}">${vsLast>0?'+':''}${vsLast.toFixed(1)}% ${vsLast<=0?'decrease':'increase'}</strong>
        </span>
      </div>`:``}
    </div>

    <!-- Transaction List -->
    <div style="padding:0 20px">
      ${monthTxs.length===0
        ?`<div class="empty" style="padding:30px 0">No transactions in ${monthLabel}</div>`
        :Object.entries(g).map(([date,txs])=>`
        <div style="margin-top:18px">
          <p class="tx-date-label">${dlabel(date)}</p>
          <div class="tx-list" style="margin-top:8px">
            ${txs.map(t=>{
              const cat=cats[t.category]||DEFAULT_CATS.other;
              const mem=getMem(t.member);
              const hs=(t.splitWith?.length>0)||(Object.keys(t.splitAmounts||{}).length>1);
              return`<div class="tx-row surface" onclick="openTxModal('${t._k}')">
                <div class="tx-icon" style="background:${cat.color}22">${cat.icon}</div>
                <div class="tx-info">
                  <p class="tx-desc">${t.description}</p>
                  <div class="tx-meta">
                    <span class="tag" style="background:${(mem.color||'#999')}33;color:${mem.color||'#999'}">${mem.avatar} ${mem.displayName}</span>

                    ${t.fromRecurringId?`<span class="tag" style="background:rgba(78,205,196,0.12);color:var(--accent2)">🔄</span>`:''}
                  </div>
                </div>
                <p class="tx-amount" style="color:${t.type==='income'?'var(--green)':'var(--text)'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</p>
              </div>`;
            }).join('')}
          </div>
        </div>`).join('')
      }
    </div>

    <div style="height:30px"></div>
  </div>`;
}

window.goHistory=()=>{S.view='history';render();};
window.setHistoryMonth=ym=>{S.historyMonth=ym;renderPage();};

function attachHistoryListeners(){
  const ym=S.historyMonth;
  document.getElementById('histPrevBtn')?.addEventListener('click',()=>{
    const[yr,mo]=ym.split('-').map(Number);
    const ny=mo===1?yr-1:yr,nm=mo===1?12:mo-1;
    window.setHistoryMonth(`${ny}-${String(nm).padStart(2,'0')}`);
  });
  document.getElementById('histNextBtn')?.addEventListener('click',()=>{
    const[yr,mo]=ym.split('-').map(Number);
    const ny=mo===12?yr+1:yr,nm=mo===12?1:mo+1;
    const next=`${ny}-${String(nm).padStart(2,'0')}`;
    if(next<=new Date().toISOString().slice(0,7))window.setHistoryMonth(next);
  });
}

function renderTxs(fil){
  if(!fil.length)return'<div class="empty">No transactions yet.<br>Tap + to add one!</div>';
  const g={};fil.forEach(t=>{const l=dlabel(t.date);if(!g[l])g[l]=[];g[l].push(t);});
  const cats=getCats();
  return Object.entries(g).map(([lbl,txs])=>`
    <div class="tx-group"><p class="tx-date-label">${lbl}</p><div class="tx-list">
      ${txs.map(t=>{
        const cat=cats[t.category]||DEFAULT_CATS.other;
        const mem=getMem(t.member);
        const hs=(t.splitWith?.length>0)||(Object.keys(t.splitAmounts||{}).length>1);
        const subcatLabel=t.subcat&&cat.subcats?.[t.subcat]?` · ${cat.subcats[t.subcat]}`:'';
        return`<div class="tx-row surface" onclick="openTxModal('${t._k}')">
          <div class="tx-icon" style="background:${cat.color}22">${cat.icon}</div>
          <div class="tx-info">
            <p class="tx-desc">${t.description}</p>
            <div class="tx-meta">
              <span class="tag" style="background:${(mem.color||'#999')}33;color:${mem.color||'#999'}">${mem.avatar} ${mem.displayName}</span>
              ${subcatLabel?`<span class="tag" style="background:rgba(255,255,255,0.06);color:var(--muted)">${subcatLabel.trim()}</span>`:''}
              ${hs?`<span class="tag" style="background:rgba(108,99,255,0.15);color:var(--accent)">÷split</span>`:''}
              ${t.fromRecurringId?`<span class="tag" style="background:rgba(78,205,196,0.12);color:var(--accent2)">🔄 recur</span>`:''}
              ${t.currency&&t.currency!==S.ledgerCurrency?`<span class="tag" style="background:rgba(78,205,196,0.15);color:var(--accent2)">${t.currency}</span>`:''}
              ${t.assetId&&S.assets[t.assetId]?`<span class="tag" style="background:rgba(108,99,255,0.12);color:var(--accent)">${getAssetType(S.assets[t.assetId].type).icon} ${S.assets[t.assetId].name}</span>`:''}
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <p class="tx-amount" style="color:${t.type==='income'?'var(--green)':'var(--text)'}">${t.type==='income'?'+':'-'}${fmt(t.amount,S.ledgerCurrency)}</p>
            ${t.origAmount&&t.currency&&t.currency!==S.ledgerCurrency?`<p style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px">${t.type==='income'?'+':'-'}${fmt(t.origAmount,t.currency)}</p>`:''}
          </div>
        </div>`;
      }).join('')}
    </div></div>`).join('');
}

function renderAnalytics(fil,totalExp){
  const cats=getCats();
  const catData=Object.entries(cats).filter(([k])=>k!=='income').map(([key,cat])=>({
    key,...cat,
    total:fil.filter(t=>t.category===key&&t.type==='expense').reduce((s,t)=>s+t.amount,0),
    budget:S.budgets?.[key]||0
  })).filter(c=>c.total>0||c.budget>0).sort((a,b)=>b.total-a.total);
  const bars=catData.length?catData.map(c=>{
    const budgetPct=c.budget>0?Math.min(100,(c.total/c.budget)*100):totalExp>0?Math.min(100,(c.total/totalExp)*100):0;
    const overBudget=c.budget>0&&c.total>c.budget;
    return`<div class="cat-bar-row">
      <div class="cat-bar-header">
        <span style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">${c.icon}</span><span style="color:var(--muted)">${c.label}</span></span>
        <span style="font-family:'DM Mono',monospace;font-size:13px">${fmt(c.total)}${c.budget>0?` <span style="color:var(--dim);font-size:11px">/ ${fmt(c.budget)}</span>`:''}</span>
      </div>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="background:${overBudget?'var(--red)':c.color};width:${budgetPct}%"></div></div>
      ${overBudget?`<p class="budget-over">Over by ${fmt(c.total-c.budget)}</p>`:c.budget>0&&budgetPct>80?`<p class="budget-warning">${Math.round(budgetPct)}% used</p>`:''}
    </div>`;}).join(''):'<p class="empty">No expense data yet.</p>';
  const dbs=debts();
  const dRows=dbs.length?dbs.map(d=>{const f=getMem(d.from),t=getMem(d.to);
    return`<div class="debt-row surface" style="display:flex;align-items:center;gap:12px;padding:12px 15px;border-radius:14px;margin-bottom:8px">
      <span style="font-size:20px">${f.avatar}</span>
      <span style="font-size:13px;color:var(--muted);flex:1">${f.displayName} owes ${t.displayName}</span>
      <span style="font-family:'DM Mono',monospace;font-size:14px;color:var(--yellow);font-weight:600">${fmt(d.amount)}</span>
      <button onclick="openSettleModal('${d.from}','${d.to}',${d.amount.toFixed(2)})" style="padding:6px 12px;border-radius:10px;background:rgba(105,210,160,0.15);color:var(--green);font-size:12px;font-weight:700;border:1px solid rgba(105,210,160,0.3);flex-shrink:0">Settle</button>
    </div>`;
  }).join(''):'<p style="font-size:13px;color:var(--dim)">No split balances. 🎉</p>';
  const settleLog=Object.entries(S.settlements||{}).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0)).slice(0,8).map(([sk,s])=>{
    const f=getMem(s.from),t=getMem(s.to);
    return`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;margin-bottom:6px;background:rgba(105,210,160,0.06);border:1px solid rgba(105,210,160,0.15)">
      <span style="font-size:18px">${f.avatar}</span>
      <div style="flex:1;min-width:0">
        <p style="font-size:13px;font-weight:600">${f.displayName} → ${t.displayName}</p>
        <p style="font-size:11px;color:var(--dim)">${s.note||'Settled'} · ${s.date||''}</p>
      </div>
      <span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--green);font-weight:600">${fmt(s.amount)}</span>
      <button onclick="deleteSettle('${sk}')" style="font-size:10px;padding:3px 8px;border-radius:7px;background:rgba(255,107,107,0.12);color:var(--red);font-weight:600;border:none">✕</button>
    </div>`;
  }).join('');
  const mStats=Object.entries(S.members||{}).map(([id,m])=>({id,...m,spent:txArr().filter(t=>t.member===id&&t.type==='expense').reduce((s,t)=>s+t.amount,0),earned:txArr().filter(t=>t.member===id&&t.type==='income').reduce((s,t)=>s+t.amount,0)})).filter(m=>m.spent>0||m.earned>0);
  return`
    <div class="analytics-section"><p class="label" style="margin-bottom:12px">Spending by category</p>${bars}
      <button onclick="goBudget()" style="margin-top:12px;width:100%;padding:12px;border-radius:12px;background:rgba(108,99,255,0.1);color:var(--accent);font-size:13px;font-weight:600;border:1px solid rgba(108,99,255,0.2)">💰 Manage Budgets</button>
    </div>
    <div class="analytics-section" style="margin-top:8px"><p class="label" style="margin-bottom:12px">Split balances owed</p>${dRows}
      ${settleLog?`<p class="label" style="margin-bottom:10px;margin-top:18px">Settlement History</p>${settleLog}`:''}
    </div>
    <div class="analytics-section" style="margin-top:8px"><p class="label" style="margin-bottom:12px">Per member</p>
      ${mStats.map(m=>`<div class="settings-row surface" style="margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">${m.avatar}</span><div><p style="font-size:13px;font-weight:600">${m.displayName}${m.guest?'<span class="guest-badge">GUEST</span>':''}</p><p style="font-size:11px;color:var(--dim)">Spent ${fmt(m.spent)}</p></div></div>
        <p style="font-family:'DM Mono',monospace;font-size:13px;color:var(--green)">+${fmt(m.earned)}</p>
      </div>`).join('')||'<p style="font-size:13px;color:var(--dim)">No data yet.</p>'}
    </div>`;
}

function buildSplitSection(f,splitMembers){
  if(!splitMembers.length)return'';
  const isEqual=f.splitMode!=='custom';
  const sel=f.splitWith||[];
  const totalAmt=parseFloat(f.amount)||0;
  const equalShare=sel.length>0?totalAmt/(sel.length+1):0;

  const memberBtns=splitMembers.map(m=>`
    <button class="member-box ${sel.includes(m.id)?'active':''}" style="${sel.includes(m.id)?'background:'+(m.color||'#888')+'CC;':''}" onclick="togSplit('${m.id}')">
      <div class="m-avatar">${m.avatar}</div>
      <div>${m.displayName}</div>
      ${m.guest?'<div class="guest-badge">GUEST</div>':''}
      ${sel.includes(m.id)?'<div style="font-size:9px;margin-top:2px">✓</div>':''}
    </button>`).join('');

  let splitDetail='';
  if(sel.length>0){
    if(isEqual){
      splitDetail=`<p class="split-hint">Each pays ${fmt(equalShare,f.currency)}</p>`;
    }else{
      const rows=[f.member,...sel].map(uid=>{
        const m=getMem(uid);const val=f.customSplits[uid]!==undefined?f.customSplits[uid]:'';
        return`<div class="split-member-row">
          <span style="font-size:20px">${m.avatar}</span>
          <span style="flex:1;font-size:13px;font-weight:600">${m.displayName}${uid===f.member?' (paid)':''}${m.guest?' 👻':''}</span>
          <input type="number" inputmode="decimal" class="split-amount-input" placeholder="0.00" value="${val}" oninput="setCustomSplit('${uid}',this.value)">
        </div>`;
      }).join('');
      const splitTotal=Object.values(f.customSplits).reduce((s,v)=>s+(parseFloat(v)||0),0);
      const remaining=totalAmt-splitTotal;
      splitDetail=`<div style="margin-top:10px">${rows}
        <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:12px;color:${Math.abs(remaining)<0.01?'var(--green)':'var(--yellow)'}">
          <span>Allocated</span><span>${fmt(splitTotal,f.currency)} / ${fmt(totalAmt,f.currency)}</span>
        </div>
        ${Math.abs(remaining)>0.01?`<p style="font-size:11px;color:var(--yellow);margin-top:4px">Remaining: ${fmt(remaining,f.currency)}</p>`:'<p style="font-size:11px;color:var(--green);margin-top:4px">✓ Balanced</p>'}
      </div>`;
    }
  }

  return`<div class="form-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <p class="label">Split with</p>
      ${sel.length>0?`<div style="display:flex;gap:6px">
        <button onclick="setSplitMode('equal')" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;background:${isEqual?'var(--accent)':'rgba(255,255,255,0.06)'};color:${isEqual?'#fff':'var(--muted)'}">Equal</button>
        <button onclick="setSplitMode('custom')" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;background:${!isEqual?'var(--accent)':'rgba(255,255,255,0.06)'};color:${!isEqual?'#fff':'var(--muted)'}">Custom</button>
      </div>`:''}
    </div>
    <div class="member-grid">${memberBtns}</div>
    ${splitDetail}
  </div>`;
}

// ── ASSET PICKER for Add/Edit form ──
function buildAssetPicker(f){
  const assetArr=Object.entries(S.assets||{}).map(([id,a])=>({id,...a}));
  if(!assetArr.length)return'';
  const selectedAsset=assetArr.find(a=>a.id===f.assetId);
  const t_sel=selectedAsset?getAssetType(selectedAsset.type):null;
  const options=assetArr.map(a=>{
    const t=getAssetType(a.type);
    const bal=parseFloat(a.balance)||0;
    const isCredit=a.type==='credit';
    return`<button class="member-box ${f.assetId===a.id?'active':''}"
      style="min-width:80px;${f.assetId===a.id?'background:'+t.color+'33;border:1.5px solid '+t.color+';':''}"
      onclick="pickAsset('${a.id}','${a.currency||S.ledgerCurrency}')">
      <div class="m-avatar" style="font-size:18px">${t.icon}</div>
      <div style="font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:72px">${a.name}</div>
      <div style="font-size:10px;color:${isCredit&&bal>0?'var(--red)':bal<0?'var(--red)':'var(--accent2)'};font-family:'DM Mono',monospace;margin-top:2px">${fmt(Math.abs(bal),a.currency||S.ledgerCurrency)}</div>
    </button>`;
  }).join('');
  const noneBtn=`<button class="member-box ${!f.assetId?'active':''}"
    style="${!f.assetId?'background:rgba(255,255,255,0.1);':''}"
    onclick="setFF('assetId','');renderPage()">
    <div class="m-avatar" style="font-size:18px">💼</div>
    <div style="font-size:11px;font-weight:700">None</div>
    <div style="font-size:10px;color:var(--dim);margin-top:2px">—</div>
  </button>`;
  const selAssetCur=selectedAsset?.currency||S.ledgerCurrency;
  const txAmtInAssetCur=parseFloat(f.amount)||0;
  const txAmtInLedgerCur=f.currency!==S.ledgerCurrency?convertToLedger(txAmtInAssetCur,f.currency):txAmtInAssetCur;
  const hint=selectedAsset?`<p style="font-size:11px;color:var(--accent2);text-align:center;margin-top:8px;line-height:1.7">
    ${t_sel.icon} ${selectedAsset.name} balance will be ${f.type==='expense'?'reduced by':'increased by'}
    <strong>${fmt(txAmtInAssetCur,selAssetCur)}</strong>
    ${selAssetCur!==S.ledgerCurrency&&f.currency===selAssetCur?`<br>Recorded as <strong>${fmtConverted(txAmtInAssetCur,selAssetCur)}</strong> in ${S.ledgerCurrency}`:''}
  </p>`:'';
  return`<div class="form-section">
    <p class="label" style="margin-bottom:10px">Asset Account <span style="color:var(--dim);text-transform:none;letter-spacing:0;font-size:11px">(optional)</span></p>
    <div class="member-grid">${noneBtn}${options}</div>
    ${hint}
  </div>`;
}

          ${t.origAmount&&t.currency&&t.currency!==S.ledgerCurrency?`<p style="font-size:13px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px">${t.type==='income'?'+':'-'}${fmt(t.origAmount,t.currency)}</p>`:''}
          <p style="font-size:15px;font-weight:600;margin-top:4px">${t.description}</p>
          <p style="font-size:12px;color:var(--muted);margin-top:2px">${cat.icon} ${cat.label}${subcatLabel?' · '+subcatLabel:''} · ${t.date}</p>
        </div>
        <button onclick="editTx('${t._k}')" style="background:rgba(108,99,255,0.15);color:var(--accent);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;flex-shrink:0;margin-left:12px">✏️ Edit</button>
      </div>
      ${hasSplit?`<div style="border-top:1px solid var(--border);padding-top:16px;margin-bottom:16px"><p class="label" style="margin-bottom:12px">Split breakdown</p>${rows}</div>`:''}
      <button style="width:100%;padding:12px;border-radius:12px;background:rgba(255,107,107,0.12);color:var(--red);font-size:13px;font-weight:600;border:1px solid rgba(255,107,107,0.2);font-family:'Sora',sans-serif" onclick="delTxModal('${t._k}')">🗑 Delete Transaction</button>

function renderSettleModal(){
  const mc=document.getElementById('modalContainer');if(!mc)return;
  if(!S.settleModal){if(!S.splitModal)mc.innerHTML='';return;}
  const{fromId,toId,maxAmt}=S.settleModal;
  const f=getMem(fromId),t=getMem(toId);

  // Build DOM directly — avoids module-scope issue with inline onclick strings
  mc.innerHTML='';
  const overlay=document.createElement('div');
  overlay.className='modal-overlay fade-in';
  overlay.addEventListener('click',()=>closeSettleModal());

  const sheet=document.createElement('div');
  sheet.className='modal-sheet';
  sheet.addEventListener('click',e=>e.stopPropagation());
  sheet.innerHTML=`
    <div class="modal-handle"></div>
    <p style="font-size:18px;font-weight:700;margin-bottom:6px">💸 Settle Up</p>
    <div style="display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;background:rgba(105,210,160,0.08);border:1px solid rgba(105,210,160,0.2);margin-bottom:20px">
      <span style="font-size:28px">${f.avatar}</span>
      <div style="flex:1"><p style="font-size:14px;font-weight:600">${f.displayName}</p><p style="font-size:11px;color:var(--muted)">paying back</p></div>
      <span style="font-size:20px">→</span>
      <div style="text-align:right"><p style="font-size:14px;font-weight:600">${t.displayName}</p><span style="font-size:28px">${t.avatar}</span></div>
    </div>
    <p class="label" style="margin-bottom:8px">Amount to Settle</p>
    <div class="surface input-card" style="margin-bottom:14px;padding:14px 16px">
      <input id="settleAmt" type="number" inputmode="decimal" class="big-input" placeholder="0.00" value="${maxAmt.toFixed(2)}" style="font-size:28px">
      <p style="font-size:11px;color:var(--dim);margin-top:4px">Max owed: ${fmt(maxAmt)}</p>
    </div>
    <p class="label" style="margin-bottom:8px">Note (optional)</p>
    <div class="surface input-card" style="margin-bottom:20px">
      <input id="settleNote" type="text" class="normal-input" placeholder="e.g. Cash transfer, PayNow…">
    </div>
    <button id="settleConfirmBtn" class="btn-primary" style="margin-bottom:10px">✓ Record Settlement</button>
    <button id="settleCancelBtn" style="width:100%;padding:13px;border-radius:14px;background:rgba(255,255,255,0.05);color:var(--muted);font-size:14px;font-weight:600;border:none;font-family:'Sora',sans-serif;cursor:pointer">Cancel</button>`;

  overlay.appendChild(sheet);
  mc.appendChild(overlay);

  // Attach listeners after DOM is appended
  document.getElementById('settleConfirmBtn').addEventListener('click',async()=>{
    const amt=parseFloat(document.getElementById('settleAmt')?.value)||0;
    const note=document.getElementById('settleNote')?.value.trim()||'';
    if(amt<=0){toast('Enter a valid amount','var(--red)');return;}
    if(amt>maxAmt+0.01){toast('Amount exceeds what is owed','var(--red)');return;}
    try{
      const k=push(ref(db,'ledgers/'+S.activeLedgerId+'/settlements')).key;
      await set(ref(db,'ledgers/'+S.activeLedgerId+'/settlements/'+k),{
        from:fromId,to:toId,amount:amt,note,date:td(),ts:Date.now(),by:S.user.uid
      });
      S.settleModal=null;mc.innerHTML='';
      toast('✓ Settlement recorded');
      goHome('analytics');
    }catch(e){toast('Error: '+e.message,'var(--red)');}
  });
  document.getElementById('settleCancelBtn').addEventListener('click',()=>closeSettleModal());
}

window.openSettleModal=(fromId,toId,maxAmt)=>{
  S.settleModal={fromId,toId,maxAmt:parseFloat(maxAmt)};
  renderSettleModal();
};
window.closeSettleModal=()=>{S.settleModal=null;const mc=document.getElementById('modalContainer');if(mc&&!S.splitModal)mc.innerHTML=''};
window.deleteSettle=async sk=>{
  if(!confirm('Remove this settlement record?'))return;
  try{
    await remove(ref(db,'ledgers/'+S.activeLedgerId+'/settlements/'+sk));
    toast('Settlement removed','var(--muted)');
    renderPage();
  }catch(e){toast('Error: '+e.message,'var(--red)');}
};

function attachBudgetListeners(){
  const lid=S.activeLedgerId;
  const ym=S.budgetMonth;
  const basePath='ledgers/'+lid+'/budgets/'+ym+'/';

  // Clone & replace buttons to remove any previously attached listeners
  ['budgetBackBtn','budgetPrevBtn','budgetNextBtn','bgt__total_save','budgetCopyBtn'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){const clone=el.cloneNode(true);el.parentNode.replaceChild(clone,el);}
  });
  document.querySelectorAll('.bgt-cat-save').forEach(btn=>{
    const clone=btn.cloneNode(true);btn.parentNode.replaceChild(clone,btn);
  });

  document.getElementById('budgetBackBtn')?.addEventListener('click',()=>{
    const nowYm=new Date().toISOString().slice(0,7);
    if(ym!==nowYm)switchBudgetMonth(nowYm);
    goHome('analytics');
  });

  document.getElementById('budgetPrevBtn')?.addEventListener('click',()=>{
    const[yr,mo]=S.budgetMonth.split('-').map(Number);
    const ny=mo===1?yr-1:yr, nm=mo===1?12:mo-1;
    switchBudgetMonth(`${ny}-${String(nm).padStart(2,'0')}`);
  });
  document.getElementById('budgetNextBtn')?.addEventListener('click',()=>{
    const[yr,mo]=S.budgetMonth.split('-').map(Number);
    const ny=mo===12?yr+1:yr, nm=mo===12?1:mo+1;
    switchBudgetMonth(`${ny}-${String(nm).padStart(2,'0')}`);
  });

  document.getElementById('bgt__total_save')?.addEventListener('click',async()=>{
    const val=parseFloat(document.getElementById('bgt__total')?.value||'0')||0;
    try{
      if(val<=0){await remove(ref(db,basePath+'_total'));}
      else{await set(ref(db,basePath+'_total'),val);}
      toast('✓ Total budget saved');
    }catch(e){toast('Error: '+e.message,'var(--red)');}
  });

  document.getElementById('budgetCopyBtn')?.addEventListener('click',async()=>{
    const[yr,mo]=ym.split('-').map(Number);
    const py=mo===1?yr-1:yr, pm=mo===1?12:mo-1;
    const prevYm=`${py}-${String(pm).padStart(2,'0')}`;
    try{
      const snap=await get(ref(db,'ledgers/'+lid+'/budgets/'+prevYm));
      if(!snap.exists()){toast('No budgets found for previous month','var(--muted)');return;}
      await set(ref(db,'ledgers/'+lid+'/budgets/'+ym),snap.val());
      toast('✓ Copied from '+new Date(py,pm-1,1).toLocaleDateString('en-MY',{month:'long',year:'numeric'}));
    }catch(e){toast('Error: '+e.message,'var(--red)');}
  });

  document.querySelectorAll('.bgt-cat-save').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const key=btn.dataset.catkey;
      const inp=document.querySelector(`.bgt-cat-input[data-catkey="${key}"]`);
      const val=parseFloat(inp?.value||'0')||0;
      try{
        if(val<=0){await remove(ref(db,basePath+key));}
        else{await set(ref(db,basePath+key),val);}
        toast('✓ Saved');
      }catch(e){toast('Error: '+e.message,'var(--red)');}
    });
  });
}

let selGuestAv=0,selGuestColor=0;
window.pickGuestAv=i=>{selGuestAv=i;document.querySelectorAll('[id^="gav"]').forEach(b=>b.style.borderColor='transparent');const b=document.getElementById('gav'+i);if(b)b.style.borderColor='var(--accent)';};

window.addGuest=async()=>{
  const name=document.getElementById('guestName')?.value.trim();
  const msg=document.getElementById('guestMsg');
  if(!name){if(msg){msg.style.color='var(--red)';msg.textContent='Enter a name.';}return;}
  const gid='guest_'+Date.now();
  await set(ref(db,`ledgerMembers/${S.activeLedgerId}/${gid}`),{displayName:name,avatar:AVATARS[selGuestAv],color:M_COLORS[selGuestColor],role:'guest',guest:true,joinedAt:Date.now()});
  toast('✓ '+name+' added as guest');
  if(msg){msg.style.color='var(--green)';msg.textContent='✓ Added!';}
  setTimeout(()=>renderPage(),600);
};

window.submitForm=async()=>{
  const f=S.addForm;
  if(!f.amount||isNaN(parseFloat(f.amount))){alert('Enter an amount.');return;}
  if(!f.member){alert('Select who paid.');return;}
  let splitAmounts={};
  if(f.type==='expense'&&f.splitWith.length>0){
    if(f.splitMode==='custom'){
      const all=[f.member,...f.splitWith];
      const total=all.reduce((s,uid)=>s+(parseFloat(f.customSplits[uid])||0),0);
      if(Math.abs(total-parseFloat(f.amount))>0.01){alert('Custom split must equal the total amount.');return;}
      all.forEach(uid=>splitAmounts[uid]=parseFloat(f.customSplits[uid])||0);
    }else{
      const all=[f.member,...f.splitWith];const sh=parseFloat(f.amount)/all.length;
      all.forEach(uid=>splitAmounts[uid]=sh);
    }
  }
  // Determine actual currency: if asset selected, use asset's currency
  const txAsset=f.assetId?S.assets[f.assetId]:null;
  const txCurrency=txAsset?.currency||f.currency||S.ledgerCurrency;
  const origAmount=parseFloat(f.amount);
  const ledgerAmount=convertToLedger(origAmount,txCurrency);
  const data={
    type:f.type,
    amount:ledgerAmount,          // amount in ledger currency (used for totals)
    origAmount:origAmount,        // original entered amount
    currency:txCurrency,          // original currency
    category:f.type==='income'?'income':f.category,
    subcat:f.subcat||null,
    description:f.description.trim()||getCats()[f.category]?.label||f.category,
    member:f.member,splitWith:[...f.splitWith],
    splitAmounts:Object.keys(splitAmounts).length?splitAmounts:null,
    date:f.date||td(),
    assetId:f.assetId||null,
    ts:Date.now(),addedBy:S.user.uid,
  };
  try{
    // If editing, reverse old asset balance change first
    if(S.editTxKey){
      const oldTx=txArr().find(t=>t._k===S.editTxKey);
      if(oldTx?.assetId&&S.assets[oldTx.assetId]){
        const reversal=oldTx.type==='expense'?(oldTx.origAmount||oldTx.amount):-(oldTx.origAmount||oldTx.amount);
        await update(ref(db,'ledgers/'+S.activeLedgerId+'/assets/'+oldTx.assetId),
          {balance:(parseFloat(S.assets[oldTx.assetId].balance)||0)+reversal});
      }
      await update(ref(db,'ledgerTransactions/'+S.activeLedgerId+'/'+S.editTxKey),data);
      toast('✓ Changes saved');
    }else{
      await push(ref(db,'ledgerTransactions/'+S.activeLedgerId),data);
      toast('✓ Entry saved');
    }
    // Update asset balance — use original amount in asset's own currency
    if(f.assetId&&S.assets[f.assetId]){
      const delta=f.type==='expense'?-origAmount:origAmount;
      await update(ref(db,'ledgers/'+S.activeLedgerId+'/assets/'+f.assetId),
        {balance:(parseFloat(S.assets[f.assetId].balance)||0)+delta});
    }
    S.editTxKey=null;S.addForm=null;S.view='home';S.tab='transactions';render();
  }catch(e){alert('Error: '+e.message);}
};

// Compress image using canvas before sending to API (max 1024px, quality 0.85)
async function compressImage(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const MAX=1024;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){
        if(w>h){h=Math.round(h*(MAX/w));w=MAX;}
        else{w=Math.round(w*(MAX/h));h=MAX;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      // Always output as JPEG for consistency
      const dataUrl=canvas.toDataURL('image/jpeg',0.85);
      res({base64:dataUrl.split(',')[1],mimeType:'image/jpeg'});
    };
    img.onerror=rej;
    img.src=url;
  });
}

window.scanSelectedPhoto=async()=>{
  if(!_scanFile){toast('No photo selected','var(--red)');return;}
  const key=(localStorage.getItem('fw_gemini_key')||'').trim();
  if(!key){
    toast('⚠️ Add your Gemini API key in Settings first','var(--yellow)');
    return;
  }
  const status=document.getElementById('scanStatus');
  const statusMsg=document.getElementById('scanStatusMsg');
  const previewWrap=document.getElementById('photoPreviewWrap');
  const scanNowBtn=document.getElementById('scanNowBtn');
  const resultCard=document.getElementById('scanResultCard');
  const resultBody=document.getElementById('scanResultBody');
  const errorBox=document.getElementById('scanErrorBox');
  if(status)status.style.display='block';
  if(previewWrap)previewWrap.style.display='none';
  if(errorBox)errorBox.style.display='none';
  if(scanNowBtn)scanNowBtn.disabled=true;
  try{
    // Step 1: Compress image
    if(statusMsg)statusMsg.textContent='Compressing image...';
    const {base64,mimeType}=await compressImage(_scanFile);
    // Step 2: Call Gemini API
    if(statusMsg)statusMsg.textContent='Reading receipt with AI...';
    const cats=getCats();
    const catKeys=Object.keys(cats).filter(k=>k!=='income').join(', ');
    const resp=await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+key,
      {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          contents:[{parts:[
            {inline_data:{mime_type:mimeType,data:base64}},
            {text:'You are a receipt/invoice reader for a family expense tracker.\nAnalyze this image and extract transaction details.\n\nReturn ONLY a valid JSON object:\n{\n  "amount": <number, total paid>,\n  "description": <string, merchant name max 40 chars>,\n  "date": <string, YYYY-MM-DD, use today if unclear>,\n  "category": <string, ONE of: '+catKeys+'>,\n  "currency": <string, 3-letter code e.g. MYR USD SGD>,\n  "notes": <string, extra item details max 60 chars or "">\n}\nRules: amount is a plain number. Return ONLY the JSON, no markdown.'}
          ]}]
        })
      }
    );
    // Step 3: Handle response
    const responseText=await resp.text();
    if(!resp.ok){
      let errMsg='API error '+resp.status;
      try{
        const errJson=JSON.parse(responseText);
        errMsg=errJson?.error?.message||errMsg;
        // Common error codes
        if(resp.status===400)errMsg='Invalid request or bad image. '+errMsg;
        if(resp.status===401||resp.status===403)errMsg='Invalid API key. Check your key in Settings.';
        if(resp.status===429)errMsg='Rate limit reached. Wait a moment and try again.';
        if(resp.status===503)errMsg='Gemini service unavailable. Try again shortly.';
      }catch(e2){}
      throw new Error(errMsg);
    }
    const data=JSON.parse(responseText);
    const text=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
    if(!text)throw new Error('Empty response from AI. Try a clearer photo.');
    // Step 4: Parse JSON
    const clean=text.replace(/```json|```/g,'').trim();
    let parsed;
    try{parsed=JSON.parse(clean);}
    catch(e){
      // Try to extract JSON from the response
      const match=clean.match(/\{[\s\S]*\}/);
      if(match)try{parsed=JSON.parse(match[0]);}catch(e2){}
      if(!parsed)throw new Error('Could not parse AI response. Try a clearer photo of the receipt.');
    }
    // Step 5: Fill form
    if(parsed.amount)      S.addForm.amount=String(parseFloat(parsed.amount)||'');
    if(parsed.description) S.addForm.description=parsed.description.substring(0,40);
    if(parsed.date)        S.addForm.date=parsed.date;
    if(parsed.category&&cats[parsed.category])S.addForm.category=parsed.category;
    if(parsed.currency&&CURRENCIES[parsed.currency])S.addForm.currency=parsed.currency;
    if(parsed.notes&&parsed.notes.trim()){
      const note=parsed.notes.trim().substring(0,60);
      if(!S.addForm.description.includes(note))
        S.addForm.description=(S.addForm.description+' — '+note).substring(0,80);
    }
    S.addForm.type='expense';S.addForm.subcat='';
    if(status)status.style.display='none';
    // Step 6: Show result card
    const cats2=getCats();const cat2=cats2[S.addForm.category]||DEFAULT_CATS.other;
    if(resultBody){
      const dispCur=S.addForm.currency||S.ledgerCurrency;
      const dispAmt=parseFloat(S.addForm.amount)||0;
      resultBody.innerHTML=

// ── AUTO-PROCESS RECURRING TRANSACTIONS ──
async function processRecurring(){
  const today=td();
  const recArr=Object.entries(S.recurring||{}).map(([id,r])=>({id,...r}));
  const due=recArr.filter(r=>r.nextDate&&r.nextDate<=today);
  if(!due.length)return;
  let posted=0;
  for(const r of due){
    try{
      // Post the transaction
      const txData={
        type:'expense',
        amount:parseFloat(r.amount)||0,
        category:r.category||'other',
        subcat:null,
        description:r.name+(r.name.toLowerCase().includes('auto')?'':' (auto)'),
        member:r.member||S.user.uid,
        splitWith:[],splitAmounts:null,
        date:r.nextDate,
        currency:S.ledgerCurrency,
        assetId:null,
        ts:Date.now(),addedBy:S.user.uid,
        fromRecurringId:r.id,
      };
      await push(ref(db,'ledgerTransactions/'+S.activeLedgerId),txData);
      // Advance nextDate based on frequency
      const next=advanceDate(r.nextDate,r.freq||'monthly');
      await update(ref(db,'ledgers/'+S.activeLedgerId+'/recurring/'+r.id),{nextDate:next});
      posted++;
    }catch(e){console.warn('Recurring post failed:',r.id,e);}
  }
  if(posted>0)toast('🔄 '+posted+' recurring transaction'+(posted>1?'s':'')+' auto-posted');
}

function advanceDate(dateStr,freq){
  const d=new Date(dateStr+'T00:00:00');
  switch(freq){
    case'daily':  d.setDate(d.getDate()+1);break;
    case'weekly': d.setDate(d.getDate()+7);break;
    case'yearly': d.setFullYear(d.getFullYear()+1);break;
    default:      d.setMonth(d.getMonth()+1);break; // monthly
  }
  return d.toISOString().slice(0,10);
}

      <button onclick="setProfTab('ledger')" style="flex:1;padding:10px;border-radius:11px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:${ledgerTab?'rgba(108,99,255,0.8)':'transparent'};color:${ledgerTab?'#fff':'var(--dim)'}">
        ${ledgerInfo.icon||'💳'} Ledger Nickname
      </button>
      <button onclick="setProfTab('app')" style="flex:1;padding:10px;border-radius:11px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:${!ledgerTab?'rgba(108,99,255,0.8)':'transparent'};color:${!ledgerTab?'#fff':'var(--dim)'}">
        👤 App Account
      </button>
    </div>

    ${ledgerTab?`
    <p style="font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.6">
      Your nickname, avatar and color <strong style="color:var(--text)">inside ${ledgerInfo.name||'this ledger'}</strong>. Other ledgers are not affected.
    </p>
    <div class="surface" style="padding:18px;border-radius:18px">
      <p class="label" style="margin-bottom:8px">Nickname</p>
      <input id="profLedgerName" class="fw-input" type="text" placeholder="Your nickname in this ledger" value="${mem.displayName||S.profile?.displayName||''}" style="margin-bottom:18px">
      <p class="label" style="margin-bottom:10px">Avatar</p>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px">
        ${AVATARS.map((a,i)=>`<button onclick="pickProfAv(${i})" class="av-pick-btn ${i===selProfAv?'sel':''}">${a}</button>`).join('')}
      </div>
      <p class="label" style="margin-bottom:10px">Color</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px">
        ${M_COLORS.map((col,i)=>`<div onclick="pickProfColor(${i})" class="color-dot prof-col-dot ${i===selProfColor?'selected':''}" style="background:${col}"></div>`).join('')}
      </div>
      <button class="btn-primary" onclick="saveLedgerProfile()">✓ Save Ledger Nickname</button>
    </div>
    `:`
    <p style="font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.6">
      Your global avatar and name used across all ledgers and on sign-in.
    </p>
    <div class="surface" style="padding:18px;border-radius:18px">
      <p class="label" style="margin-bottom:8px">Display Name</p>
      <input id="profAppName" class="fw-input" type="text" placeholder="Your name" value="${S.profile?.displayName||''}" style="margin-bottom:18px">
      <p style="font-size:11px;color:var(--muted);margin-bottom:16px">Email: <strong style="color:var(--text)">${S.user?.email||''}</strong></p>
      <p class="label" style="margin-bottom:10px">Avatar</p>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px">
        ${AVATARS.map((a,i)=>`<button onclick="pickProfAv(${i})" class="av-pick-btn ${i===selProfAv?'sel':''}">${a}</button>`).join('')}
      </div>
      <p class="label" style="margin-bottom:10px">Color</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px">
        ${M_COLORS.map((col,i)=>`<div onclick="pickProfColor(${i})" class="color-dot prof-col-dot ${i===selProfColor?'selected':''}" style="background:${col}"></div>`).join('')}
      </div>
      <button class="btn-primary" onclick="saveAppProfile()">✓ Save App Account</button>
    </div>
    `}
  </div>`;
}


window.saveLedgerProfile=async()=>{
  const name=document.getElementById('profLedgerName')?.value.trim();
  if(!name){alert('Enter a nickname.');return;}
  const avatar=AVATARS[selProfAv]||AVATARS[0];
  const color=M_COLORS[selProfColor]||M_COLORS[0];
  try{
    await update(ref(db,'ledgerMembers/'+S.activeLedgerId+'/'+S.user.uid),{displayName:name,avatar,color});
    toast('✓ Ledger nickname updated');
    S.view='settings';render();
  }catch(e){alert('Error: '+e.message);}
};

window.saveAppProfile=async()=>{
  const name=document.getElementById('profAppName')?.value.trim();
  if(!name){alert('Enter a display name.');return;}
  const avatar=AVATARS[selProfAv]||AVATARS[0];
  const color=M_COLORS[selProfColor]||M_COLORS[0];
  try{
    await update(ref(db,'users/'+S.user.uid),{displayName:name,avatar,color});
    S.profile={...S.profile,displayName:name,avatar,color};
    toast('✓ App account updated');
    S.view='settings';render();
  }catch(e){alert('Error: '+e.message);}
};

// Keep saveProfile as alias for ledger profile save (used by old references)
window.saveProfile=window.saveLedgerProfile;

// ── WINDOW-EXPOSED PICKER HELPERS (module scope fix) ──

window.pickRecurFreq=i=>{
  selRecurFreq=i;

  const btn=document.querySelectorAll('.freq-btn')[i];

window.pickRecurCat=(key,color)=>{
  const hidden=document.getElementById('rCatHidden');

  document.querySelectorAll('.rcat-chip').forEach(b=>{b.classList.remove('active');b.style.background='';});
  document.querySelectorAll('.rcat-chip[data-catkey="'+key+'"]').forEach(b=>{b.classList.add('active');b.style.background=color;});
};
window.pickProfAv=i=>{
  selProfAv=i;
  document.querySelectorAll('.av-pick-btn').forEach(b=>b.classList.remove('sel'));
  const btn=document.querySelectorAll('.av-pick-btn')[i];
  if(btn)btn.classList.add('sel');

window.pickProfColor=i=>{
  selProfColor=i;
  document.querySelectorAll('.prof-col-dot').forEach(d=>d.classList.remove('selected'));
  const dot=document.querySelectorAll('.prof-col-dot')[i];
  if(dot)dot.classList.add('selected');
};
window.setProfTab=tab=>{profTab=tab;renderPage();};

// ── SAFE AREA GAP FIX ──
// CSS env(safe-area-inset-bottom) can get stale when switching between PWA apps on iOS.
// We measure it via JS and reapply whenever the app becomes visible again.
(function(){
  function applyGap(){
    // Measure actual safe area using a probe element
    var probe=document.createElement('div');
    probe.style.cssText='position:fixed;bottom:0;left:0;width:1px;height:env(safe-area-inset-bottom,0px);pointer-events:none;opacity:0;visibility:hidden';
    document.body.appendChild(probe);
    var safeH=probe.getBoundingClientRect().height||0;
    document.body.removeChild(probe);

    var gap=document.getElementById('navGap');
    var nav=document.getElementById('bottomNav');
    if(gap)gap.style.height=safeH+'px';
    if(nav)nav.style.paddingBottom=(safeH+24)+'px';
    document.querySelectorAll('.page').forEach(function(p){
      p.style.paddingBottom=(90+safeH)+'px';
    });
  }

  applyGap();
  requestAnimationFrame(applyGap);

  // Re-measure whenever app comes back into view (key fix for PWA switching)
  document.addEventListener('visibilitychange',function(){
    if(!document.hidden){applyGap();setTimeout(applyGap,150);setTimeout(applyGap,400);}
  });
  window.addEventListener('pageshow',function(){applyGap();setTimeout(applyGap,150);});
  window.addEventListener('resize',applyGap,{passive:true});
  window.addEventListener('orientationchange',function(){setTimeout(applyGap,300);},{passive:true});
  window.addEventListener('focus',function(){applyGap();},{passive:true});
})();

// ── VIEWPORT & ADDRESS BAR FIX ──
(function(){
  var isStandalone=window.navigator.standalone===true||window.matchMedia('(display-mode:standalone)').matches;
  var app=document.getElementById('app');

  function setHeight(){
    var h=window.innerHeight;
    if(app&&h>100)app.style.height=h+'px';
  }

  if(isStandalone){
    // PWA home screen — fix height precisely, handle keyboard
    setHeight();
    requestAnimationFrame(setHeight);
    if(window.visualViewport){
      window.visualViewport.addEventListener('resize',function(){
        var vvh=window.visualViewport.height;
        if(app){app.style.height=(window.innerHeight-vvh>100?vvh:window.innerHeight)+'px';}
      },{passive:true});
    }
    window.addEventListener('resize',setHeight,{passive:true});
    window.addEventListener('orientationchange',function(){setTimeout(setHeight,300);},{passive:true});
  } else {
    // Safari browser — position scroll trigger 1px below viewport
    // This makes document scrollable so Safari can hide address bar
    var trigger=document.getElementById('scrollTrigger');
    function updateTrigger(){
      var h=window.innerHeight;
      if(app&&h>100)app.style.height=h+'px';
      if(trigger)trigger.style.top=(h+1)+'px';
    }
    updateTrigger();
    requestAnimationFrame(updateTrigger);
    window.addEventListener('resize',updateTrigger,{passive:true});
    window.addEventListener('orientationchange',function(){setTimeout(updateTrigger,300);},{passive:true});
    // When address bar hides, innerHeight increases — update app height
    window.addEventListener('scroll',function(){updateTrigger();},{passive:true});
  }
})();
