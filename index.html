window.submitForm=async()=>{
  const f=S.addForm;
  if(!f.amount||isNaN(parseFloat(f.amount))){alert('Enter an amount.');return;}
  if(!f.member){alert('Select who paid.');return;}
  const origAmount=parseFloat(f.amount);

  // ── PAYERS: resolve who paid cash and how much ──
  const coPayors=f.coPayors||[];
  const payerMode=f.payerMode||'equal';
  let resolvedPayerAmounts={};  // id -> amount they paid
  if(coPayors.length){
    if(payerMode==='equal'){
      const share=origAmount/(coPayors.length+1);
      resolvedPayerAmounts[f.member]=share;
      coPayors.forEach(id=>resolvedPayerAmounts[id]=share);
    }else{
      const coSum=coPayors.reduce((s,id)=>s+(parseFloat((f.payerAmounts||{})[id])||0),0);
      if(coSum>origAmount+0.01){alert('Co-payer total exceeds the amount.');return;}
      resolvedPayerAmounts[f.member]=Math.max(0,origAmount-coSum);
      coPayors.forEach(id=>resolvedPayerAmounts[id]=parseFloat((f.payerAmounts||{})[id])||0);
    }
  }else{
    resolvedPayerAmounts[f.member]=origAmount;
  }

  // ── SPLIT: resolve who incurred the expense and their share ──
  // This is independent of who paid — purely about liability/burden
  let splitAmounts={};
  if(f.type==='expense'&&f.splitWith.length>0){
    const allSplit=[f.member,...f.splitWith];
    if(f.splitMode==='custom'){
      const total=allSplit.reduce((s,uid)=>s+(parseFloat(f.customSplits[uid])||0),0);
      if(Math.abs(total-origAmount)>0.01){alert('Custom split must equal '+fmt(origAmount,f.currency)+'.');return;}
      allSplit.forEach(uid=>splitAmounts[uid]=parseFloat(f.customSplits[uid])||0);
    }else{
      const sh=origAmount/allSplit.length;
      allSplit.forEach(uid=>splitAmounts[uid]=sh);
    }
  }

  const txAsset=f.assetId?S.assets[f.assetId]:null;
  const txCurrency=txAsset?.currency||f.currency||S.ledgerCurrency;
  const ledgerAmount=convertToLedger(origAmount,txCurrency);
  const data={
    type:f.type,
    amount:ledgerAmount,
    origAmount,
    currency:txCurrency,
    category:f.type==='income'?'income':f.category,
    subcat:f.subcat||null,
    description:f.description.trim()||getCats()[f.category]?.label||f.category,
    member:f.member,
    coPayors:coPayors.length?coPayors:null,
    coPayorAmounts:coPayors.length?resolvedPayerAmounts:null,
    payerAmounts:Object.keys(resolvedPayerAmounts).length>1?resolvedPayerAmounts:null,
    splitWith:[...f.splitWith],
    splitAmounts:Object.keys(splitAmounts).length?splitAmounts:null,
    date:f.date||td(),
    time:f.time||tt(),
    assetId:f.assetId||null,
    ts:Date.now(),addedBy:S.user.uid,
  };
  try{
    // If editing, reverse old asset balance change first
    if(S.editTxKey){
      const oldTx=txArr().find(t=>t._k===S.editTxKey);
      if(oldTx?.assetId&&S.assets[oldTx.assetId]){
        const reversal=oldTx.type==='expense'?(oldTx.origAmount||oldTx.amount):-(oldTx.origAmount||oldTx.amount);
        await update(ref(db,'ledgers/'+S.activeLedgerId+'/assets/'+oldTx.assetId),
          {balance:(parseFloat(S.assets[oldTx.assetId].balance)||0)+reversal});
      }
      await update(ref(db,'ledgerTransactions/'+S.activeLedgerId+'/'+S.editTxKey),data);
      toast('✓ Changes saved');
    }else{
      await push(ref(db,'ledgerTransactions/'+S.activeLedgerId),data);
      toast('✓ Entry saved');
    }
    // Update asset balance — use original amount in asset's own currency
    if(f.assetId&&S.assets[f.assetId]){
      const delta=f.type==='expense'?-origAmount:origAmount;
      await update(ref(db,'ledgers/'+S.activeLedgerId+'/assets/'+f.assetId),
        {balance:(parseFloat(S.assets[f.assetId].balance)||0)+delta});
    }
    S.editTxKey=null;S.addForm=null;S.view='home';S.tab='transactions';render();
  }catch(e){alert('Error: '+e.message);}
};

window._cropLastX = 0;
window._cropLastY = 0;
window._cropLastDist = 0;

function _drawCrop(){
  const canvas=document.getElementById('cropCanvas');
  if(!canvas||!window._cropImg)return;
  const ctx=canvas.getContext('2d');
  const S2=200; // canvas size
  ctx.clearRect(0,0,S2,S2);
  // Checkerboard background
  for(let r=0;r<S2;r+=10)for(let c=0;c<S2;c+=10){ctx.fillStyle=((r+c)/10)%2===0?'#333':'#444';ctx.fillRect(c,r,10,10);}
  const img=window._cropImg;
  const z=window._cropZoom;
  const iw=img.naturalWidth*z, ih=img.naturalHeight*z;
  const ox=window._cropOffsetX, oy=window._cropOffsetY;
  ctx.drawImage(img, ox, oy, iw, ih);
  // Overlay: darken outside circle crop hint
  ctx.save();
  ctx.beginPath();ctx.rect(0,0,S2,S2);
  ctx.arc(S2/2,S2/2,S2/2,0,Math.PI*2,true);
  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fill();
  ctx.restore();
  // Circle guide
  ctx.beginPath();ctx.arc(S2/2,S2/2,S2/2-2,0,Math.PI*2);
  ctx.strokeStyle='rgba(108,99,255,0.8)';ctx.lineWidth=2;ctx.stroke();
}

function _clampCrop(){
  const img=window._cropImg; if(!img)return;
  const S2=200,z=window._cropZoom;
  const iw=img.naturalWidth*z,ih=img.naturalHeight*z;
  window._cropOffsetX=Math.min(0,Math.max(S2-iw,window._cropOffsetX));
  window._cropOffsetY=Math.min(0,Math.max(S2-ih,window._cropOffsetY));
}

function _attachCropListeners(){
  const canvas=document.getElementById('cropCanvas');
  if(!canvas||canvas._listenersAttached)return;
  canvas._listenersAttached=true;
  // Mouse
  canvas.addEventListener('mousedown',e=>{window._cropDragging=true;window._cropLastX=e.clientX;window._cropLastY=e.clientY;canvas.style.cursor='grabbing';});
  window.addEventListener('mousemove',e=>{if(!window._cropDragging)return;window._cropOffsetX+=e.clientX-window._cropLastX;window._cropOffsetY+=e.clientY-window._cropLastY;window._cropLastX=e.clientX;window._cropLastY=e.clientY;_clampCrop();_drawCrop();});
  window.addEventListener('mouseup',()=>{window._cropDragging=false;const c=document.getElementById('cropCanvas');if(c)c.style.cursor='grab';});
  canvas.addEventListener('wheel',e=>{e.preventDefault();const delta=e.deltaY>0?-0.1:0.1;window._cropZoom=Math.max(0.5,Math.min(4,window._cropZoom+delta));const sl=document.getElementById('cropZoom');if(sl)sl.value=window._cropZoom;_clampCrop();_drawCrop();},{passive:false});
  // Touch
  canvas.addEventListener('touchstart',e=>{
    if(e.touches.length===1){window._cropDragging=true;window._cropLastX=e.touches[0].clientX;window._cropLastY=e.touches[0].clientY;}
    else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;window._cropLastDist=Math.hypot(dx,dy);}
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&window._cropDragging){window._cropOffsetX+=e.touches[0].clientX-window._cropLastX;window._cropOffsetY+=e.touches[0].clientY-window._cropLastY;window._cropLastX=e.touches[0].clientX;window._cropLastY=e.touches[0].clientY;_clampCrop();_drawCrop();}
    else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const dist=Math.hypot(dx,dy);window._cropZoom=Math.max(0.5,Math.min(4,window._cropZoom*(dist/window._cropLastDist)));window._cropLastDist=dist;const sl=document.getElementById('cropZoom');if(sl)sl.value=window._cropZoom;_clampCrop();_drawCrop();}
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchend',()=>{window._cropDragging=false;});
}

window.handleCatFileUpload=e=>{
  const file=e.target.files?.[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const src=ev.target.result;
    window.selCatCustomIcon=src;
    window.selCatCroppedIcon=null;
    window._cropZoom=1;window._cropOffsetX=0;window._cropOffsetY=0;
    const img=new Image();
    img.onload=()=>{
      window._cropImg=img;
      // Auto-fit: scale so shortest side fills 200px
      const s=200/Math.min(img.naturalWidth,img.naturalHeight);
      window._cropZoom=Math.max(1,s);
      window._cropOffsetX=(200-img.naturalWidth*window._cropZoom)/2;
      window._cropOffsetY=(200-img.naturalHeight*window._cropZoom)/2;
      _clampCrop();
      renderPage(); // re-render to show crop UI
      requestAnimationFrame(()=>{ _attachCropListeners(); _drawCrop(); });
    };
    img.src=src;
  };
  reader.readAsDataURL(file);
};

function _updateCatPreview(){
  const box=document.getElementById('catPreviewIcon');

// Stored file reference for the selected photo
// Store compressed base64 immediately on selection (survives DOM re-renders)
let _scanBase64=null;
let _scanMime=null;

// Compress image using canvas before sending to API (max 1024px, quality 0.85)
function _compressImageFromDataUrl(dataUrl){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1024;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){
        if(w>h){h=Math.round(h*(MAX/w));w=MAX;}
        else{w=Math.round(w*(MAX/h));h=MAX;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      const out=canvas.toDataURL('image/jpeg',0.85);
      res({base64:out.split(',')[1],mimeType:'image/jpeg'});
    };
    img.onerror=rej;
    img.src=dataUrl;
  });
}

window.handlePhotoSelected=(input)=>{
  const file=input.files?.[0];
  if(!file)return;
  // Read to dataURL immediately — this survives any DOM re-renders that destroy the file input
  const reader=new FileReader();
  reader.onload=async e=>{
    const rawDataUrl=e.target.result;
    try{
      const {base64,mimeType}=await _compressImageFromDataUrl(rawDataUrl);
      _scanBase64=base64;
      _scanMime=mimeType;
    }catch(err){
      // Fallback: store raw base64 uncompressed
      _scanBase64=rawDataUrl.split(',')[1];
      _scanMime=file.type||'image/jpeg';
    }
    const wrap=document.getElementById('photoPreviewWrap');
    const img=document.getElementById('photoPreviewImg');
    const resultCard=document.getElementById('scanResultCard');
    if(img)img.src=rawDataUrl;
    if(wrap)wrap.style.display='block';
    if(resultCard)resultCard.style.display='none';
  };
  reader.readAsDataURL(file);
  input.value=''; // reset so same file can be re-selected
};

window.scanSelectedPhoto=async()=>{
  if(!_scanBase64){toast('No photo selected','var(--red)');return;}
  const provider=localStorage.getItem('fw_ai_provider')||'gemini';
  const key=provider==='openai'
    ?(localStorage.getItem('fw_openai_key')||'').trim()
    :(localStorage.getItem('fw_gemini_key')||'').trim();
  if(!key){
    toast('⚠️ Add your AI key in Settings first','var(--yellow)');
    return;
  }
  const status=document.getElementById('scanStatus');
  const statusMsg=document.getElementById('scanStatusMsg');
  const previewWrap=document.getElementById('photoPreviewWrap');
  const scanNowBtn=document.getElementById('scanNowBtn');
  const resultCard=document.getElementById('scanResultCard');
  const resultBody=document.getElementById('scanResultBody');
  const errorBox=document.getElementById('scanErrorBox');
  if(status)status.style.display='block';
  if(previewWrap)previewWrap.style.display='none';
  if(errorBox)errorBox.style.display='none';
  if(scanNowBtn)scanNowBtn.disabled=true;
  try{
    if(statusMsg)statusMsg.textContent='Reading receipt with AI...';
    const base64=_scanBase64;
    const mimeType=_scanMime||'image/jpeg';
    const cats=getCats();
    const catKeys=Object.keys(cats).filter(k=>k!=='income').join(', ');
    const prompt=`You are an expert receipt/invoice reader for a family expense tracker app used in Malaysia.
Analyze this image carefully. It may contain text in English, Malay, Chinese, or a mix.
Extract the transaction details and return ONLY a valid JSON object with no markdown:
{
  "amount": <number, the total amount paid — look for "TOTAL", "JUMLAH", "合计", or the largest amount>,
  "description": <string, the merchant or store name, max 40 chars>,
  "date": <string, YYYY-MM-DD format. Use today's date if not visible: ${new Date().toISOString().slice(0,10)}>,
  "time": <string, HH:MM 24-hour format. Extract from receipt if visible (e.g. receipt timestamp, transaction time). Use current time if not found: ${tt()}>,
  "category": <string, ONE of these exact keys: ${catKeys}>,
  "currency": <string, 3-letter ISO code. Default to MYR if not shown>,
  "notes": <string, brief summary of items or purpose, max 60 chars, or "">
}
Rules: amount must be a plain number (no currency symbol). Return ONLY the JSON object.`;

    let parsed;

    if(provider==='openai'){
      // ── GPT-4o Vision ──
      const resp=await fetch('https://api.openai.com/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
        body:JSON.stringify({
          model:'gpt-4o',
          max_tokens:400,
          messages:[{
            role:'user',
            content:[
              {type:'image_url',image_url:{url:'data:'+mimeType+';base64,'+base64,detail:'high'}},
              {type:'text',text:prompt}
            ]
          }]
        })
      });
      const responseText=await resp.text();
      if(!resp.ok){
        let errMsg='OpenAI API error '+resp.status;
        try{
          const errJson=JSON.parse(responseText);
          errMsg=errJson?.error?.message||errMsg;
          if(resp.status===401)errMsg='Invalid OpenAI key. Check your key in Settings.';
          if(resp.status===429)errMsg='OpenAI rate limit or quota exceeded. Try again shortly or switch to Gemini.';
          if(resp.status===400)errMsg='Bad request — try a clearer photo.';
        }catch(e2){}
        throw new Error(errMsg);
      }
      const data=JSON.parse(responseText);
      const text=data?.choices?.[0]?.message?.content||'';
      if(!text)throw new Error('Empty response from GPT-4o. Try a clearer photo.');
      const clean=text.replace(/```json|```/g,'').trim();
      try{parsed=JSON.parse(clean);}catch(e){
        const match=clean.match(/\{[\s\S]*\}/);
        if(match)try{parsed=JSON.parse(match[0]);}catch(e2){}
        if(!parsed)throw new Error('Could not parse AI response. Try a clearer photo.');
      }

    }else{
      // ── Gemini Flash ──
      const resp=await fetch(
        'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+key,
        {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            contents:[{parts:[
              {inline_data:{mime_type:mimeType,data:base64}},
              {text:prompt}
            ]}]
          })
        }
      );
      const responseText=await resp.text();
      if(!resp.ok){
        let errMsg='Gemini API error '+resp.status;
        try{
          const errJson=JSON.parse(responseText);
          errMsg=errJson?.error?.message||errMsg;
          if(resp.status===400)errMsg='Invalid request or bad image. '+errMsg;
          if(resp.status===401||resp.status===403)errMsg='Invalid Gemini key. Check your key in Settings.';
          if(resp.status===429)errMsg='Gemini rate limit reached. Switch to GPT-4o in Settings or wait a moment.';
          if(resp.status===503)errMsg='Gemini service unavailable. Try again shortly.';
        }catch(e2){}
        throw new Error(errMsg);
      }
      const data=JSON.parse(responseText);
      const text=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
      if(!text)throw new Error('Empty response from Gemini. Try a clearer photo.');

window.scanFromShortcut=async()=>{
  const aiProvider=localStorage.getItem('fw_ai_provider')||'gemini';
  const aiKey=aiProvider==='openai'
    ?(localStorage.getItem('fw_openai_key')||'').trim()
    :(localStorage.getItem('fw_gemini_key')||'').trim();
  if(!aiKey){toast('⚠️ Add your AI key in Settings first','var(--yellow)');return;}
  let imgData;
  try{
    imgData=await navigator.clipboard.readText();
  }catch(e){
    toast('❌ Could not read clipboard — please allow clipboard access','var(--red)');return;
  }
  if(!imgData||imgData.length<100){
    toast('❌ No image in clipboard — run the Shortcut first','var(--red)');return;
  }
  navigator.clipboard.writeText('').catch(function(){});
  S._pendingShortcutScan=false;
  const status=document.getElementById('scanStatus');
  const statusMsg=document.getElementById('scanStatusMsg');
  if(status)status.style.display='block';
  if(statusMsg)statusMsg.textContent='Scanning receipt with AI...';
  const shortcutBtn=document.getElementById('shortcutScanBtn');
  if(shortcutBtn)shortcutBtn.style.display='none';
  const cats=getCats();
  const catKeys=Object.keys(cats).filter(k=>k!=='income');
  const catDescriptions=catKeys.map(k=>{
    const c=cats[k];
    const subcatKeys=c.subcats?Object.keys(c.subcats):[];
    return k+(subcatKeys.length?' (subcats: '+subcatKeys.join(', ')+')':'');
  }).join('; ');
  const prompt='Extract the transaction from this receipt image. Return ONLY a raw JSON object with no markdown, no backticks, no explanation: {"amount":0.00,"description":"merchant name max 40 chars","date":"'+new Date().toISOString().slice(0,10)+'","time":"'+tt()+'","category":"food","subcat":"","currency":"MYR","notes":""}. Available categories with subcategories: '+catDescriptions+'. Rules: amount is a plain number. category must be one of: '+catKeys.join(', ')+'. subcat must be a valid subcat key for the chosen category or empty string. Default currency to MYR.';
  try{
    let parsed;
    if(aiProvider==='openai'){
      const resp=await fetch('https://api.openai.com/v1/chat/completions',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+aiKey},
        body:JSON.stringify({model:'gpt-4o',max_tokens:300,messages:[{role:'user',content:[
          {type:'image_url',image_url:{url:'data:image/jpeg;base64,'+imgData,detail:'high'}},
          {type:'text',text:prompt}
        ]}]})
      });
      const data=JSON.parse(await resp.text());
      const text=data?.choices?.[0]?.message?.content||'';
      const clean=text.replace(/```json|```/g,'').trim();
      try{parsed=JSON.parse(clean);}catch(e){const m=clean.match(/\{[\s\S]*\}/);if(m)parsed=JSON.parse(m[0]);}
    }else{
      const resp=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+aiKey,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[
          {inline_data:{mime_type:'image/jpeg',data:imgData}},
          {text:prompt}
        ]}]})
      });
      const data=JSON.parse(await resp.text());
      const text=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
      const clean=text.replace(/```json|```/g,'').trim();
      try{parsed=JSON.parse(clean);}catch(e){const m=clean.match(/\{[\s\S]*\}/);if(m)parsed=JSON.parse(m[0]);}
    }
    if(!parsed)throw new Error('Could not read receipt. Try a clearer photo.');
    if(status)status.style.display='none';
    const cats2=getCats();
    if(parsed.amount)S.addForm.amount=String(parseFloat(parsed.amount)||'');
    if(parsed.description)S.addForm.description=parsed.description.substring(0,40);
    if(parsed.date)S.addForm.date=parsed.date;
    if(parsed.time)S.addForm.time=parsed.time.substring(0,5);
    if(parsed.category&&cats2[parsed.category])S.addForm.category=parsed.category;
    if(parsed.subcat&&cats2[S.addForm.category]?.subcats?.[parsed.subcat])S.addForm.subcat=parsed.subcat;
    if(parsed.currency&&CURRENCIES[parsed.currency])S.addForm.currency=parsed.currency;
    if(parsed.notes&&parsed.notes.trim()){
      const note=parsed.notes.trim().substring(0,60);
      if(!S.addForm.description.includes(note))S.addForm.description=(S.addForm.description+' — '+note).substring(0,80);
    }
    S.addForm.type='expense';
    render();toast('✨ Receipt scanned — review and save!');
  }catch(e){
    if(status)status.style.display='none';
    if(shortcutBtn)shortcutBtn.style.display='block';
    console.error('Shortcut scan error:',e);
    toast('❌ Scan failed: '+e.message,'var(--red)');
  }
};

function nextDueLabel(r){
  if(!r.nextDate)return'';
  const d=new Date(r.nextDate+'T00:00:00');
  const now=new Date();now.setHours(0,0,0,0);
  const diff=Math.round((d-now)/86400000);
  if(diff<0)return`<span style="color:var(--red);font-size:11px">⚠ Overdue ${Math.abs(diff)}d</span>`;
  if(diff===0)return`<span style="color:var(--yellow);font-size:11px">Due today</span>`;
  if(diff<=7)return`<span style="color:var(--yellow);font-size:11px">Due in ${diff}d</span>`;
  return`<span style="font-size:11px;color:var(--dim)">Due ${r.nextDate}</span>`;
}

// ── AUTO-PROCESS RECURRING TRANSACTIONS ──
async function processRecurring(){
  const today=td();
  const recArr=Object.entries(S.recurring||{}).map(([id,r])=>({id,...r}));
  const due=recArr.filter(r=>r.nextDate&&r.nextDate<=today);
  if(!due.length)return;
  let posted=0;
  for(const r of due){
    try{
      // Post the transaction
      const txData={
        type:'expense',
        amount:parseFloat(r.amount)||0,
        category:r.category||'other',
        subcat:null,
        description:r.name+(r.name.toLowerCase().includes('auto')?'':' (auto)'),
        member:r.member||S.user.uid,
        splitWith:[],splitAmounts:null,
        date:r.nextDate,
        currency:S.ledgerCurrency,
        assetId:null,
        ts:Date.now(),addedBy:S.user.uid,
        fromRecurringId:r.id,
      };
      await push(ref(db,'ledgerTransactions/'+S.activeLedgerId),txData);
      // Advance nextDate based on frequency
      const next=advanceDate(r.nextDate,r.freq||'monthly');
      await update(ref(db,'ledgers/'+S.activeLedgerId+'/recurring/'+r.id),{nextDate:next});
      posted++;
    }catch(e){console.warn('Recurring post failed:',r.id,e);}
  }
  if(posted>0)toast('🔄 '+posted+' recurring transaction'+(posted>1?'s':'')+' auto-posted');
}

function advanceDate(dateStr,freq){
  const d=new Date(dateStr+'T00:00:00');
  switch(freq){
    case'daily':  d.setDate(d.getDate()+1);break;
    case'weekly': d.setDate(d.getDate()+7);break;
    case'yearly': d.setFullYear(d.getFullYear()+1);break;
    default:      d.setMonth(d.getMonth()+1);break; // monthly
  }
  return d.toISOString().slice(0,10);
}

(function(){
  function applyGap(){
    var probe=document.createElement('div');
    probe.style.cssText='position:fixed;bottom:0;left:0;width:1px;height:env(safe-area-inset-bottom,0px);pointer-events:none;opacity:0;visibility:hidden';
    document.body.appendChild(probe);
    var safeH=probe.getBoundingClientRect().height||0;
    document.body.removeChild(probe);
    // Set page scroll padding to clear the nav bar (nav ~60px + safe area)
    document.querySelectorAll('.page').forEach(function(p){
      p.style.paddingBottom=(70+safeH)+'px';
    });
  }
  applyGap();
  requestAnimationFrame(applyGap);
  document.addEventListener('visibilitychange',function(){
    if(!document.hidden){applyGap();setTimeout(applyGap,150);setTimeout(applyGap,400);}
  });
  window.addEventListener('pageshow',function(){applyGap();setTimeout(applyGap,150);});
  window.addEventListener('resize',applyGap,{passive:true});
  window.addEventListener('orientationchange',function(){setTimeout(applyGap,300);},{passive:true});
  window.addEventListener('focus',applyGap,{passive:true});
})();

// ── VIEWPORT & ADDRESS BAR FIX ──
(function(){
  var isStandalone=window.navigator.standalone===true||window.matchMedia('(display-mode:standalone)').matches;
  var app=document.getElementById('app');

  function setHeight(){
    // Use dvh (dynamic viewport height) which accounts for browser chrome
    var h=window.visualViewport?window.visualViewport.height:window.innerHeight;
    if(app&&h>100)app.style.height=h+'px';
  }

  if(isStandalone){
    function setPwaHeight(){
      if(app)app.style.height=window.innerHeight+'px';
    }
    setPwaHeight();
    requestAnimationFrame(setPwaHeight);
    if(window.visualViewport){
      window.visualViewport.addEventListener('resize',function(){
        var diff=window.innerHeight-window.visualViewport.height;
        if(app)app.style.height=(diff>100?window.visualViewport.height:window.innerHeight)+'px';
      },{passive:true});
    }
    window.addEventListener('orientationchange',function(){setTimeout(setPwaHeight,300);},{passive:true});
  } else {
    // Safari browser mode — address bar only hides when WINDOW scrolls.
    // Since our app scrolls inside .page div, we forward that scroll to window.
    function updateHeight(){
      var h=window.innerHeight;
      if(app&&h>100)app.style.height=h+'px';
    }
    updateHeight();
    requestAnimationFrame(updateHeight);
    window.addEventListener('resize',updateHeight,{passive:true});
    window.addEventListener('orientationchange',function(){setTimeout(updateHeight,300);},{passive:true});

    // Forward .page scroll to window so Safari address bar can hide/show
    function attachPageScroll(){
      var pages=document.querySelectorAll('.page');
      pages.forEach(function(page){
        page.addEventListener('scroll',function(){
          var s=page.scrollTop;
          if(s>0){
            // Temporarily make window scrollable and scroll it
            document.documentElement.style.overflowY='auto';
            document.body.style.minHeight='calc(100% + 60px)';
            window.scrollTo({top:1,behavior:'instant'});
          } else {
            window.scrollTo({top:0,behavior:'instant'});
          }
        },{passive:true});
      });
    }
    // Attach after render
    setTimeout(attachPageScroll,500);
    // Re-attach after any navigation (page re-renders)
    var _origRender=window.renderPage;
    if(typeof _origRender==='function'){
      window.renderPage=function(){
        _origRender.apply(this,arguments);
        setTimeout(attachPageScroll,100);
      };
    }
  }
})();

// ── SERVICE WORKER REGISTRATION ──
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/Family-Wallet/sw.js',{scope:'/Family-Wallet/'})
      .then(()=>console.log('SW registered'))
      .catch(e=>console.log('SW registration failed:',e));
  });
}
