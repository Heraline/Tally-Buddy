<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Family Wallet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

/* ── THEME VARIABLES ── */
:root {
  --bg:#0A0A14;--bg2:#12121E;--bg3:#1A1A2E;
  --accent:#6C63FF;--accent2:#4ECDC4;
  --green:#69D2A0;--red:#FF6B6B;--yellow:#FFE66D;--orange:#FFA07A;
  --text:#F0EEF6;--muted:#8A88AA;--dim:#5A587A;
  --border:rgba(255,255,255,0.07);
  --card-bg:#1A1A2E;--surface-bg:rgba(255,255,255,0.04);
  --nav-bg:rgba(10,10,20,0.92);
  --input-bg:rgba(255,255,255,0.06);
  --shadow:0 8px 32px rgba(0,0,0,0.35);
}
body.light-mode {
  --bg:#F0F2FF;--bg2:#FFFFFF;--bg3:#ECEEFF;
  --text:#1A1A2E;--muted:#6B6895;--dim:#9B99BB;
  --border:rgba(108,99,255,0.12);
  --card-bg:#FFFFFF;--surface-bg:rgba(108,99,255,0.05);
  --nav-bg:rgba(240,242,255,0.95);
  --input-bg:rgba(108,99,255,0.07);
  --shadow:0 8px 32px rgba(108,99,255,0.12);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center;align-items:stretch;min-height:100vh;min-height:-webkit-fill-available;transition:background 0.3s,color 0.3s}
#app{width:100%;max-width:430px;height:100vh;height:-webkit-fill-available;position:relative;overflow:hidden;display:flex;flex-direction:column}
.page{flex:1;overflow-y:auto;padding-bottom:90px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.page::-webkit-scrollbar{display:none}

/* Ambient glows */
.glow1{position:fixed;top:-80px;right:-80px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(108,99,255,0.15),transparent 70%);pointer-events:none;z-index:0}
.glow2{position:fixed;bottom:60px;left:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(78,205,196,0.10),transparent 70%);pointer-events:none;z-index:0}

/* Typography */
.label{font-size:11px;color:var(--dim);letter-spacing:0.12em;text-transform:uppercase}

/* Cards */
.card{background:var(--card-bg);border:1px solid rgba(108,99,255,0.2);border-radius:22px;box-shadow:var(--shadow)}
.surface{background:var(--surface-bg);border:1px solid var(--border);border-radius:16px}

/* Buttons */
button{cursor:pointer;font-family:'Sora',sans-serif;border:none;transition:all 0.18s}
button:active{transform:scale(0.95);opacity:0.85}
.btn-primary{width:100%;padding:17px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:16px;font-weight:700;letter-spacing:0.02em;box-shadow:0 8px 24px rgba(108,99,255,0.35)}
.btn-ghost{background:none;color:var(--accent);font-size:13px;font-weight:600;padding:0;display:flex;align-items:center;gap:6px}
.btn-ghost:active{transform:scale(0.96)}

/* Tabs */
.tab-bar{display:flex;background:rgba(255,255,255,0.05);border-radius:14px;padding:4px;margin:18px 22px 0}
.tab-btn{flex:1;padding:10px;border-radius:11px;font-size:13px;font-weight:600;color:var(--dim);background:transparent}
.tab-btn.active{background:rgba(108,99,255,0.8);color:#fff}

/* Member filter pills */
.member-scroll{display:flex;gap:8px;padding:18px 22px 0;overflow-x:auto}
.member-scroll::-webkit-scrollbar{display:none}
.member-pill{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;background:rgba(255,255,255,0.07);color:var(--muted)}
.member-pill.active{color:#fff}

/* Balance card */
.balance-card{margin:18px 22px 0;padding:26px}
.balance-amount{font-family:'DM Mono',monospace;font-size:38px;font-weight:700;letter-spacing:-0.03em}
.mini-cards{display:flex;gap:12px;margin-top:18px}
.mini-card{flex:1;border-radius:14px;padding:13px 15px;border:1px solid}
.mini-card .mc-label{font-size:10px;letter-spacing:0.1em;margin-bottom:4px}
.mini-card .mc-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:500}
.mini-card.income{background:rgba(105,210,160,0.1);border-color:rgba(105,210,160,0.2)}
.mini-card.income .mc-label,.mini-card.income .mc-val{color:var(--green)}
.mini-card.expense{background:rgba(255,107,107,0.1);border-color:rgba(255,107,107,0.2)}
.mini-card.expense .mc-label,.mini-card.expense .mc-val{color:var(--red)}
.mini-card.net{background:rgba(108,99,255,0.1);border-color:rgba(108,99,255,0.2)}
.mini-card.net .mc-label,.mini-card.net .mc-val{color:var(--accent)}

/* Transactions */
.tx-group{padding:0 22px;margin-top:20px}
.tx-date-label{font-size:11px;color:var(--dim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.tx-list{display:flex;flex-direction:column;gap:8px}
.tx-row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:15px;cursor:pointer;background:var(--surface-bg);border:1px solid var(--border)}
.tx-row:active{transform:scale(0.98)}
.tx-icon{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-desc{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.tag{font-size:10px;border-radius:6px;padding:2px 7px;font-weight:600}
.tx-amount{font-family:'DM Mono',monospace;font-size:15px;font-weight:600;flex-shrink:0;text-align:right}
.tx-orig-cur{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}

/* Analytics */
.analytics-section{padding:0 22px;margin-top:20px}
.cat-bar-row{margin-bottom:14px}
.cat-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px}
.cat-bar-track{height:8px;border-radius:999px;background:rgba(255,255,255,0.07);overflow:hidden}
.cat-bar-fill{height:100%;border-radius:999px;transition:width 0.5s ease}
.debt-row{display:flex;align-items:center;gap:12px;padding:12px 15px;border-radius:14px;margin-bottom:8px}

/* Add/Edit form */
.add-page{padding:50px 22px 120px}
.form-section{margin-bottom:16px}
.input-card{padding:16px 18px;border-radius:17px}
.input-card input,.input-card select{background:none;border:none;outline:none;color:var(--text);font-family:'Sora',sans-serif;width:100%}
.big-input{font-family:'DM Mono',monospace;font-size:34px;font-weight:700;width:100%;display:block;min-height:50px;padding:4px 0;-webkit-appearance:none}
.normal-input{font-size:15px;width:100%;display:block;padding:4px 0;color:var(--text);background:none}
.type-toggle{display:flex;background:rgba(255,255,255,0.05);border-radius:14px;padding:4px;margin-bottom:22px}
.type-btn{flex:1;padding:12px;border-radius:11px;font-size:14px;font-weight:700;background:transparent;color:var(--dim)}
.type-btn.active-expense{background:var(--red);color:#fff}
.type-btn.active-income{background:var(--green);color:#fff}
.chip-grid{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 13px;border-radius:999px;font-size:12px;font-weight:600;background:rgba(255,255,255,0.06);color:var(--muted);border:none}
.chip.active{color:#fff}
.subcat-chip{padding:6px 11px;border-radius:999px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.04);color:var(--dim);border:1px solid var(--border)}
.subcat-chip.active{color:#fff;border-color:transparent}
.member-grid{display:flex;gap:8px;flex-wrap:wrap}
.member-box{flex:1;min-width:60px;padding:10px 6px;border-radius:13px;text-align:center;font-size:12px;font-weight:600;background:rgba(255,255,255,0.06);color:var(--muted)}
.member-box .m-avatar{font-size:20px;margin-bottom:3px}
.member-box.active{color:#fff}
.split-hint{font-size:12px;color:var(--accent);text-align:center;margin-top:10px}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:10px 30px;padding-bottom:max(24px, env(safe-area-inset-bottom));display:flex;justify-content:space-around;align-items:center;z-index:50}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;color:var(--dim);font-size:10px;font-weight:600;padding:4px 10px}
.nav-btn.active{color:var(--accent)}
.nav-btn .nav-icon{font-size:22px;line-height:1}
.fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(108,99,255,0.4);margin-top:-16px;color:#fff;flex-shrink:0}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{width:100%;max-width:430px;background:var(--bg2);border-radius:24px 24px 0 0;padding:26px 22px;padding-bottom:max(48px, calc(env(safe-area-inset-bottom) + 24px));border:1px solid rgba(255,255,255,0.09);animation:slideUp 0.3s cubic-bezier(.22,.68,0,1.15) both;max-height:90vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;border-radius:999px;background:rgba(255,255,255,0.2);margin:0 auto 22px}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:12px}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-dow{text-align:center;font-size:10px;color:var(--dim);font-weight:600;padding:4px 0}
.cal-day{min-height:60px;border-radius:10px;padding:4px;cursor:pointer;transition:all 0.15s;position:relative;background:var(--surface-bg);border:1px solid transparent}
.cal-day:active{transform:scale(0.94)}
.cal-day.today{border-color:var(--accent);background:rgba(108,99,255,0.12)}
.cal-day.has-tx{background:rgba(108,99,255,0.07)}
.cal-day.other-month .cal-day-num{color:var(--dim);opacity:0.4}
.cal-day-num{font-size:12px;font-weight:600;line-height:1}
.cal-day-num.sunday{color:var(--red)}
.cal-day-num.saturday{color:var(--accent)}
.cal-dot-row{display:flex;flex-direction:column;gap:2px;margin-top:2px}
.cal-exp-dot{font-size:9px;color:var(--red);font-family:'DM Mono',monospace;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden}
.cal-inc-dot{font-size:9px;color:var(--green);font-family:'DM Mono',monospace;font-weight:600;line-height:1.2}

/* Statistics / Charts */
.donut-container{display:flex;justify-content:center;margin:20px 0 10px}
.donut-legend{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.legend-row{display:flex;align-items:center;gap:10px;font-size:13px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Trend chart */
.trend-chart-wrap{background:var(--surface-bg);border:1px solid var(--border);border-radius:18px;padding:18px;margin:0 22px}
.trend-month-label{font-size:10px;color:var(--dim);text-align:center}

/* Assets */
.asset-card{background:var(--card-bg);border:1px solid rgba(108,99,255,0.2);border-radius:18px;padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
.asset-balance{font-family:'DM Mono',monospace;font-size:22px;font-weight:700}
.asset-type-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:0.08em}

/* Recurring */
.recur-card{background:var(--surface-bg);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.recur-freq{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(108,99,255,0.15);color:var(--accent)}

/* Settings */
.settings-page{padding:50px 22px 100px}
.settings-section{margin-bottom:24px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:14px;margin-bottom:8px}
.settings-row .sr-left{display:flex;align-items:center;gap:12px;font-size:14px;font-weight:500}
.clear-btn{width:100%;padding:14px;border-radius:14px;background:rgba(255,107,107,0.12);color:var(--red);font-size:14px;font-weight:600;border:1px solid rgba(255,107,107,0.2)}
.export-btn{width:100%;padding:14px;border-radius:14px;background:rgba(108,99,255,0.12);color:var(--accent);font-size:14px;font-weight:600;border:1px solid rgba(108,99,255,0.2);margin-bottom:10px}

/* Theme toggle */
.theme-toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,0.1);border:1px solid var(--border);position:relative;cursor:pointer;transition:background 0.3s;flex-shrink:0}
.theme-toggle.on{background:var(--accent)}
.theme-toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform 0.3s;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
.theme-toggle.on::after{transform:translateX(20px)}

/* Auth */
.auth-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 28px;animation:fadeIn 0.4s ease both;overflow-y:auto}
.auth-tabs{display:flex;width:100%;background:rgba(255,255,255,0.05);border-radius:14px;padding:4px;margin-bottom:22px}
.auth-tab{flex:1;padding:11px;border-radius:11px;font-size:14px;font-weight:700;background:transparent;color:var(--dim)}
.auth-tab.active{background:rgba(108,99,255,0.8);color:#fff}
.auth-input{width:100%;padding:15px 16px;border-radius:14px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-family:'Sora',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s}
.auth-input:focus{border-color:var(--accent)}
.auth-error{font-size:13px;color:var(--red);margin-bottom:12px;padding:10px 14px;border-radius:10px;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.2);width:100%;text-align:center}
.ledger-screen{position:fixed;inset:0;background:var(--bg);z-index:190;display:flex;flex-direction:column;animation:fadeIn 0.3s ease both}
.ledger-card{background:var(--card-bg);border:1px solid rgba(108,99,255,0.15);border-radius:18px;padding:18px;margin-bottom:12px;cursor:pointer;transition:all 0.2s}
.ledger-card:active{transform:scale(0.97)}
.ledger-card.active-ledger{border-color:var(--accent);background:rgba(108,99,255,0.08)}
.invite-code-box{background:rgba(108,99,255,0.1);border:1px solid rgba(108,99,255,0.3);border-radius:18px;padding:20px;text-align:center;margin-bottom:20px}
.invite-code{font-family:'DM Mono',monospace;font-size:28px;font-weight:700;color:var(--accent);letter-spacing:0.15em;margin:10px 0}
.copy-btn{padding:8px 18px;border-radius:10px;background:rgba(108,99,255,0.2);color:var(--accent);font-size:13px;font-weight:600;border:1px solid rgba(108,99,255,0.3)}
.join-input-row{display:flex;gap:10px;align-items:center}
.join-input-row input{flex:1;padding:13px 15px;border-radius:13px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:16px;outline:none;letter-spacing:0.1em}
.join-input-row input:focus{border-color:var(--accent)}
.join-btn{padding:13px 18px;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:14px;font-weight:700}
.collab-member-row{display:flex;align-items:center;gap:12px;padding:12px 15px;border-radius:14px;margin-bottom:8px}
.collab-badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700}
.collab-badge.owner{background:rgba(108,99,255,0.2);color:var(--accent)}
.collab-badge.member{background:rgba(78,205,196,0.2);color:var(--accent2)}
.collab-badge.guest{background:rgba(255,230,109,0.2);color:var(--yellow)}
.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:36px;height:36px;border:3px solid rgba(108,99,255,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--card-bg);border:1px solid rgba(108,99,255,0.3);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:600;z-index:500;animation:fadeIn 0.2s ease;white-space:nowrap;pointer-events:none;color:var(--text)}
.budget-bar-track{height:6px;border-radius:999px;background:rgba(255,255,255,0.07);overflow:hidden}
.budget-bar-fill{height:100%;border-radius:999px;transition:width 0.5s ease}
.split-member-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.split-amount-input{width:90px;padding:8px 10px;border-radius:10px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:14px;outline:none;text-align:right}
.split-amount-input:focus{border-color:var(--accent)}
.currency-selector{background:var(--input-bg);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-family:'Sora',sans-serif;font-size:14px;outline:none;width:100%}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s}
.color-dot.selected{border-color:#fff;transform:scale(1.15)}
.fw-input{width:100%;padding:12px 14px;border-radius:12px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-family:'Sora',sans-serif;font-size:14px;outline:none}
.fw-input:focus{border-color:var(--accent)}
.guest-badge{font-size:9px;background:rgba(255,230,109,0.2);color:var(--yellow);border-radius:4px;padding:1px 5px;font-weight:700;margin-top:2px;display:inline-block}
.delete-btn{font-size:11px;background:rgba(255,107,107,0.15);color:var(--red);border-radius:8px;padding:4px 10px;font-weight:600}
.edit-btn{font-size:11px;background:rgba(108,99,255,0.15);color:var(--accent);border-radius:8px;padding:4px 10px;font-weight:600}
.settle-btn{font-size:11px;background:rgba(78,205,196,0.15);color:var(--accent2);border-radius:8px;padding:4px 10px;font-weight:600}

/* Period selector */
.period-tabs{display:flex;gap:8px;padding:0 22px;margin-top:16px}
.period-tab{padding:7px 16px;border-radius:999px;font-size:12px;font-weight:600;background:rgba(255,255,255,0.06);color:var(--muted);border:none}
.period-tab.active{background:var(--accent);color:#fff}

/* Animations */
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn 0.3s ease both}
.slide-up{animation:slideUp 0.35s cubic-bezier(.22,.68,0,1.2) both}
.empty{text-align:center;color:var(--dim);padding:50px 20px;font-size:14px}

/* Profile edit */
.avatar-grid{display:flex;gap:8px;flex-wrap:wrap}
.avatar-btn{width:44px;height:44px;border-radius:12px;font-size:22px;background:var(--input-bg);border:2px solid transparent;transition:all 0.15s}
.avatar-btn.sel{border-color:var(--accent);background:rgba(108,99,255,0.2)}

/* Segment for stats */
.seg-bar{display:flex;background:rgba(255,255,255,0.05);border-radius:12px;padding:3px;margin:0 22px 16px}
.seg-btn{flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:600;color:var(--dim);background:transparent}
.seg-btn.active{background:rgba(108,99,255,0.8);color:#fff}

/* Settled badge */
.settled-badge{font-size:9px;background:rgba(105,210,160,0.2);color:var(--green);border-radius:4px;padding:1px 6px;font-weight:700;display:inline-flex;align-items:center;gap:3px}
</style>
</head>
<body>
<div id="app">
  <div class="glow1"></div><div class="glow2"></div>
  <div id="loadingScreen" class="loading-screen">
    <div style="font-size:48px">💳</div>
    <div class="spinner"></div>

const CURRENCIES={MYR:{symbol:'RM',name:'Malaysian Ringgit',flag:'🇲🇾',rate:1},USD:{symbol:'$',name:'US Dollar',flag:'🇺🇸',rate:4.47},SGD:{symbol:'S$',name:'Singapore Dollar',flag:'🇸🇬',rate:3.32},GBP:{symbol:'£',name:'British Pound',flag:'🇬🇧',rate:5.68},EUR:{symbol:'€',name:'Euro',flag:'🇪🇺',rate:4.86},JPY:{symbol:'¥',name:'Japanese Yen',flag:'🇯🇵',rate:0.0298},AUD:{symbol:'A$',name:'Australian Dollar',flag:'🇦🇺',rate:2.85},IDR:{symbol:'Rp',name:'Indonesian Rupiah',flag:'🇮🇩',rate:0.000275},THB:{symbol:'฿',name:'Thai Baht',flag:'🇹🇭',rate:0.131},CNY:{symbol:'¥',name:'Chinese Yuan',flag:'🇨🇳',rate:0.617}};

// Convert amount from fromCur to toCur (via MYR as base)
function convertCurrency(amount, fromCur, toCur){
  if(fromCur===toCur)return amount;
  const f=CURRENCIES[fromCur]||CURRENCIES.MYR;
  const t=CURRENCIES[toCur]||CURRENCIES.MYR;
  const inMYR=amount*f.rate;
  return inMYR/t.rate;
}

function fmt(n,cur){const c=cur?CURRENCIES[cur]:getCur();return(c?c.symbol:'')+' '+Number(n).toFixed(2);}
function fmtLedger(n){return fmt(n,S.ledgerCurrency);}
// Convert tx amount to ledger currency
function txAmtInLedger(t){
  if(!t.currency||t.currency===S.ledgerCurrency)return t.amount;
  return convertCurrency(t.amount,t.currency,S.ledgerCurrency);
}
function genCode(n=6){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:n},()=>c[~~(Math.random()*c.length)]).join('');}
function dlabel(str){const now=new Date();now.setHours(0,0,0,0);const d=new Date(str+'T00:00:00');const diff=Math.round((now-d)/86400000);if(diff===0)return'Today';if(diff===1)return'Yesterday';return d.toLocaleDateString('en-MY',{weekday:'short',month:'short',day:'numeric'});}
function txArr(){return Object.entries(S.txs||{}).map(([k,v])=>({...v,_k:k})).sort((a,b)=>b.date.localeCompare(a.date)||(b.ts||0)-(a.ts||0));}
function getMem(id){return(S.members&&S.members[id])?{...S.members[id],id}:{id,displayName:id,avatar:'👤',color:'#999',guest:false};}
function allMembers(){return Object.entries(S.members||{}).map(([id,m])=>({id,...m}));}
function filtered(){const f=S.filterMember,all=txArr();return f==='all'?all:all.filter(t=>t.member===f||(t.splitWith||[]).includes(f));}
function getSettled(){return Object.values(S.settlements||{});}
function isSettled(txKey,uid){return getSettled().some(s=>s.txKey===txKey&&s.toUid===uid&&s.settled);}

function debts(){
  const d={};
  txArr().forEach(t=>{
    if(t.type==='expense'&&t.splitAmounts&&Object.keys(t.splitAmounts).length>1){
      const ledgerAmt=txAmtInLedger(t);
      const totalOrig=Object.values(t.splitAmounts).reduce((s,v)=>s+v,0);
      Object.entries(t.splitAmounts).forEach(([uid,amt])=>{
        if(uid!==t.member){
          if(isSettled(t._k,uid))return;
          const proportion=totalOrig>0?amt/totalOrig:0;
          const convertedAmt=proportion*ledgerAmt;
          const k=uid+'->'+t.member;
          d[k]=(d[k]||0)+convertedAmt;
        }
      });
    }
  });
  return d;
}

function totalAssetsInLedger(){
  let total=0;
  Object.values(S.assets||{}).forEach(a=>{
    total+=convertCurrency(a.balance||0,a.currency||S.ledgerCurrency,S.ledgerCurrency);
  });
  return total;
}

//  CALENDAR VIEW
// ══════════════════════════════════════════
function renderCalendar(){
  const y=S.calYear,m=S.calMonth;
  const monthStr=y+'-'+String(m+1).padStart(2,'0');
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const daysInPrev=new Date(y,m,0).getDate();
  const today=new Date();
  const todayStr=td();

  const txs=txArr();
  const dayMap={};
  txs.forEach(t=>{
    if(!dayMap[t.date])dayMap[t.date]={exp:0,inc:0};
    if(t.type==='expense')dayMap[t.date].exp+=txAmtInLedger(t);
    else dayMap[t.date].inc+=txAmtInLedger(t);
  });

  // Monthly totals from calendar header
  const monthInc=txs.filter(t=>t.date.startsWith(monthStr)&&t.type==='income').reduce((s,t)=>s+txAmtInLedger(t),0);
  const monthExp=txs.filter(t=>t.date.startsWith(monthStr)&&t.type==='expense').reduce((s,t)=>s+txAmtInLedger(t),0);
  const carryover=txs.filter(t=>t.date<monthStr+'-01').reduce((s,t)=>s+(t.type==='income'?txAmtInLedger(t):-txAmtInLedger(t)),0);

  const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dowHtml=dow.map((d,i)=>`<div class="cal-dow" style="${i===0?'color:var(--red)':i===6?'color:var(--accent)':''}">${d}</div>`).join('');

  let cells='';
  // prev month days
  for(let i=0;i<firstDay;i++){
    const day=daysInPrev-firstDay+i+1;
    cells+=`<div class="cal-day other-month"><div class="cal-day-num">${day}</div></div>`;
  }
  // current month
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=dateStr===todayStr;
    const dow=(firstDay+d-1)%7;
    const dayData=dayMap[dateStr];
    const hasTx=!!dayData;
    cells+=`<div class="cal-day ${isToday?'today':''} ${hasTx?'has-tx':''}" onclick="openCalDay('${dateStr}')">
      <div class="cal-day-num ${dow===0?'sunday':dow===6?'saturday':''}">${d}</div>
      <div class="cal-dot-row">
        ${dayData?.exp?`<div class="cal-exp-dot">-${getCur().symbol}${dayData.exp.toFixed(0)}</div>`:''}
        ${dayData?.inc?`<div class="cal-inc-dot">+${getCur().symbol}${dayData.inc.toFixed(0)}</div>`:''}
      </div>
    </div>`;
  }
  // fill remaining
  const total=firstDay+daysInMonth;
  const nextDays=total%7?7-(total%7):0;
  for(let i=1;i<=nextDays;i++){cells+=`<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;}

  const monthName=new Date(y,m,1).toLocaleString('en',{month:'long',year:'numeric'});
  return`<div class="settings-page fade-in" style="padding-top:30px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0">
      <button onclick="calPrev()" style="background:var(--surface-bg);border:1px solid var(--border);border-radius:12px;padding:8px 14px;color:var(--text);font-size:16px">‹</button>
      <div style="text-align:center">
        <p style="font-size:18px;font-weight:700">${monthName}</p>
        <p style="font-size:11px;color:var(--muted)">Income <span style="color:var(--green)">${fmtLedger(monthInc)}</span> · Exp <span style="color:var(--red)">${fmtLedger(monthExp)}</span> · Carry <strong style="color:var(--text)">${fmtLedger(carryover)}</strong></p>
      </div>
      <button onclick="calNext()" style="background:var(--surface-bg);border:1px solid var(--border);border-radius:12px;padding:8px 14px;color:var(--text);font-size:16px">›</button>
    </div>
    <div class="cal-header">${dowHtml}</div>
    <div class="cal-grid">${cells}</div>
  </div>`;
}

function getStatYM(){return S.statYM||(()=>{const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');})();}
function getLastNMonths(n){
  const res=[];const now=new Date();
  for(let i=n-1;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    res.push({ym:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'),short:d.toLocaleString('en',{month:'short',year:'2-digit'})});
  }
  return res;
}
function getMonthName(ym){const[y,m]=ym.split('-');return new Date(y,m-1,1).toLocaleString('en',{month:'long',year:'numeric'});}

function buildDonut(catArr,total){
  if(!total)return'';
  const cx=120,cy=120,r=80,sw=40;
  let start=-Math.PI/2;
  let paths='';
  let legend='';
  catArr.slice(0,8).forEach(([key,{amount,cat}])=>{
    const angle=(amount/total)*2*Math.PI;
    const end=start+angle;
    const x1=cx+r*Math.cos(start),y1=cy+r*Math.sin(start);
    const x2=cx+r*Math.cos(end),y2=cy+r*Math.sin(end);
    const lg=angle>Math.PI?1:0;
    paths+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} Z" fill="${cat.color}" opacity="0.85"/>`;
    legend+=`<div class="legend-row"><div class="legend-dot" style="background:${cat.color}"></div><span style="flex:1;color:var(--text)">${cat.icon} ${cat.label}</span><span style="font-family:'DM Mono',monospace;color:var(--muted)">${(amount/total*100).toFixed(0)}%</span></div>`;
    start=end;
  });
  // center hole
  paths+=`<circle cx="${cx}" cy="${cy}" r="${r-sw}" fill="var(--bg2)"/>`;
  return`<div style="display:flex;flex-direction:column;align-items:center;width:100%">
    <svg width="240" height="240" viewBox="0 0 240 240">${paths}</svg>
    <div class="donut-legend" style="width:100%">${legend}</div>
  </div>`;
}

function buildSplitSection(f,splitMembers){
  if(!splitMembers.length)return'';
  const isEqual=f.splitMode!=='custom';
  const sel=f.splitWith||[];
  const totalAmt=parseFloat(f.amount)||0;
  const equalShare=sel.length>0?totalAmt/(sel.length+1):0;
  const memberBtns=splitMembers.map(m=>`
    <button class="member-box ${sel.includes(m.id)?'active':''}" style="${sel.includes(m.id)?'background:'+(m.color||'#888')+'CC;':''}" onclick="togSplit('${m.id}')">
      <div class="m-avatar">${m.avatar}</div><div>${m.displayName}</div>
      ${m.guest?'<div class="guest-badge">GUEST</div>':''}
      ${sel.includes(m.id)?'<div style="font-size:9px;margin-top:2px">✓</div>':''}
    </button>`).join('');
  let splitDetail='';
  if(sel.length>0){
    if(isEqual){
      splitDetail=`<p class="split-hint">Each pays ${fmt(equalShare,f.currency)}</p>`;
    }else{
      const rows=[f.member,...sel].map(uid=>{
        const m=getMem(uid);const val=f.customSplits[uid]!==undefined?f.customSplits[uid]:'';
        return`<div class="split-member-row">
          <span style="font-size:20px">${m.avatar}</span>
          <span style="flex:1;font-size:13px;font-weight:600">${m.displayName}${uid===f.member?' (paid)':''}${m.guest?' 👻':''}</span>
          <input type="number" inputmode="decimal" class="split-amount-input" placeholder="0.00" value="${val}" oninput="setCustomSplit('${uid}',this.value)">
        </div>`;
      }).join('');
      const splitTotal=Object.values(f.customSplits).reduce((s,v)=>s+(parseFloat(v)||0),0);
      const remaining=totalAmt-splitTotal;
      splitDetail=`<div style="margin-top:10px">${rows}
        <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:12px;color:${Math.abs(remaining)<0.01?'var(--green)':'var(--yellow)'}">
          <span>Allocated</span><span>${fmt(splitTotal,f.currency)} / ${fmt(totalAmt,f.currency)}</span>
        </div>
      </div>`;
    }
  }
  return`<div class="form-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <p class="label">Split with</p>
      ${sel.length>0?`<div style="display:flex;gap:6px">
        <button onclick="setSplitMode('equal')" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;background:${isEqual?'var(--accent)':'rgba(255,255,255,0.06)'};color:${isEqual?'#fff':'var(--muted)'}">Equal</button>
        <button onclick="setSplitMode('custom')" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;background:${!isEqual?'var(--accent)':'rgba(255,255,255,0.06)'};color:${!isEqual?'#fff':'var(--muted)'}">Custom</button>
      </div>`:''}
    </div>
    <div class="member-grid">${memberBtns}</div>
    ${splitDetail}
  </div>`;
}

function renderModal(){
  const mc=document.getElementById('modalContainer');if(!mc)return;
  if(!S.splitModal){mc.innerHTML='';return;}
  const t=S.splitModal;
  const cats=getCats();const cat=cats[t.category]||DEFAULT_CATS.other;
  const txCur=t.currency||S.ledgerCurrency;
  const subcatLabel=t.subcat&&cat.subcats?.[t.subcat]?cat.subcats[t.subcat]:'';
  const ledgerAmt=txAmtInLedger(t);
  const showOrig=txCur!==S.ledgerCurrency;

  let rows='';
  const hasSplit=(t.splitWith?.length>0)||(Object.keys(t.splitAmounts||{}).length>1);
  if(hasSplit){
    const splitEntries=t.splitAmounts&&Object.keys(t.splitAmounts).length>1?Object.entries(t.splitAmounts):
      [...[t.member],...(t.splitWith||[])].map(uid=>[uid,t.amount/([t.member,...(t.splitWith||[])].length)]);
    rows=splitEntries.map(([uid,amt])=>{
      const m=getMem(uid);const ip=uid===t.member;
      const settled=isSettled(t._k,uid);
      return`<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <span style="font-size:24px">${m.avatar}</span>
        <span style="font-size:14px;font-weight:500;flex:1">${m.displayName}${m.guest?'<span class="guest-badge">GUEST</span>':''}</span>
        ${ip?`<span class="tag" style="background:rgba(108,99,255,0.15);color:var(--accent)">paid</span>`:''}
        ${settled&&!ip?`<span class="settled-badge">✓ Settled</span>`:''}
        ${!ip&&!settled?`<button class="settle-btn" onclick="settleSplit('${t._k}','${uid}')">Settle ✓</button>`:''}
        <span style="font-family:'DM Mono',monospace;font-size:14px;color:${ip?'var(--green)':'var(--red)'}">${fmt(amt,txCur)}</span>
      </div>`;
    }).join('');
  }

  mc.innerHTML=`<div class="modal-overlay fade-in" onclick="closeModal()">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px">
        <div>
          <p style="font-size:22px;font-family:'DM Mono',monospace;color:${t.type==='income'?'var(--green)':'var(--red)'};font-weight:700">${t.type==='income'?'+':'-'}${fmtLedger(ledgerAmt)}</p>
          ${showOrig?`<p style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace">${txCur} ${fmt(t.amount,txCur)}</p>`:''}
          <p style="font-size:15px;font-weight:600;margin-top:4px">${t.description}</p>
          <p style="font-size:12px;color:var(--muted);margin-top:2px">${cat.icon} ${cat.label}${subcatLabel?' · '+subcatLabel:''} · ${t.date}</p>
        </div>
        <button onclick="editTx('${t._k}')" style="background:rgba(108,99,255,0.15);color:var(--accent);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;flex-shrink:0;margin-left:12px">✏️ Edit</button>
      </div>
      ${hasSplit?`<div style="border-top:1px solid var(--border);padding-top:16px;margin-bottom:16px"><p class="label" style="margin-bottom:12px">Split breakdown</p>${rows}</div>`:''}
      <button style="width:100%;padding:12px;border-radius:12px;background:rgba(255,107,107,0.12);color:var(--red);font-size:13px;font-weight:600;border:1px solid rgba(255,107,107,0.2);font-family:'Sora',sans-serif" onclick="delTxModal('${t._k}')">🗑 Delete Transaction</button>

async function joinByCode(code,msgEl){
  if(!code||code.length!==6){if(msgEl){msgEl.style.color='var(--red)';msgEl.textContent='Enter a 6-digit code.';}return null;}
  const snap=await get(ref(db,'ledgers'));const all=snap.val()||{};
  const entry=Object.entries(all).find(([,l])=>l.inviteCode===code);
  if(!entry){if(msgEl){msgEl.style.color='var(--red)';msgEl.textContent='Code not found.';}return null;}
  const[lid,ldata]=entry;
  await set(ref(db,`ledgers/${lid}/members/${S.user.uid}`),true);
  await set(ref(db,`ledgerMembers/${lid}/${S.user.uid}`),{displayName:S.profile?.displayName||'Me',avatar:S.profile?.avatar||'👤',color:S.profile?.color||M_COLORS[0],role:'member',joinedAt:Date.now()});
  await set(ref(db,`userLedgers/${S.user.uid}/${lid}`),true);
  S.ledgers[lid]=ldata;
  if(msgEl){msgEl.style.color='var(--green)';msgEl.textContent='✓ Joined!';}
  return ldata.name;
}

// ── FIREBASE LOAD ──
function loadLedger(lid){
  S.listeners.forEach(u=>u());S.listeners=[];
  const paths=[
    ['ledgers/'+lid,(v)=>{const d=v.val();if(d){S.ledgers[lid]={...S.ledgers[lid],...d};S.ledgerCurrency=d.currency||'MYR';render();}}],
    ['ledgerTransactions/'+lid,(v)=>{S.txs=v.val()||{};render();}],
    ['ledgerMembers/'+lid,(v)=>{S.members=v.val()||{};render();}],
    ['ledgerCategories/'+lid,(v)=>{S.cats=v.val()||{};render();}],
    ['ledgerBudgets/'+lid,(v)=>{S.budgets=v.val()||{};render();}],
    ['ledgerAssets/'+lid,(v)=>{S.assets=v.val()||{};render();}],
    ['ledgerRecurring/'+lid,(v)=>{S.recurringTxs=v.val()||{};render();}],
    ['ledgerSettlements/'+lid,(v)=>{S.settlements=v.val()||{};render();}],
  ];
  paths.forEach(([path,cb])=>{const r=ref(db,path);onValue(r,cb);S.listeners.push(()=>off(r,cb));});
}

onAuthStateChanged(auth,async user=>{
  document.getElementById('loadingScreen').style.display='none';
  if(!user){S.user=null;S.profile=null;S.activeLedgerId=null;renderAuth();return;}
  S.user=user;
  const profSnap=await get(ref(db,'userProfiles/'+user.uid));
  S.profile=profSnap.val()||{displayName:user.displayName||user.email?.split('@')[0]||'Me',avatar:'👤'};
  const ledsSnap=await get(ref(db,'userLedgers/'+user.uid));
  const lids=Object.keys(ledsSnap.val()||{});
  if(lids.length){
    for(const lid of lids){const s=await get(ref(db,'ledgers/'+lid));if(s.val())S.ledgers[lid]=s.val();}
  }
  document.getElementById('authContainer').innerHTML='';
  const saved=localStorage.getItem('fw_active');
  if(saved&&S.ledgers[saved]){S.activeLedgerId=saved;loadLedger(saved);document.getElementById('bottomNav').style.display='flex';}
  else renderLedgerScreen();
});

window.submitForm=async()=>{
  const f=S.addForm;
  if(!f.amount||isNaN(parseFloat(f.amount))){alert('Enter an amount.');return;}
  if(!f.description.trim()){alert('Enter a description.');return;}
  if(!f.member){alert('Select who paid.');return;}
  let splitAmounts={};
  if(f.type==='expense'&&f.splitWith.length>0){
    if(f.splitMode==='custom'){
      const all=[f.member,...f.splitWith];
      const total=all.reduce((s,uid)=>s+(parseFloat(f.customSplits[uid])||0),0);
      if(Math.abs(total-parseFloat(f.amount))>0.01){alert('Custom split must equal the total amount.');return;}
      all.forEach(uid=>splitAmounts[uid]=parseFloat(f.customSplits[uid])||0);
    }else{
      const all=[f.member,...f.splitWith];const sh=parseFloat(f.amount)/all.length;
      all.forEach(uid=>splitAmounts[uid]=sh);
    }
  }
  const data={type:f.type,amount:parseFloat(f.amount),category:f.type==='income'?'income':f.category,subcat:f.subcat||null,description:f.description.trim(),member:f.member,splitWith:[...f.splitWith],splitAmounts:Object.keys(splitAmounts).length?splitAmounts:null,date:f.date||td(),currency:f.currency||S.ledgerCurrency,assetId:f.assetId||null,ts:Date.now(),addedBy:S.user.uid};
  // Deduct from asset if selected
  if(f.assetId&&S.assets[f.assetId]){
    const asset=S.assets[f.assetId];
    const change=f.type==='expense'?-parseFloat(f.amount):parseFloat(f.amount);
    await update(ref(db,'ledgerAssets/'+S.activeLedgerId+'/'+f.assetId),{balance:(asset.balance||0)+change});
  }
  try{
    if(S.editTxKey){await update(ref(db,'ledgerTransactions/'+S.activeLedgerId+'/'+S.editTxKey),data);toast('✓ Changes saved');}
    else{await push(ref(db,'ledgerTransactions/'+S.activeLedgerId),data);toast('✓ Entry saved');}
    S.editTxKey=null;S.addForm=null;S.view='home';S.tab='transactions';render();
  }catch(e){alert('Error: '+e.message);}
};

window.doLogout    =async()=>{S.listeners.forEach(u=>u());S.listeners=[];S.activeLedgerId=null;S.txs={};S.members={};localStorage.removeItem('fw_active');await signOut(auth);};

// Category actions
window.startEditCat=key=>{editCatKey=key;editSubcatKey=null;selCatIcon=0;selCatColor=0;renderPage();};
window.cancelEditCat=()=>{editCatKey=null;renderPage();};
window.saveCat=async()=>{
  const name=document.getElementById('catName')?.value.trim();if(!name){alert('Enter a name.');return;}
  const cats=getCats();const key=editCatKey==='__new__'?name.toLowerCase().replace(/\s+/g,'_')+'_'+Date.now():editCatKey;
  const existing=cats[key]||{};const updated={...cats,[key]:{icon:CAT_ICONS[selCatIcon],label:name,color:CAT_COLORS[selCatColor],subcats:existing.subcats||{}}};delete updated.income;updated.income=DEFAULT_CATS.income;
  await set(ref(db,'ledgerCategories/'+S.activeLedgerId),updated);toast('✓ Category saved');editCatKey=null;renderPage();
};

window.deleteSubcat=async(catKey,subcatKey)=>{const cats=getCats();const cat={...cats[catKey],subcats:{...(cats[catKey].subcats||{})}};delete cat.subcats[subcatKey];const updated={...cats,[catKey]:cat};await set(ref(db,'ledgerCategories/'+S.activeLedgerId),updated);toast('✓ Removed');renderPage();};

// Gemini AI
window.saveGeminiKey=()=>{const val=document.getElementById('geminiKeyInput')?.value.trim();if(!val){toast('Enter key first','var(--red)');return;}localStorage.setItem('fw_gemini_key',val);toast('✓ Key saved');renderPage();};
window.clearGeminiKey=()=>{localStorage.removeItem('fw_gemini_key');const inp=document.getElementById('geminiKeyInput');if(inp)inp.value='';toast('Key cleared');renderPage();};
window.handleReceiptScan=async(input)=>{
  const file=input.files?.[0];if(!file)return;
  const key=localStorage.getItem('fw_gemini_key');
  if(!key){toast('⚠️ Add Gemini API key in Settings','var(--yellow)');input.value='';return;}
  const status=document.getElementById('scanStatus');if(status)status.style.display='block';
  try{
    const base64=await new Promise((res,rej)=>{const reader=new FileReader();reader.onload=()=>res(reader.result.split(',')[1]);reader.onerror=rej;reader.readAsDataURL(file);});
    const cats=getCats();const catKeys=Object.keys(cats).filter(k=>k!=='income').join(', ');
    const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:file.type,data:base64}},{text:`Analyze this receipt. Return ONLY valid JSON: {"amount":<number>,"description":<string max 40 chars>,"date":<YYYY-MM-DD>,"category":<one of: ${catKeys}>,"currency":<3-letter code>}`}]}]})});
    if(!resp.ok)throw new Error('API error '+resp.status);
    const data=await resp.json();const text=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    if(parsed.amount)S.addForm.amount=String(parseFloat(parsed.amount)||'');
    if(parsed.description)S.addForm.description=parsed.description;
    if(parsed.date)S.addForm.date=parsed.date;
    if(parsed.category&&cats[parsed.category])S.addForm.category=parsed.category;
    if(parsed.currency&&CURRENCIES[parsed.currency])S.addForm.currency=parsed.currency;
    S.addForm.type='expense';S.addForm.subcat='';
    if(status)status.style.display='none';
    renderPage();toast('✓ Receipt scanned!');
  }catch(e){if(status)status.style.display='none';toast('❌ '+e.message,'var(--red)');}
  finally{input.value='';}
};
</script>
