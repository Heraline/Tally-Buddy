function renderHistory(){
  const ym=S.historyMonth;
  const [yr,mo]=ym.split('-').map(Number);
  const nowYm=new Date().toISOString().slice(0,7);
  const monthLabel=new Date(yr,mo-1,1).toLocaleDateString('en-MY',{month:'long',year:'numeric'});
  const prevYm=`${mo===1?yr-1:yr}-${String(mo===1?12:mo-1).padStart(2,'0')}`;
  const nextYm=`${mo===12?yr+1:yr}-${String(mo===12?1:mo+1).padStart(2,'0')}`;
  const isCurrentMonth=ym===nowYm;

  // All transactions for this month, respecting member filter
  const f=S.filterMember;
  const all=txArr();
  const filtered=f==='all'?all:all.filter(t=>t.member===f||(t.splitWith||[]).includes(f));
  const monthTxs=filtered.filter(t=>t.date&&t.date.startsWith(ym));
  const inc=monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=monthTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal=inc-exp;

  // Month budget
  const nowMonthBudgets=ym===S.budgetMonth?S.budgets:{};
  // We only have budget data for S.budgetMonth so we just don't show it for other months — budget is managed separately
  const catBgt=Object.entries(S.budgets||{}).filter(([k])=>k!=='_total'&&!k.includes('__')&&ym===S.budgetMonth).reduce((s,[,v])=>s+(parseFloat(v)||0),0);
  const manualBgt=ym===S.budgetMonth?parseFloat(S.budgets?._total)||0:0;
  const totalBudget=manualBgt>0?manualBgt:catBgt;
  const budgetUsedPct=totalBudget>0?Math.min(100,(exp/totalBudget)*100):0;
  const budgetBarColor=exp>totalBudget?'var(--red)':budgetUsedPct>80?'var(--yellow)':'#6C63FF';

  // Category breakdown for this month
  const cats=getCats();
  const catBreakdown=Object.entries(cats).filter(([k])=>k!=='income').map(([key,cat])=>({
    key,...cat,
    total:monthTxs.filter(t=>t.category===key&&t.type==='expense').reduce((s,t)=>s+t.amount,0)
  })).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  // Member breakdown for this month
  const mems=S.members||{};
  const memberBreakdown=Object.entries(mems).map(([id,m])=>({
    id,...m,
    spent:monthTxs.filter(t=>t.member===id&&t.type==='expense').reduce((s,t)=>s+t.amount,0),
    earned:monthTxs.filter(t=>t.member===id&&t.type==='income').reduce((s,t)=>s+t.amount,0)
  })).filter(m=>m.spent>0||m.earned>0).sort((a,b)=>b.spent-a.spent);

  // vs prev month
  const prevMonthTxs=all.filter(t=>t.type==='expense'&&t.date?.startsWith(prevYm));
  const prevExp=prevMonthTxs.reduce((s,t)=>s+t.amount,0);
  const vsLast=prevExp>0?((exp-prevExp)/prevExp*100):null;

  // Group transactions by date for the list
  const g={};
  monthTxs.sort((a,b)=>b.date.localeCompare(a.date)||(b.ts||0)-(a.ts||0)).forEach(t=>{
    if(!g[t.date])g[t.date]=[];g[t.date].push(t);
  });

  // Get all months that have any transactions, for the month selector dots
  const allMonths=[...new Set(all.map(t=>t.date?.slice(0,7)).filter(Boolean))].sort().reverse();

  return`<div class="fade-in" style="padding-bottom:20px">

    <!-- Header -->
    <div style="padding:52px 20px 0;display:flex;align-items:center;gap:12px">
      <button onclick="goHome()" style="background:rgba(255,255,255,0.07);border:none;border-radius:12px;padding:8px 12px;font-size:16px;color:var(--text);cursor:pointer">←</button>
      <p style="font-size:22px;font-weight:700;letter-spacing:-0.02em;flex:1">History</p>
      <div style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:20px;padding:7px 13px">
        <span style="font-size:11px;color:var(--muted)">Total Balance</span>
        <span style="font-family:var(--font-num);font-size:13px;font-weight:700;color:var(--accent)">${fmt(Math.abs(allTimeTotals().bal))}</span>
      </div>
    </div>

    <!-- Month Navigator -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0">
      <button id="histPrevBtn" style="width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center">‹</button>
      <div style="text-align:center">
        <p style="font-size:17px;font-weight:700">${monthLabel}</p>
        ${isCurrentMonth?'<p style="font-size:10px;color:var(--accent);font-weight:600;letter-spacing:0.06em">CURRENT MONTH</p>':''}
      </div>
      <button id="histNextBtn" style="width:38px;height:38px;border-radius:12px;background:${isCurrentMonth?'rgba(255,255,255,0.03)':'rgba(255,255,255,0.07)'};border:1px solid var(--border);color:${isCurrentMonth?'var(--dim)':'var(--text)'};font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center" ${isCurrentMonth?'disabled':''}>›</button>
    </div>

    <!-- Month dots: quick jump to any month with transactions -->
    ${allMonths.length>1?`<div style="display:flex;gap:6px;padding:12px 20px 0;overflow-x:auto;-webkit-overflow-scrolling:touch">
      ${allMonths.slice(0,12).map(m=>`<button onclick="setHistoryMonth('${m}')" style="flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid ${m===ym?'var(--accent)':'var(--border)'};background:${m===ym?'rgba(108,99,255,0.2)':'rgba(255,255,255,0.04)'};color:${m===ym?'var(--accent)':'var(--muted)'};cursor:pointer">
        ${new Date(m+'-01').toLocaleDateString('en-MY',{month:'short',year:'2-digit'})}
      </button>`).join('')}
    </div>`:''}

    <!-- Summary Card -->
    <div class="card balance-card slide-up" style="margin:16px 20px 0;padding:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <p style="font-size:14px;font-weight:700">${monthLabel}</p>
        <span style="font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;background:${bal>=0?'rgba(105,210,160,0.15)':'rgba(255,107,107,0.15)'};color:${bal>=0?'var(--green)':'var(--red)'}">
          ${bal>=0?'▲ surplus':'▼ deficit'}
        </span>
      </div>

      <!-- Expense / Income -->
      <div style="display:flex;gap:12px;margin-bottom:${totalBudget>0?12:16}px">
        <div style="flex:1;background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.15);border-radius:14px;padding:12px">
          <p style="font-size:10px;color:var(--red);letter-spacing:0.08em;font-weight:600;margin-bottom:4px">EXPENSE</p>
          <p style="font-family:var(--font-num);font-size:18px;font-weight:700;color:var(--text)">${fmt(exp)}</p>
        </div>
        <div style="flex:1;background:rgba(105,210,160,0.08);border:1px solid rgba(105,210,160,0.15);border-radius:14px;padding:12px">
          <p style="font-size:10px;color:var(--green);letter-spacing:0.08em;font-weight:600;margin-bottom:4px">INCOME</p>
          <p style="font-family:var(--font-num);font-size:18px;font-weight:700;color:var(--text)">${fmt(inc)}</p>
        </div>
      </div>

      <!-- Budget bar (only if budget set for viewed month) -->
      ${totalBudget>0?`<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px">
          <span>Budget used</span>
          <span style="color:${budgetBarColor};font-weight:600">${fmt(exp)} / ${fmt(totalBudget)}</span>
        </div>
        <div class="budget-bar-track"><div class="budget-bar-fill" style="width:${budgetUsedPct}%;background:${budgetBarColor}"></div></div>
        <p style="font-size:11px;margin-top:5px;color:${exp>totalBudget?'var(--red)':'var(--accent2)'}">
          ${exp>totalBudget?'⚠️ Over by '+fmt(exp-totalBudget):'✓ Remaining: '+fmt(totalBudget-exp)+' ('+Math.round(100-budgetUsedPct)+'%)'}
        </p>
      </div>`:''}

      <!-- Category breakdown -->
      ${catBreakdown.length?`
      <p style="font-size:11px;color:var(--dim);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px">By Category</p>
      ${catBreakdown.map(c=>{
        const pct=exp>0?Math.round(c.total/exp*100):0;
        return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div style="width:32px;height:32px;border-radius:10px;background:${c.color}22;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${renderCatIcon(c.icon,20,true)}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:12px;font-weight:600">${c.label}</span>
              <span style="font-family:var(--font-num);font-size:12px;color:var(--muted)">${fmt(c.total)}</span>
            </div>
            <div style="height:4px;border-radius:999px;background:rgba(255,255,255,0.07)"><div style="height:100%;border-radius:999px;background:${c.color};width:${pct}%"></div></div>
          </div>
          <span style="font-size:11px;color:var(--dim);min-width:30px;text-align:right">${pct}%</span>
        </div>`;
      }).join('')}`:''}

      <!-- Member breakdown -->
      ${memberBreakdown.length?`
      <p style="font-size:11px;color:var(--dim);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-top:${catBreakdown.length?12:0}px;margin-bottom:10px">By Member</p>
      ${memberBreakdown.map(m=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:12px;background:rgba(255,255,255,0.03);margin-bottom:6px">
        <span style="font-size:20px">${m.avatar}</span>
        <span style="font-size:13px;font-weight:600;flex:1">${m.displayName}</span>
        ${m.spent>0?`<span style="font-family:var(--font-num);font-size:12px;color:var(--red)">-${fmt(m.spent)}</span>`:''}
        ${m.earned>0?`<span style="font-family:var(--font-num);font-size:12px;color:var(--green);margin-left:6px">+${fmt(m.earned)}</span>`:''}
      </div>`).join('')}`:''}

      <!-- vs last month -->
      ${vsLast!==null?`<div style="margin-top:12px;text-align:center">
        <span style="display:inline-block;background:rgba(255,255,255,0.05);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--muted)">
          vs last month: <strong style="color:${vsLast<=0?'var(--green)':'var(--red)'}">${vsLast>0?'+':''}${vsLast.toFixed(1)}% ${vsLast<=0?'decrease':'increase'}</strong>
        </span>
      </div>`:``}
    </div>

    <!-- Transaction List -->
    <div style="padding:0 20px">
      ${monthTxs.length===0
        ?`<div class="empty" style="padding:30px 0">No transactions in ${monthLabel}</div>`
        :Object.entries(g).map(([date,txs])=>{
          const dayInc=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
          const dayExp=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
          const incPart=dayInc>0?`<span style="color:var(--green);font-weight:600">Income ${fmt(dayInc)}</span>`:'';
          const expPart=dayExp>0?`<span style="color:var(--red);font-weight:600">Expense ${fmt(dayExp)}</span>`:'';
          const sep=dayInc>0&&dayExp>0?`<span style="color:var(--dim)"> · </span>`:'';
          return`<div style="margin-top:18px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <p class="tx-date-label" style="margin-bottom:0">${dlabel(date)}</p>
              <p style="font-size:11px">${incPart}${sep}${expPart}</p>
            </div>
            <div class="tx-list">
              ${txs.map(t=>{
                const cat=cats[t.category]||DEFAULT_CATS.other;
                const mem=getMem(t.member);
                const hs=(t.splitWith?.length>0)||(Object.keys(t.splitAmounts||{}).length>1);
                return`<div class="tx-row surface" onclick="openTxModal('${t._k}')">
                  <div class="tx-icon" style="background:${cat.color}22">${renderCatIcon(cat.icon,22,true)}</div>
                  <div class="tx-info">
                    <p class="tx-desc">${t.description}</p>
                    <div class="tx-meta">
                      <span class="tag" style="background:${(mem.color||'#999')}33;color:${mem.color||'#999'}">${mem.avatar} ${mem.displayName}</span>
                      ${hs?`<span class="tag" style="background:rgba(108,99,255,0.15);color:var(--accent)">÷split</span>`:''}
                      ${t.fromRecurringId?`<span class="tag" style="background:rgba(78,205,196,0.12);color:var(--accent2)">🔄</span>`:''}
                    </div>
                  </div>
                  <p class="tx-amount" style="color:${t.type==='income'?'var(--green)':'var(--text)'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</p>
                </div>`;
              }).join('')}
            </div>
          </div>`;
        }).join('')
      }
    </div>

    <div style="height:30px"></div>
  </div>`;
}

window.goHistory=()=>{S.view='history';render();};
window.setHistoryMonth=ym=>{S.historyMonth=ym;renderPage();};

function attachHistoryListeners(){
  const ym=S.historyMonth;
  document.getElementById('histPrevBtn')?.addEventListener('click',()=>{
    const[yr,mo]=ym.split('-').map(Number);
    const ny=mo===1?yr-1:yr,nm=mo===1?12:mo-1;
    window.setHistoryMonth(`${ny}-${String(nm).padStart(2,'0')}`);
  });
  document.getElementById('histNextBtn')?.addEventListener('click',()=>{
    const[yr,mo]=ym.split('-').map(Number);
    const ny=mo===12?yr+1:yr,nm=mo===12?1:mo+1;
    const next=`${ny}-${String(nm).padStart(2,'0')}`;
    if(next<=new Date().toISOString().slice(0,7))window.setHistoryMonth(next);
  });
}

function renderTxRow(t,cats){
  const cat=cats[t.category]||DEFAULT_CATS.other;
  const mem=getMem(t.member);
  const hs=(t.splitWith?.length>0)||(Object.keys(t.splitAmounts||{}).length>1);
  const subcatLabel=t.subcat&&cat.subcats?.[t.subcat]?` · ${getSubcatLabel(cat.subcats[t.subcat])}`:'';
  return`<div class="tx-row surface" onclick="openTxModal('${t._k}')">
    <div class="tx-icon" style="background:${cat.color}22">${renderCatIcon(cat.icon,22,true)}</div>
    <div class="tx-info">
      <p class="tx-desc">${t.description}</p>
      <div class="tx-meta">
        <span class="tag" style="background:${(mem.color||'#999')}33;color:${mem.color||'#999'}">${mem.avatar} ${mem.displayName}</span>
        ${subcatLabel?`<span class="tag" style="background:rgba(255,255,255,0.06);color:var(--muted)">${subcatLabel.trim()}</span>`:''}
        ${hs?`<span class="tag" style="background:rgba(108,99,255,0.15);color:var(--accent)">÷split</span>`:''}
        ${t.fromRecurringId?`<span class="tag" style="background:rgba(78,205,196,0.12);color:var(--accent2)">🔄 recur</span>`:''}
        ${t.currency&&t.currency!==S.ledgerCurrency?`<span class="tag" style="background:rgba(78,205,196,0.15);color:var(--accent2)">${t.currency}</span>`:''}
        ${t.assetId&&S.assets[t.assetId]?`<span class="tag" style="background:rgba(108,99,255,0.12);color:var(--accent)">${getAssetType(S.assets[t.assetId].type).icon} ${S.assets[t.assetId].name}</span>`:''}
      </div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <p class="tx-amount" style="color:${t.type==='income'?'var(--green)':'var(--text)'}">${t.type==='income'?'+':'-'}${fmt(t.amount,S.ledgerCurrency)}</p>
      ${t.origAmount&&t.currency&&t.currency!==S.ledgerCurrency?`<p style="font-size:10px;color:var(--muted);font-family:var(--font-num);margin-top:2px">${t.type==='income'?'+':'-'}${fmt(t.origAmount,t.currency)}</p>`:''}
    </div>
  </div>`;
}

function renderTxs(fil){
  if(!fil.length)return'<div class="empty">No transactions yet.<br>Tap + to add one!</div>';
  const cats=getCats();
  const latest=fil.slice(0,5);
  const hasMore=fil.length>5;
  const g={};latest.forEach(t=>{const l=dlabel(t.date);if(!g[l])g[l]=[];g[l].push(t);});
  const rows=Object.entries(g).map(([lbl,txs])=>{
    const dayInc=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const dayExp=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const incPart=dayInc>0?`<span style="color:var(--green);font-weight:600">Income ${fmt(dayInc)}</span>`:'';
    const expPart=dayExp>0?`<span style="color:var(--red);font-weight:600">Expense ${fmt(dayExp)}</span>`:'';
    const sep=dayInc>0&&dayExp>0?`<span style="color:var(--dim)"> · </span>`:'';
    return`<div class="tx-group">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 22px">
        <p style="font-size:11px;color:var(--dim);letter-spacing:0.1em;text-transform:uppercase;font-weight:600">${lbl}</p>
        <p style="font-size:11px">${incPart}${sep}${expPart}</p>
      </div>
      <div class="tx-list" style="padding:0 22px">${txs.map(t=>renderTxRow(t,cats)).join('')}</div>
    </div>`;
  }).join('');
  return rows+(hasMore?`
    <div style="padding:0 22px 8px">
      <button onclick="goHistory()" style="width:100%;padding:13px;border-radius:14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);font-size:13px;font-weight:600">
        View all ${fil.length} transactions →
      </button>
    </div>`:'');
}

function renderAnalytics(fil,totalExp){
  const cats=getCats();

  // Category bars — tap to open txByCategory page
  const catData=Object.entries(cats).filter(([k])=>k!=='income').map(([key,cat])=>({
    key,...cat,
    total:fil.filter(t=>t.category===key&&t.type==='expense').reduce((s,t)=>s+t.amount,0),
    budget:S.budgets?.[key]||0
  })).filter(c=>c.total>0||c.budget>0).sort((a,b)=>b.total-a.total);

  const bars=catData.length?catData.map(c=>{
    const budgetPct=c.budget>0?Math.min(100,(c.total/c.budget)*100):totalExp>0?Math.min(100,(c.total/totalExp)*100):0;
    const overBudget=c.budget>0&&c.total>c.budget;
    return`<div class="cat-bar-row" onclick="goTxByCategory('${c.key}')" style="cursor:pointer;border-radius:12px;padding:8px 10px;background:rgba(255,255,255,0.02);margin-bottom:4px;transition:background 0.15s" onmousedown="this.style.background='rgba(255,255,255,0.06)'" ontouchstart="this.style.background='rgba(255,255,255,0.06)'" onmouseup="this.style.background='rgba(255,255,255,0.02)'" ontouchend="this.style.background='rgba(255,255,255,0.02)'">
      <div class="cat-bar-header">
        <span style="display:flex;align-items:center;gap:8px"><span style="font-size:18px;display:flex;align-items:center;justify-content:center">${renderCatIcon(c.icon,18,true)}</span><span style="color:var(--muted)">${c.label}</span></span>
        <span style="display:flex;align-items:center;gap:6px">
          <span style="font-family:var(--font-num);font-size:13px">${fmt(c.total)}${c.budget>0?` <span style="color:var(--dim);font-size:11px">/ ${fmt(c.budget)}</span>`:''}</span>
          <span style="color:var(--dim);font-size:14px">›</span>
        </span>
      </div>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="background:${overBudget?'var(--red)':c.color};width:${budgetPct}%"></div></div>
      ${overBudget?`<p class="budget-over">Over by ${fmt(c.total-c.budget)}</p>`:c.budget>0&&budgetPct>80?`<p class="budget-warning">${Math.round(budgetPct)}% used</p>`:''}
    </div>`;
  }).join(''):'<p class="empty">No expense data yet.</p>';

  // Debts
  const dbs=debts();
  const dRows=dbs.length?dbs.map(d=>{const f=getMem(d.from),t=getMem(d.to);
    return`<div class="debt-row surface" style="display:flex;align-items:center;gap:12px;padding:12px 15px;border-radius:14px;margin-bottom:8px">
      <span style="font-size:20px">${f.avatar}</span>
      <span style="font-size:13px;color:var(--muted);flex:1">${f.displayName} owes ${t.displayName}</span>
      <span style="font-family:var(--font-num);font-size:14px;color:var(--yellow);font-weight:600">${fmt(d.amount)}</span>
      <button onclick="openSettleModal('${d.from}','${d.to}',${d.amount.toFixed(2)})" style="padding:6px 12px;border-radius:10px;background:rgba(105,210,160,0.15);color:var(--green);font-size:12px;font-weight:700;border:1px solid rgba(105,210,160,0.3);flex-shrink:0">Settle</button>
    </div>`;
  }).join(''):'<p style="font-size:13px;color:var(--dim)">No split balances. 🎉</p>';
  const settleLog=Object.entries(S.settlements||{}).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0)).slice(0,8).map(([sk,s])=>{
    const f=getMem(s.from),t=getMem(s.to);
    return`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;margin-bottom:6px;background:rgba(105,210,160,0.06);border:1px solid rgba(105,210,160,0.15)">
      <span style="font-size:18px">${f.avatar}</span>
      <div style="flex:1;min-width:0"><p style="font-size:13px;font-weight:600">${f.displayName} → ${t.displayName}</p><p style="font-size:11px;color:var(--dim)">${s.note||'Settled'} · ${s.date||''}</p></div>
      <span style="font-family:var(--font-num);font-size:13px;color:var(--green);font-weight:600">${fmt(s.amount)}</span>

}

// ══════════════════════════════════════════
//  ADD / EDIT FORM
// ══════════════════════════════════════════
function renderAdd(){
  const f=S.addForm;
  const isEdit=!!S.editTxKey;
  const mList=allMembers();
  if(!f.member&&mList.length)f.member=mList[0].id;
  if(!f.currency)f.currency=S.ledgerCurrency;
  const cats=getCats();
  const cat=cats[f.category]||DEFAULT_CATS.other;
  const subcats=cat.subcats&&Object.keys(cat.subcats).length?cat.subcats:null;

  const chips=Object.entries(cats).filter(([k])=>k!=='income').map(([key,c])=>`
    <button class="chip ${f.category===key?'active':''}" style="${f.category===key?'background:'+c.color+';':''}" onclick="setFF('category','${key}');setFF('subcat','');renderPage()">${renderCatIcon(c.icon,16)} ${c.label}</button>`).join('');

  const subcatChips=subcats?`<div style="margin-top:10px">
    <p class="label" style="margin-bottom:8px">Subcategory <span style="color:var(--dim);font-style:normal;text-transform:none;letter-spacing:0">(optional)</span></p>
    <div class="chip-grid">
      <button class="subcat-chip ${!f.subcat?'active':''}" style="${!f.subcat?'background:'+cat.color+'99;':''}" onclick="setFF('subcat','');renderPage()">All</button>
      ${Object.entries(subcats).map(([k,v])=>`<button class="subcat-chip ${f.subcat===k?'active':''}" style="${f.subcat===k?'background:'+cat.color+'99;':''}" onclick="setFF('subcat','${k}');renderPage()">${renderSubcatChipContent(v)}</button>`).join('')}
    </div>
  </div>`:'';

  const paidBy=mList.map(m=>`
    <button class="member-box ${f.member===m.id?'active':''}" style="${f.member===m.id?'background:'+(m.color||'#888')+';':''}" onclick="setFM('${m.id}')">
      <div class="m-avatar">${m.avatar}</div>
      <div>${m.displayName}</div>
      ${m.guest?'<div class="guest-badge">GUEST</div>':''}
    </button>`).join('');

  // ── PAYERS SECTION (who actually put out cash) ──
  const coPayors=f.coPayors||[];
  const payerMode=f.payerMode||'equal';
  const payerAmounts=f.payerAmounts||{};
  const isPayEqual=payerMode!=='custom';
  const totalAmt=parseFloat(f.amount)||0;
  const otherMems=mList.filter(m=>m.id!==f.member);

  const allPayers=[f.member,...coPayors];
  const equalPayShare=allPayers.length>1?totalAmt/allPayers.length:0;
  const coPayorSum=isPayEqual
    ?(coPayors.length>0?totalAmt/allPayers.length*coPayors.length:0)
    :coPayors.reduce((s,id)=>s+(parseFloat(payerAmounts[id])||0),0);
  const primPays=Math.max(0,totalAmt-coPayorSum);

  let payerDetail='';
  if(coPayors.length>0){
    if(isPayEqual){
      payerDetail=`<p class="split-hint">Each payer contributes ${fmt(equalPayShare,f.currency)}</p>`;
    }else{
      const rows=coPayors.map(id=>{
        const m=getMem(id);const val=payerAmounts[id]!==undefined?payerAmounts[id]:'';
        return`<div class="split-member-row">
          <span style="font-size:20px">${m.avatar}</span>
          <span style="flex:1;font-size:13px;font-weight:600">${m.displayName}${m.guest?' 👻':''}</span>
          <input type="number" inputmode="decimal" class="split-amount-input" placeholder="0.00" value="${val}" oninput="setPayerAmt('${id}',this.value)">
        </div>`;}).join('');
      payerDetail=`<div style="margin-top:10px">${rows}
        <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:12px;color:${coPayorSum>totalAmt?'var(--red)':'var(--muted)'}">
          <span>Others contribute</span><span style="font-family:var(--font-num);font-weight:700">${fmt(coPayorSum,f.currency)} / ${fmt(totalAmt,f.currency)}</span>
        </div>
        <p style="font-size:11px;margin-top:4px;color:${coPayorSum>totalAmt?'var(--red)':primPays>0?'var(--green)':'var(--accent2)'}">
          ${coPayorSum>totalAmt?'⚠ Co-payer total exceeds amount':primPays>0?getMem(f.member).displayName+' pays '+fmt(primPays,f.currency):'✓ Fully covered by others'}
        </p>
      </div>`;
    }
  }

  const payerSection=f.type==='expense'&&otherMems.length?`<div class="form-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <p class="label">Payers <span style="color:var(--dim);text-transform:none;letter-spacing:0;font-size:11px">— who paid cash</span></p>
      ${coPayors.length>0?`<div style="display:flex;gap:6px">
        <button onclick="setPayerMode('equal')" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;background:${isPayEqual?'var(--accent)':'rgba(255,255,255,0.06)'};color:${isPayEqual?'#fff':'var(--muted)'}">Equal</button>
        <button onclick="setPayerMode('custom')" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;background:${!isPayEqual?'var(--accent)':'rgba(255,255,255,0.06)'};color:${!isPayEqual?'#fff':'var(--muted)'}">Custom</button>
      </div>`:''}
    </div>
    <p style="font-size:11px;color:var(--dim);margin-bottom:10px;line-height:1.5">Primary payer selected above. Tap others who also paid:</p>
    <div class="member-grid">${otherMems.map(m=>`
      <button class="member-box ${coPayors.includes(m.id)?'active':''}" style="${coPayors.includes(m.id)?'background:'+(m.color||'#888')+'CC;':''}" onclick="togPayer('${m.id}')">
        <div class="m-avatar">${m.avatar}</div><div>${m.displayName}</div>
        ${m.guest?'<div class="guest-badge">GUEST</div>':''}
        ${coPayors.includes(m.id)?'<div style="font-size:9px;margin-top:2px">✓ paid</div>':''}
      </button>`).join('')}
    </div>
    ${payerDetail}
  </div>`:'';

  const splitMembers=mList.filter(m=>m.id!==f.member);
  const splitSection=f.type==='expense'?buildSplitSection(f,splitMembers):'';

  const aiProvider=localStorage.getItem('fw_ai_provider')||'gemini';
  const aiKey=aiProvider==='openai'?localStorage.getItem('fw_openai_key')||'':localStorage.getItem('fw_gemini_key')||'';
  const providerLabel=aiProvider==='openai'?'🤖 GPT-4o':'🌟 Gemini';
  const scanBar=!isEdit?`
    <!-- Hidden file inputs: one for camera, one for library -->
    <input type="file" id="receiptCamera"  accept="image/*" capture="environment" style="display:none" onchange="handlePhotoSelected(this)">
    <input type="file" id="receiptLibrary" accept="image/*"                        style="display:none" onchange="handlePhotoSelected(this)">

    ${S._pendingShortcutScan?`
    <button id="shortcutScanBtn" onclick="scanFromShortcut()" style="width:100%;padding:16px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px">
      <span style="font-size:20px">📋</span> Tap to Scan Receipt
    </button>`:''}

    ${!aiKey?`
    <div style="background:rgba(255,230,109,0.1);border:1px solid rgba(255,230,109,0.25);border-radius:14px;padding:13px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px">
      <span style="font-size:18px">⚠️</span>
      <div style="flex:1">
        <p style="font-size:12px;color:var(--yellow);font-weight:600">No AI key set up</p>
        <p style="font-size:11px;color:var(--dim);margin-top:2px">Add a Gemini or OpenAI key in Settings</p>
      </div>
      <button onclick="goSettings()" style="background:rgba(108,99,255,0.2);color:var(--accent);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;border:none">Set up</button>
    </div>`:`
    <div style="background:rgba(105,210,160,0.08);border:1px solid rgba(105,210,160,0.2);border-radius:10px;padding:7px 12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
      <p style="font-size:11px;color:var(--green);font-weight:600">${providerLabel} active</p>
      <button onclick="goSettings()" style="background:none;border:none;font-size:11px;color:var(--dim);font-weight:600">Switch</button>
    </div>`}

    <!-- Photo source buttons -->
    <div style="display:flex;gap:10px;margin-bottom:14px">
      <button onclick="document.getElementById('receiptCamera').click()" style="flex:1;padding:14px 10px;border-radius:16px;background:rgba(108,99,255,0.12);border:1.5px solid rgba(108,99,255,0.3);color:var(--accent);font-size:13px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer">
        <span style="font-size:24px">📷</span>Take Photo
      </button>
      <button onclick="document.getElementById('receiptLibrary').click()" style="flex:1;padding:14px 10px;border-radius:16px;background:rgba(78,205,196,0.1);border:1.5px solid rgba(78,205,196,0.3);color:var(--accent2);font-size:13px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer">
        <span style="font-size:24px">🖼️</span>Choose Photo
      </button>
    </div>

    <!-- Photo preview (hidden until photo selected) -->
    <div id="photoPreviewWrap" style="display:none;margin-bottom:14px">
      <div style="position:relative;border-radius:16px;overflow:hidden;border:1.5px solid rgba(108,99,255,0.3)">
        <img id="photoPreviewImg" src="" alt="Receipt preview" style="width:100%;max-height:240px;object-fit:cover;display:block">
        <button onclick="clearPhotoPreview()" style="position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;font-size:14px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
      </div>
      <button id="scanNowBtn" onclick="scanSelectedPhoto()" style="width:100%;margin-top:10px;padding:14px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
        <span>✨</span> Scan with AI
      </button>
    </div>

    <!-- Scanning progress overlay -->
    <div id="scanStatus" style="display:none;margin-bottom:14px;padding:18px;border-radius:16px;background:rgba(108,99,255,0.08);border:1px solid rgba(108,99,255,0.2);text-align:center">
      <div class="spinner" style="width:28px;height:28px;border-width:3px;margin:0 auto 10px"></div>
      <p id="scanStatusMsg" style="font-size:14px;font-weight:600;color:var(--accent)">Reading receipt...</p>
      <p style="font-size:11px;color:var(--dim);margin-top:4px">AI is extracting transaction details</p>
    </div>
    <!-- Persistent error box -->
    <div id="scanErrorBox" style="display:none;margin-bottom:14px;padding:14px 16px;border-radius:14px;background:rgba(255,107,107,0.1);border:1.5px solid rgba(255,107,107,0.3)">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <span style="font-size:18px;flex-shrink:0">❌</span>
        <div style="flex:1">
          <p style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:4px">Scan failed</p>
          <p id="scanErrorMsg" style="font-size:12px;color:var(--muted);line-height:1.5"></p>
        </div>
        <button onclick="document.getElementById('scanErrorBox').style.display='none'" style="background:none;color:var(--dim);font-size:18px;border:none;cursor:pointer;flex-shrink:0;line-height:1">×</button>
      </div>
    </div>

    <!-- Scan result preview card (shown after successful scan) -->
    <div id="scanResultCard" style="display:none;margin-bottom:14px;padding:16px;border-radius:16px;background:rgba(105,210,160,0.08);border:1.5px solid rgba(105,210,160,0.3)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:18px">✅</span>
        <p style="font-size:13px;font-weight:700;color:var(--green)">Receipt scanned — review below</p>
        <button onclick="clearScanResult()" style="margin-left:auto;background:none;color:var(--dim);font-size:18px;border:none;cursor:pointer;line-height:1">×</button>
      </div>
      <div id="scanResultBody" style="font-size:12px;color:var(--muted);line-height:1.8"></div>
      <p style="font-size:11px;color:var(--dim);margin-top:10px">Form has been filled. Review and save, or scan again.</p>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px">
      <div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="font-size:11px;color:var(--dim)">OR FILL MANUALLY</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>`:'';

  return`<div class="add-page slide-up">
    <button class="btn-ghost" onclick="goHome()" style="margin-bottom:22px">← Back</button>
    <h2 style="font-size:24px;font-weight:700;letter-spacing:-0.02em;margin-bottom:26px">${isEdit?'✏️ Edit Entry':'New Entry'}</h2>
    ${scanBar}
    <div class="type-toggle">
      <button class="type-btn ${f.type==='expense'?'active-expense':''}" onclick="setType('expense')">💸 Expense</button>
      <button class="type-btn ${f.type==='income'?'active-income':''}" onclick="setType('income')">💰 Income</button>
    </div>
    <div class="form-section"><div class="input-card surface">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <p class="label">Amount</p>
        ${(()=>{
          // If an asset is selected, currency is locked to that asset's currency
          const selAst=f.assetId?S.assets[f.assetId]:null;
          const lockedCur=selAst?.currency||null;
          if(lockedCur){
            return`<span style="background:rgba(108,99,255,0.15);border:1px solid rgba(108,99,255,0.3);border-radius:10px;color:var(--accent);font-size:12px;font-weight:700;padding:5px 10px">${CURRENCIES[lockedCur]?.flag||''} ${lockedCur}</span>`;
          }
          return`<select onchange="setFF('currency',this.value);renderPage()" style="background:rgba(255,255,255,0.08);border:1px solid rgba(108,99,255,0.3);border-radius:10px;color:var(--text);font-family:var(--font-ui);font-size:12px;font-weight:600;padding:5px 8px;outline:none">
            ${Object.entries(CURRENCIES).map(([k,c])=>`<option value="${k}" ${k===f.currency?'selected':''}>${c.flag} ${k}</option>`).join('')}
          </select>`;
        })()}
      </div>
      <input class="big-input" type="number" inputmode="decimal" placeholder="0.00" value="${f.amount}" oninput="setFF('amount',this.value);updateConversionDisplay(this.value)">
      ${(()=>{
        // Show live conversion if currency differs from ledger currency
        const dispCur=f.assetId&&S.assets[f.assetId]?S.assets[f.assetId].currency||S.ledgerCurrency:f.currency;
        if(dispCur&&dispCur!==S.ledgerCurrency&&parseFloat(f.amount)>0){
          const converted=convertToLedger(parseFloat(f.amount),dispCur);
          return`<p id="convDisplay" style="font-size:12px;color:var(--accent2);margin-top:6px;font-family:var(--font-num)">≈ ${fmt(converted,S.ledgerCurrency)} <span style="color:var(--dim);font-size:10px;font-family:var(--font-ui)">in ${S.ledgerCurrency}</span></p>`;
        }
        return'';
      })()}
    </div></div>
    <div class="form-section"><div class="input-card surface">
      <p class="label" style="margin-bottom:8px">Description</p>
      <input class="normal-input" type="text" placeholder="What was this for? (optional)" value="${f.description}" oninput="setFF('description',this.value)">
    </div></div>
    <div class="form-section"><div class="input-card surface">
      <p class="label" style="margin-bottom:8px">Date & Time</p>
      <div style="display:flex;gap:12px;align-items:center">
        <input class="normal-input" type="date" value="${f.date}" oninput="setFF('date',this.value)" style="flex:1.4">
        <input class="normal-input" type="time" value="${f.time||tt()}" oninput="setFF('time',this.value)" style="flex:1">
      </div>
    </div></div>
    ${f.type==='expense'?`<div class="form-section"><p class="label" style="margin-bottom:10px">Category</p><div class="chip-grid">${chips}</div>${subcatChips}</div>`:''}
    <div class="form-section"><p class="label" style="margin-bottom:10px">Paid by</p>
      <div class="member-grid">${paidBy||'<p style="color:var(--dim);font-size:13px">No members yet.</p>'}</div>
    </div>
    ${payerSection}
    ${splitSection}
    ${buildAssetPicker(f)}
    <button class="btn-primary" onclick="submitForm()">${isEdit?'✓ Save Changes':'Save Entry ✓'}</button>
    ${isEdit?`<button onclick="deleteTxFromEdit()" style="margin-top:12px;width:100%;padding:14px;border-radius:14px;background:rgba(255,107,107,0.1);color:var(--red);font-size:14px;font-weight:600;border:1px solid rgba(255,107,107,0.2)">🗑 Delete Transaction</button>`:''}
  </div>`;
}

function buildSplitSection(f,splitMembers){
  if(!splitMembers.length)return'';
  const isEqual=f.splitMode!=='custom';
  const sel=f.splitWith||[];
  const totalAmt=parseFloat(f.amount)||0;
  // Split is purely about who INCURRED the expense — independent of who paid
  const allSplit=[f.member,...sel];
  const equalShare=allSplit.length>1?totalAmt/allSplit.length:0;

  const memberBtns=splitMembers.map(m=>{
    const isPayer=(f.coPayors||[]).includes(m.id);
    return`<button class="member-box ${sel.includes(m.id)?'active':''}" style="${sel.includes(m.id)?'background:'+(m.color||'#888')+'CC;':''}" onclick="togSplit('${m.id}')">
      <div class="m-avatar">${m.avatar}</div>
      <div>${m.displayName}</div>
      ${m.guest?'<div class="guest-badge">GUEST</div>':''}
      ${isPayer&&sel.includes(m.id)?'<div style="font-size:8px;margin-top:1px;color:#fff;opacity:0.8">paid ✓</div>':isPayer?'<div style="font-size:8px;margin-top:1px;color:#fff;opacity:0.8">paid</div>':sel.includes(m.id)?'<div style="font-size:9px;margin-top:2px">✓</div>':''}
    </button>`;}).join('');

  let splitDetail='';
  if(sel.length>0){
    if(isEqual){
      splitDetail=`<p class="split-hint">Each owes ${fmt(equalShare,f.currency)} of the total</p>`;
    }else{
      const rows=allSplit.map(uid=>{
        const m=getMem(uid);const val=f.customSplits[uid]!==undefined?f.customSplits[uid]:'';
        return`<div class="split-member-row">
          <span style="font-size:20px">${m.avatar}</span>
          <span style="flex:1;font-size:13px;font-weight:600">${m.displayName}${m.guest?' 👻':''}</span>
          <input type="number" inputmode="decimal" class="split-amount-input" placeholder="0.00" value="${val}" oninput="setCustomSplit('${uid}',this.value)">
        </div>`;
      }).join('');
      const splitTotal=Object.values(f.customSplits).reduce((s,v)=>s+(parseFloat(v)||0),0);
      const remaining=totalAmt-splitTotal;
      splitDetail=`<div style="margin-top:10px">${rows}
        <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:12px;color:${Math.abs(remaining)<0.01?'var(--green)':'var(--yellow)'}">
          <span>Allocated</span><span>${fmt(splitTotal,f.currency)} / ${fmt(totalAmt,f.currency)}</span>
        </div>
        ${Math.abs(remaining)>0.01?`<p style="font-size:11px;color:var(--yellow);margin-top:4px">Remaining: ${fmt(remaining,f.currency)}</p>`:'<p style="font-size:11px;color:var(--green);margin-top:4px">✓ Balanced</p>'}
      </div>`;
    }
  }

  return`<div class="form-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <p class="label">Split with <span style="color:var(--dim);text-transform:none;letter-spacing:0;font-size:11px">— who incurred this</span></p>
      ${sel.length>0?`<div style="display:flex;gap:6px">
        <button onclick="setSplitMode('equal')" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;background:${isEqual?'var(--accent)':'rgba(255,255,255,0.06)'};color:${isEqual?'#fff':'var(--muted)'}">Equal</button>
        <button onclick="setSplitMode('custom')" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;background:${!isEqual?'var(--accent)':'rgba(255,255,255,0.06)'};color:${!isEqual?'#fff':'var(--muted)'}">Custom</button>
      </div>`:''}
    </div>
    <p style="font-size:11px;color:var(--dim);margin-bottom:10px;line-height:1.5">Primary payer included. Tap others who share this cost:</p>
    <div class="member-grid">${memberBtns}</div>
    ${splitDetail}
  </div>`;
}
// ── ASSET PICKER for Add/Edit form ──
function buildAssetPicker(f){
  const assetArr=Object.entries(S.assets||{}).map(([id,a])=>({id,...a}));
  if(!assetArr.length)return'';
  const selectedAsset=assetArr.find(a=>a.id===f.assetId);
  const t_sel=selectedAsset?getAssetType(selectedAsset.type):null;
  const options=assetArr.map(a=>{
    const t=getAssetType(a.type);
    const bal=parseFloat(a.balance)||0;
    const isCredit=a.type==='credit';
    const aDispIcon=a.customIcon?renderCatIcon(a.customIcon,18,true):(a.iconEmoji||t.icon);
    return`<button class="member-box ${f.assetId===a.id?'active':''}"
      style="min-width:80px;${f.assetId===a.id?'background:'+t.color+'33;border:1.5px solid '+t.color+';':''}"
      onclick="pickAsset('${a.id}','${a.currency||S.ledgerCurrency}')">
      <div class="m-avatar" style="font-size:18px">${aDispIcon}</div>
      <div style="font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:72px">${a.name}</div>
      <div style="font-size:10px;color:${isCredit&&bal>0?'var(--red)':bal<0?'var(--red)':'var(--accent2)'};font-family:var(--font-num);margin-top:2px">${fmt(Math.abs(bal),a.currency||S.ledgerCurrency)}</div>
    </button>`;
  }).join('');
  const noneBtn=`<button class="member-box ${!f.assetId?'active':''}"
    style="${!f.assetId?'background:rgba(255,255,255,0.1);':''}"
    onclick="setFF('assetId','');renderPage()">
    <div class="m-avatar" style="font-size:18px">💼</div>
    <div style="font-size:11px;font-weight:700">None</div>
    <div style="font-size:10px;color:var(--dim);margin-top:2px">—</div>
  </button>`;
  const selAssetCur=selectedAsset?.currency||S.ledgerCurrency;
  const txAmtInAssetCur=parseFloat(f.amount)||0;
  const txAmtInLedgerCur=f.currency!==S.ledgerCurrency?convertToLedger(txAmtInAssetCur,f.currency):txAmtInAssetCur;
  const hint=selectedAsset?`<p style="font-size:11px;color:var(--accent2);text-align:center;margin-top:8px;line-height:1.7">
    ${t_sel.icon} ${selectedAsset.name} balance will be ${f.type==='expense'?'reduced by':'increased by'}
    <strong>${fmt(txAmtInAssetCur,selAssetCur)}</strong>
    ${selAssetCur!==S.ledgerCurrency&&f.currency===selAssetCur?`<br>Recorded as <strong>${fmtConverted(txAmtInAssetCur,selAssetCur)}</strong> in ${S.ledgerCurrency}`:''}
  </p>`:'';
  return`<div class="form-section">
    <p class="label" style="margin-bottom:10px">Asset Account <span style="color:var(--dim);text-transform:none;letter-spacing:0;font-size:11px">(optional)</span></p>
    <div class="member-grid">${noneBtn}${options}</div>
    ${hint}
  </div>`;
}

function renderModal(){

  const cat=cats[t.category]||DEFAULT_CATS.other;

  let rows='';

  if(hasSplit){
    if(t.splitAmounts&&Object.keys(t.splitAmounts).length>1){

        </div>`;}).join('');
    }else{
      const all=[t.member,...(t.splitWith||[])];const sh=t.amount/all.length;
      rows=all.map(uid=>{const m=getMem(uid);const ip=uid===t.member;
        return`<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
          <span style="font-size:24px">${m.avatar}</span>
          <span style="font-size:14px;font-weight:500;flex:1">${m.displayName}${m.guest?'<span class="guest-badge">GUEST</span>':''}</span>

    return`<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <span style="font-size:24px">${m.avatar}</span>

  mc.innerHTML=`<div class="modal-overlay fade-in" onclick="closeModal()">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px">

    <div style="display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;background:rgba(105,210,160,0.08);border:1px solid rgba(105,210,160,0.2);margin-bottom:20px">
      <span style="font-size:28px">${f.avatar||'👤'}</span>
      <div style="flex:1"><p style="font-size:14px;font-weight:600">${f.displayName}</p><p style="font-size:11px;color:var(--muted)">paying back</p></div>

    </div>
    <p class="label" style="margin-bottom:8px">Amount to Settle <span style="color:var(--dim);text-transform:none;letter-spacing:0;font-size:11px">(${lCur})</span></p>
    <div class="surface input-card" style="margin-bottom:14px;padding:14px 16px">
      <input id="settleAmt" type="number" inputmode="decimal" class="big-input" placeholder="0.00" value="${dispAmt.toFixed(2)}" style="font-size:28px">
      <p style="font-size:11px;color:var(--dim);margin-top:4px">Max owed: ${fmtS(dispAmt)}</p>
    </div>
    <p class="label" style="margin-bottom:8px">Note (optional)</p>
    <div class="surface input-card" style="margin-bottom:20px">
      <input id="settleNote" type="text" class="normal-input" placeholder="e.g. Cash transfer, PayNow…">
    </div>
    <button id="settleConfirmBtn" class="btn-primary" style="margin-bottom:10px">✓ Record Settlement</button>
    <button id="settleCancelBtn" style="width:100%;padding:13px;border-radius:14px;background:rgba(255,255,255,0.05);color:var(--muted);font-size:14px;font-weight:600;border:none;font-family:var(--font-ui);cursor:pointer">Cancel</button>`;
  overlay.appendChild(sheet);mc.appendChild(overlay);
  document.getElementById('settleConfirmBtn').addEventListener('click',async()=>{
    const amt=parseFloat(document.getElementById('settleAmt')?.value)||0;

    if(amt<=0){toast('Enter a valid amount','var(--red)');return;}
    if(amt>dispAmt+0.01){toast('Amount exceeds what is owed','var(--red)');return;}
    try{
      const k=push(ref(db,'ledgers/'+tlid+'/settlements')).key;
      await set(ref(db,'ledgers/'+tlid+'/settlements/'+k),{
        from:fromId,to:toId,amount:amt,note,date:td(),ts:Date.now(),by:S.user.uid,reviewed:false

      toast('✓ Settlement recorded — check History tab to review');

    }catch(e){toast('Error: '+e.message,'var(--red)');}
  });
  document.getElementById('settleCancelBtn').addEventListener('click',()=>closeSettleModal());
}

// ══════════════════════════════════════════
// Budget page state
if(!window._budgetExpanded)window._budgetExpanded={};
window.toggleBudgetCat=key=>{window._budgetExpanded[key]=!window._budgetExpanded[key];_bgtRebuild();};
// Draft values: keyed by budget key (e.g. 'food', 'food__groceries', '_total')
// Populated from current S.budgets on page load, then mutated by inputs
if(!window._bgtDraft)window._bgtDraft={};
window._bgtDirty=false; // true once any input changes

// Re-render just the validation/summary without full page reload
window._bgtRebuild=()=>{renderPage();};

// Called by every input oninput
window.bgtInputChange=(key,val)=>{
  window._bgtDraft[key]=val===''?'':val;
  window._bgtDirty=true;
  _bgtUpdateLive(key);
};

// Live-update category total display when a subcat input changes,
// and show/hide the floating Save button + inline ⚠️ flags
window._bgtUpdateLive=key=>{
  const isSubcat=key.includes('__');
  const catKey=isSubcat?key.split('__')[0]:key;

  if(isSubcat){
    // Recompute category auto-total from subcat inputs
    const catEl=document.getElementById('bgt-cat-autototal-'+catKey);
    const catBgtEl=document.getElementById('bgt-inp-'+catKey);
    const catBgt=parseFloat(catBgtEl?.value||window._bgtDraft[catKey]||'')||0;
    const cats=getCats();
    const subcatEntries=Object.entries(cats[catKey]?.subcats||{});
    let subcatSum=0;
    subcatEntries.forEach(([sk])=>{
      const subKey=catKey+'__'+sk;
      const el=document.getElementById('bgt-inp-'+subKey);
      subcatSum+=parseFloat(el?.value??window._bgtDraft[subKey]??'')||0;
    });
    if(catEl){
      catEl.textContent=(subcatSum>0?'Auto: '+_bgtSym()+' '+subcatSum.toFixed(2):'');
    }
    // Flag if subcat sum > category budget
    const catFlag=document.getElementById('bgt-flag-'+catKey);
    if(catFlag){
      if(catBgt>0&&subcatSum>catBgt){
        catFlag.style.display='flex';
        catFlag.querySelector('.bgt-flag-msg').textContent='Subcategory total ('+_bgtSym()+' '+subcatSum.toFixed(2)+') exceeds category limit ('+_bgtSym()+' '+catBgt.toFixed(2)+')';
      } else { catFlag.style.display='none'; }
    }
  } else if(key!=='_total'){
    // Category budget changed — recheck against subcat sum
    const catBgt=parseFloat(document.getElementById('bgt-inp-'+key)?.value||'')||0;
    const cats=getCats();
    const subcatEntries=Object.entries(cats[key]?.subcats||{});
    let subcatSum=0;
    subcatEntries.forEach(([sk])=>{
      const subKey=key+'__'+sk;
      const el=document.getElementById('bgt-inp-'+subKey);
      subcatSum+=parseFloat(el?.value??window._bgtDraft[subKey]??'')||0;
    });
    const catFlag=document.getElementById('bgt-flag-'+key);
    if(catFlag){
      if(catBgt>0&&subcatSum>catBgt){
        catFlag.style.display='flex';
        catFlag.querySelector('.bgt-flag-msg').textContent='Subcategory total ('+_bgtSym()+' '+subcatSum.toFixed(2)+') exceeds this limit ('+_bgtSym()+' '+catBgt.toFixed(2)+')';
      } else { catFlag.style.display='none'; }
    }
  }

  // Always recheck total budget flag
  _bgtCheckTotalFlag();
  _bgtShowSaveBtn();
};

window._bgtCheckTotalFlag=()=>{
  const totalBgtEl=document.getElementById('bgt__total');
  const totalBgt=parseFloat(totalBgtEl?.value||'')||0;
  if(totalBgt<=0){const f=document.getElementById('bgt-total-flag');if(f)f.style.display='none';return;}
  const cats=getCats();
  let catSum=0;
  Object.keys(cats).filter(k=>k!=='income').forEach(key=>{
    const el=document.getElementById('bgt-inp-'+key);
    catSum+=parseFloat(el?.value??window._bgtDraft[key]??'')||0;
  });
  const flag=document.getElementById('bgt-total-flag');
  if(flag){
    if(catSum>totalBgt){
      flag.style.display='flex';
      flag.querySelector('.bgt-flag-msg').textContent='Category total ('+_bgtSym()+' '+catSum.toFixed(2)+') exceeds total budget ('+_bgtSym()+' '+totalBgt.toFixed(2)+')';
    } else { flag.style.display='none'; }
  }
};

window._bgtSym=()=>{const isAll=(S.budgetScope||'ledger')==='all';return isAll?'RM':getCur().symbol;};

window._bgtShowSaveBtn=()=>{
  const btn=document.getElementById('bgt-float-save');
  if(!btn)return;
  const hasErrors=Array.from(document.querySelectorAll('.bgt-flag')).some(el=>el.style.display==='flex');
  btn.style.display='flex';
  btn.style.opacity=hasErrors?'0.45':'1';
  btn.style.pointerEvents=hasErrors?'none':'auto';
  btn.disabled=hasErrors;
};

window.bgtSaveAll=async()=>{
  // Re-validate before save
  const hasErrors=Array.from(document.querySelectorAll('.bgt-flag')).some(el=>el.style.display==='flex');
  if(hasErrors){toast('Fix the ⚠️ issues before saving','var(--yellow)');return;}

  const isAll=(S.budgetScope||'ledger')==='all';
  const ym=S.budgetMonth;
  const dbPath=isAll?'users/'+S.user.uid+'/budgets/'+ym:'ledgers/'+S.activeLedgerId+'/budgets/'+ym;

  // Collect all current input values from DOM
  const newBudgets={};

  // Total budget input
  const totalVal=parseFloat(document.getElementById('bgt__total')?.value||'')||0;
  if(totalVal>0)newBudgets['_total']=totalVal;

  // All category + subcat inputs (skip _total, it's handled above)
  document.querySelectorAll('.bgt-any-input').forEach(inp=>{
    const bkey=inp.dataset.budgetkey;
    if(!bkey||bkey==='_total')return;
    const val=parseFloat(inp.value||'')||0;
    if(val>0)newBudgets[bkey]=val;
  });

  const btn=document.getElementById('bgt-float-save');
  try{
    if(btn){btn.disabled=true;btn.innerHTML='<span style="font-size:16px">⏳</span> Saving...';}
    // Write entire budget object atomically — one Firebase call
    await set(ref(db,dbPath),Object.keys(newBudgets).length?newBudgets:null);
    window._bgtDirty=false;
    toast('✓ Budget saved');
    // Re-render cleanly after save (draft will reload from new S.budgets)
    renderPage();
  }catch(e){
    if(btn){btn.disabled=false;btn.innerHTML='💾 Save Budget';}
    toast('Error saving: '+e.message,'var(--red)');
  }
};

function renderBudgetPage(){
  const cats=getCats();const cur=getCur();
  const ym=S.budgetMonth;
  const [yr,mo]=ym.split('-').map(Number);
  const nowYm=new Date().toISOString().slice(0,7);
  const isCurrentMonth=ym===nowYm;
  const monthLabel=new Date(yr,mo-1,1).toLocaleDateString('en-MY',{month:'long',year:'numeric'});
  if(S.totalView)S.budgetScope='all';
  const scope=S.budgetScope||'ledger';
  const isAll=scope==='all';
  const sym=isAll?'RM':cur.symbol;

  // ── Init draft from saved budgets on first load or month change ──
  const budgets=isAll?S.allBudgets:S.budgets;
  if(!window._bgtDirty){
    window._bgtDraft={};
    Object.entries(budgets||{}).forEach(([k,v])=>{window._bgtDraft[k]=v>0?String(v):'';});
  }

  // ── Compute spending ──
  let totalExp=0,catSpent={},subcatSpent={};
  const cats2=getCats();
  const catKeys=Object.keys(cats2).filter(k=>k!=='income');

  function accumulateTx(t,rate=1){
    if(t.type!=='expense'||!t.date?.startsWith(ym))return;
    const amt=(t.amount||0)*rate;
    totalExp+=amt;catSpent[t.category]=(catSpent[t.category]||0)+amt;
    if(t.subcat){const sk=t.category+'__'+t.subcat;subcatSpent[sk]=(subcatSpent[sk]||0)+amt;}
  }
  if(isAll){
    const allTxSources={...S.allLedgerTxs,[S.activeLedgerId]:S.txs||{}};
    Object.entries(allTxSources).forEach(([lid,txs])=>{
      if(S.excludedFromTotal.has(lid))return;
      const rate=(CURRENCIES[S.allLedgerCurrencies[lid]||'MYR']?.rateToMYR||1)/(CURRENCIES['MYR']?.rateToMYR||1);
      Object.values(txs||{}).forEach(t=>accumulateTx(t,rate));
    });
  }else{Object.values(S.txs||{}).forEach(t=>accumulateTx(t));}

  // ── Budget summary from draft ──
  const draftTotal=parseFloat(window._bgtDraft['_total'])||0;
  const draftCatSum=catKeys.reduce((s,k)=>s+(parseFloat(window._bgtDraft[k])||0),0);
  const effectiveTotal=draftTotal>0?draftTotal:draftCatSum;
  const totalUsedPct=effectiveTotal>0?Math.min(100,(totalExp/effectiveTotal)*100):0;
  const totalColor=totalExp>effectiveTotal?'var(--red)':totalUsedPct>80?'var(--yellow)':"var(--green)";

  // ── Validate: total flag ──
  const totalFlag=draftTotal>0&&draftCatSum>draftTotal;

  // ── Per-ledger summary ──
  const ledgerRows=isAll?Object.entries(S.ledgers).map(([lid,linfo])=>{
    if(S.excludedFromTotal.has(lid))return'';
    const rate=(CURRENCIES[S.allLedgerCurrencies[lid]||'MYR']?.rateToMYR||1)/(CURRENCIES['MYR']?.rateToMYR||1);
    const txSource=lid===S.activeLedgerId?S.txs:S.allLedgerTxs[lid];
    const lExp=Object.values(txSource||{}).filter(t=>t.type==='expense'&&t.date?.startsWith(ym)).reduce((s,t)=>s+(t.amount||0)*rate,0);
    return`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,0.03);margin-bottom:6px">
      <span style="font-size:20px">${linfo.icon||'💼'}</span>
      <span style="font-size:13px;font-weight:600;flex:1">${linfo.name||lid}</span>
      <span style="font-family:var(--font-num);font-size:13px;color:${lExp>0?'var(--red)':"var(--dim)"}">-${sym} ${lExp.toFixed(2)}</span>
    </div>`;
  }).filter(Boolean).join(''):null;

  // ── Category rows ──
  const catRows=catKeys.map(key=>{
    const c=cats2[key];
    const spent=catSpent[key]||0;

          ${isExpanded?'▲':'▼'} Subcats${subcatBudgetCount>0?` <span style="background:rgba(108,99,255,0.2);border-radius:999px;padding:1px 6px;color:var(--accent)">${subcatBudgetCount}</span>`:''}
        </button>`:''}
      </div>
      ${effectiveBgt>0?`<div class="budget-bar-track" style="margin-bottom:8px"><div class="budget-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>`:''}
      <div style="position:relative;margin-bottom:${subcatExceedsCat||hasSubcats&&isExpanded?'6':"0"}px">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--dim);font-family:var(--font-num)">${sym}</span>
        <input id="bgt-inp-${key}" data-budgetkey="${key}" type="number" inputmode="decimal" class="fw-input bgt-any-input" placeholder="No limit" value="${window._bgtDraft[key]||''}" oninput="bgtInputChange('${key}',this.value)" style="font-family:var(--font-num);padding-left:${sym.length>1?'36':"28"}px">
        <span id="bgt-cat-autototal-${key}" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--accent2);pointer-events:none">${draftSubcatSum>0?'Auto: '+sym+' '+draftSubcatSum.toFixed(2):''}</span>
      </div>
      <div id="bgt-flag-${key}" class="bgt-flag" style="display:${subcatExceedsCat?'flex':"none"};align-items:flex-start;gap:7px;padding:8px 10px;border-radius:10px;background:rgba(255,230,109,0.1);border:1px solid rgba(255,230,109,0.3);margin-bottom:6px">
        <span style="font-size:13px;flex-shrink:0">⚠️</span>
        <p class="bgt-flag-msg" style="font-size:11px;color:var(--yellow);font-weight:600;line-height:1.5">${subcatExceedsCat?`Subcategory total (${sym} ${draftSubcatSum.toFixed(2)}) exceeds category limit (${sym} ${draftBgt.toFixed(2)})`:"OK"}</p>
      </div>
      ${subcatRows}
    </div>`;
  }).join('');

  return`<div class="settings-page fade-in" style="padding-bottom:calc(120px + env(safe-area-inset-bottom))">
    <button id="budgetBackBtn" class="btn-ghost" style="margin-bottom:22px">← Back</button>

      <button id="scopeLedger" style="flex:1;padding:10px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid ${!isAll?'var(--accent)':"var(--border)"};background:${!isAll?'rgba(108,99,255,0.15)':"rgba(255,255,255,0.04)"};color:${!isAll?'var(--accent)':"var(--muted)"}">📒 This Ledger</button>
      <button id="scopeAll" style="flex:1;padding:10px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid ${isAll?'var(--accent)':"var(--border)"};background:${isAll?'rgba(108,99,255,0.15)':"rgba(255,255,255,0.04)"};color:${isAll?'var(--accent)':"var(--muted)"}">🌐 All Ledgers</button>
    </div>`:"<div style=\"margin-bottom:18px\"><div style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(108,99,255,0.12);border:1px solid rgba(108,99,255,0.25);border-radius:12px;padding:8px 14px\"><span style=\"font-size:14px\">🌐</span><span style=\"font-size:13px;font-weight:700;color:var(--accent)\">All Ledgers Budget</span></div></div>"}
    <div style="display:flex;align-items:center;justify-content:space-between;background:rgba(108,99,255,0.1);border:1px solid rgba(108,99,255,0.25);border-radius:16px;padding:12px 16px;margin-bottom:20px">
      <button id="budgetPrevBtn" style="width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.08);border:none;color:var(--text);font-size:20px;cursor:pointer">‹</button>
      <div style="text-align:center">
        <p style="font-size:15px;font-weight:700">${monthLabel}</p>
        <p style="font-size:10px;color:${isCurrentMonth?'var(--accent)':"var(--dim)"};font-weight:600;letter-spacing:0.06em">${isCurrentMonth?'CURRENT MONTH':"tap ‹ › to navigate"}</p>

    </div>
    <p style="font-size:11px;color:var(--muted);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px">${isAll?'🌐 All Ledgers — '+Object.keys(S.ledgers).length+' ledgers (in MYR)':"📒 "+(S.ledgers[S.activeLedgerId]?.name||'This Ledger')}</p>
    <div class="card" style="padding:20px;margin-bottom:20px;border-radius:18px">
      <p class="label" style="color:var(--accent2);margin-bottom:10px">Total Monthly Budget</p>

    ${catRows}

      💾 Save Budget
    </button>

}

function attachBudgetListeners(){
  const ym=S.budgetMonth;
  const isAll=S.budgetScope==='all';

  ['budgetBackBtn','budgetPrevBtn','budgetNextBtn','budgetCopyBtn','scopeLedger','scopeAll'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){const clone=el.cloneNode(true);el.parentNode.replaceChild(clone,el);}
  });

  document.getElementById('scopeLedger')?.addEventListener('click',()=>{S.budgetScope='ledger';window._bgtDirty=false;renderPage();});
  document.getElementById('scopeAll')?.addEventListener('click',()=>{
    S.budgetScope='all';window._bgtDirty=false;
    if(!S.totalView){
      Object.keys(S.ledgers).forEach(lid=>{
        if(lid===S.activeLedgerId||S.allLedgerTxs[lid])return;
        S.allLedgerTxs[lid]={};
        const rTx=ref(db,'ledgerTransactions/'+lid);
        const fnTx=s=>{S.allLedgerTxs[lid]=s.exists()?s.val():{};if(S.view==='budget')renderPage();};
        onValue(rTx,fnTx);S.totalListeners.push({r:rTx,fn:fnTx});
        const rCur=ref(db,'ledgers/'+lid+'/currency');
        const fnCur=s=>{S.allLedgerCurrencies[lid]=s.exists()?s.val():'MYR';};
        onValue(rCur,fnCur);S.totalListeners.push({r:rCur,fn:fnCur});
      });
    }
    renderPage();
  });
  document.getElementById('budgetBackBtn')?.addEventListener('click',()=>{
    window._bgtDirty=false;
    const nowYm=new Date().toISOString().slice(0,7);
    if(ym!==nowYm)switchBudgetMonth(nowYm);
    goHome('analytics');
  });
  document.getElementById('budgetPrevBtn')?.addEventListener('click',()=>{
    window._bgtDirty=false;
    const[yr2,mo2]=S.budgetMonth.split('-').map(Number);
    switchBudgetMonth(`${mo2===1?yr2-1:yr2}-${String(mo2===1?12:mo2-1).padStart(2,'0')}`);
  });
  document.getElementById('budgetNextBtn')?.addEventListener('click',()=>{
    window._bgtDirty=false;
    const[yr2,mo2]=S.budgetMonth.split('-').map(Number);
    switchBudgetMonth(`${mo2===12?yr2+1:yr2}-${String(mo2===12?1:mo2+1).padStart(2,'0')}`);
  });
  document.getElementById('budgetCopyBtn')?.addEventListener('click',async()=>{
    const[yr2,mo2]=ym.split('-').map(Number);
    const py=mo2===1?yr2-1:yr2, pm=mo2===1?12:mo2-1;
    const prevYm=`${py}-${String(pm).padStart(2,'0')}`;
    const srcPath=isAll?'users/'+S.user.uid+'/budgets/'+prevYm:'ledgers/'+S.activeLedgerId+'/budgets/'+prevYm;
    const dstPath=isAll?'users/'+S.user.uid+'/budgets/'+ym:'ledgers/'+S.activeLedgerId+'/budgets/'+ym;
    try{
      const snap=await get(ref(db,srcPath));
      if(!snap.exists()){toast('No budgets found for previous month','var(--muted)');return;}
      await set(ref(db,dstPath),snap.val());
      window._bgtDirty=false;
      toast('✓ Copied from '+new Date(py,pm-1,1).toLocaleDateString('en-MY',{month:'long',year:'numeric'}));
      renderPage();
    }catch(e){toast('Error: '+e.message,'var(--red)');}
  });
  // Run live validation once on load
  requestAnimationFrame(()=>{
    _bgtCheckTotalFlag();
    const cats=getCats();

let selGuestAv=0,selGuestColor=0;
window.pickGuestAv=i=>{selGuestAv=i;document.querySelectorAll('[id^="gav"]').forEach(b=>b.style.borderColor='transparent');const b=document.getElementById('gav'+i);if(b)b.style.borderColor='var(--accent)';};
window.pickGuestColor=i=>{selGuestColor=i;document.querySelectorAll('[id^="gc"]').forEach(d=>d.classList.remove('selected'));const d=document.getElementById('gc'+i);if(d)d.classList.add('selected');};
window.addGuest=async()=>{
  const name=document.getElementById('guestName')?.value.trim();
  const msg=document.getElementById('guestMsg');
  if(!name){if(msg){msg.style.color='var(--red)';msg.textContent='Enter a name.';}return;}
  const gid='guest_'+Date.now();
  await set(ref(db,`ledgerMembers/${S.activeLedgerId}/${gid}`),{displayName:name,avatar:AVATARS[selGuestAv],color:M_COLORS[selGuestColor],role:'guest',guest:true,joinedAt:Date.now()});
  toast('✓ '+name+' added as guest');
  if(msg){msg.style.color='var(--green)';msg.textContent='✓ Added!';}

// ── NOTIFICATIONS PAGE ──
function renderNotificationsPage(){
  const acts=buildActivities();
  const uid=S.user.uid;
  const unread=acts.filter(a=>!S.notifSeen[a.id.replace(/\./g,'_')]).length;

  // Don't auto-mark all read — user marks each by tapping

  const typeColor={
    tx_others:'rgba(108,99,255,0.15)',
    tx_own:'rgba(78,205,196,0.12)',
    settle:'rgba(105,210,160,0.12)',
    review:'rgba(105,210,160,0.08)',
  };
  const typeBorder={
    tx_others:'rgba(108,99,255,0.25)',
    tx_own:'rgba(78,205,196,0.25)',
    settle:'rgba(105,210,160,0.25)',
    review:'rgba(105,210,160,0.15)',
  };

  function timeAgo(ts){
    if(!ts)return'';
    const diff=Date.now()-ts;
    const m=Math.floor(diff/60000);
    const h=Math.floor(diff/3600000);
    const d=Math.floor(diff/86400000);
    if(m<1)return'Just now';
    if(m<60)return m+'m ago';
    if(h<24)return h+'h ago';
    if(d<7)return d+'d ago';
    return new Date(ts).toLocaleDateString('en-MY',{day:'numeric',month:'short'});
  }

  const rows=acts.length?acts.map(a=>{
    const isRead=!!S.notifSeen[a.id.replace(/\./g,'_')];
    const bg=typeColor[a.type]||'rgba(255,255,255,0.04)';
    const border=typeBorder[a.type]||'var(--border)';
    const onclick=`tapNotif('${a.id}','${a.type}','${a.txKey||''}','${a.settleKey||''}','${a.lid}')`;
    return`<div style="display:flex;gap:12px;padding:14px;border-radius:16px;background:${bg};border:1px solid ${border};margin-bottom:10px;position:relative;cursor:pointer" onclick="${onclick}">
      ${!isRead?`<div style="position:absolute;top:16px;left:12px;width:7px;height:7px;border-radius:50%;background:var(--accent)"></div>`:''}
      <div style="width:42px;height:42px;border-radius:14px;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;${!isRead?'margin-left:14px':''}">${a.avatar||a.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:2px">
          <p style="font-size:13px;font-weight:${isRead?'500':'700'};color:var(--text);line-height:1.3">${a.title}</p>
          <span style="font-size:10px;color:var(--dim);flex-shrink:0;margin-top:1px">${timeAgo(a.ts)}</span>
        </div>
        <p style="font-size:12px;color:var(--muted);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.body}</p>
        ${a.sub?`<p style="font-size:11px;color:var(--dim)">${a.sub}</p>`:''}

window.openAddGuestInline=()=>{
  const box=document.getElementById('addGuestInline');
  const btn=document.getElementById('addGuestToggleBtn');
  if(box){box.style.display='block';}
  if(btn){btn.style.display='none';}
};
window.closeAddGuestInline=()=>{
  const box=document.getElementById('addGuestInline');

  if(box){box.style.display='none';}

// ── SAVE LEDGER NAME ──
window.saveLedgerName=async()=>{
  const inp=document.getElementById('ledgerNameInput');
  if(!inp)return;
  const name=inp.value.trim();
  if(!name){toast('Enter a name','var(--red)');return;}
  const lid=S.activeLedgerId;
  await update(ref(db,'ledgers/'+lid),{name});
  if(S.ledgers[lid])S.ledgers[lid].name=name;
  await update(ref(db,'userLedgers/'+S.user.uid+'/'+lid),{name});
  toast('✓ Ledger name updated');
};

window.openLedgerIconModal=()=>{
  const lid=S.activeLedgerId;
  const curIcon=S.ledgers[lid]?.icon||'🏠';
  const curIdx=LEDGER_ICONS.indexOf(curIcon);
  window._selLedgerIcon=curIdx>=0?curIdx:0;
  const iconBtns=LEDGER_ICONS.map((ic,i)=>`<button onclick="pickLedgerIconModal(${i})" id="lim${i}" style="width:48px;height:48px;border-radius:13px;font-size:24px;background:rgba(255,255,255,0.06);border:2px solid ${i===(curIdx>=0?curIdx:0)?'var(--accent)':'transparent'};transition:all 0.15s">${ic}</button>`).join('');
  const modal=document.getElementById('modalContainer');
  modal.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p style="font-size:18px;font-weight:700;margin-bottom:6px">Ledger Icon</p>
      <p style="font-size:13px;color:var(--muted);margin-bottom:18px">Choose an icon for this ledger</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-start;margin-bottom:24px">${iconBtns}</div>
      <button class="btn-primary" style="padding:14px" onclick="saveLedgerIcon()">Save Icon</button>
    </div>
  </div>`;
};

window.pickLedgerIconModal=i=>{
  window._selLedgerIcon=i;
  document.querySelectorAll('[id^="lim"]').forEach(b=>b.style.borderColor='transparent');
  const b=document.getElementById('lim'+i);if(b)b.style.borderColor='var(--accent)';
};

window.saveLedgerIcon=async()=>{
  const i=window._selLedgerIcon??0;
  const icon=LEDGER_ICONS[i];
  const lid=S.activeLedgerId;
  await update(ref(db,'ledgers/'+lid),{icon});
  await update(ref(db,'userLedgers/'+S.user.uid+'/'+lid),{icon});
  if(S.ledgers[lid])S.ledgers[lid].icon=icon;
  window._selLedgerIcon=null;
  toast('✓ Icon updated');
  closeModal();
  // update both the settings preview and the home header icon
  const btn=document.getElementById('ledgerIconBtn');if(btn)btn.textContent=icon;
  const hdr=document.getElementById('headerLedgerIcon');if(hdr)hdr.textContent=icon;
};

window.openEditGuest=(id,currentName,currentAvatar,currentColor)=>{
  let editAv=AVATARS.indexOf(currentAvatar);if(editAv<0)editAv=0;
  let editCol=M_COLORS.indexOf(currentColor);if(editCol<0)editCol=0;
  const avBtns=AVATARS.map((a,i)=>`<button onclick="pickEditGuestAv(${i},'eg')" id="eg${i}" style="width:42px;height:42px;border-radius:12px;font-size:22px;background:rgba(255,255,255,0.06);border:2px solid ${i===editAv?'var(--accent)':'transparent'};transition:all 0.15s">${a}</button>`).join('');
  const colDots=M_COLORS.map((col,i)=>`<div onclick="pickEditGuestColor(${i},'egc')" id="egc${i}" class="color-dot ${i===editCol?'selected':''}" style="background:${col}"></div>`).join('');
  window._editGuestAv=editAv;window._editGuestCol=editCol;
  const modal=document.getElementById('modalContainer');
  modal.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p style="font-size:18px;font-weight:700;margin-bottom:18px">Edit Guest Member</p>
      <div style="margin-bottom:12px"><p class="label" style="margin-bottom:8px">Name</p>

      <div style="margin-bottom:12px"><p class="label" style="margin-bottom:10px">Avatar</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${avBtns}</div></div>
      <div style="margin-bottom:18px"><p class="label" style="margin-bottom:10px">Color</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${colDots}</div></div>
      <button class="btn-primary" style="padding:14px" onclick="saveEditGuest('${id}')">Save Changes</button>
    </div>
  </div>`;
};
window.pickEditGuestAv=(i,prefix)=>{window._editGuestAv=i;document.querySelectorAll('[id^="'+prefix+'"]').forEach(b=>{if(b.tagName==='BUTTON')b.style.borderColor='transparent';});const b=document.getElementById(prefix+i);if(b)b.style.borderColor='var(--accent)';};
window.pickEditGuestColor=(i,prefix)=>{window._editGuestCol=i;document.querySelectorAll('[id^="'+prefix+'"]').forEach(d=>{if(d.classList.contains('color-dot'))d.classList.remove('selected');});const d=document.getElementById(prefix+i);if(d)d.classList.add('selected');};
window.saveEditGuest=async(id)=>{
  const name=document.getElementById('editGuestNameInp')?.value.trim();
  if(!name){toast('Enter a name','var(--red)');return;}
  await update(ref(db,`ledgerMembers/${S.activeLedgerId}/${id}`),{displayName:name,avatar:AVATARS[window._editGuestAv||0],color:M_COLORS[window._editGuestCol||0]});
  toast('✓ Guest updated');
  closeModal();
};

function applyColorMode(mode){
  document.documentElement.classList.toggle('light',mode==='light');
  // Update theme-color meta for browser chrome
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.content=mode==='light'?'#F4F4FA':'#0A0A14';
}

function applyUiStyle(style){
  const root=document.documentElement;
  // Remove all ui style classes first
  root.classList.remove('ui-paper-white','ui-warm-cream','ui-cool-slate');
  if(style==='paper-white'){root.classList.add('ui-paper-white');root.classList.add('light');}
  else if(style==='warm-cream'){root.classList.add('ui-warm-cream');root.classList.add('light');}
  else if(style==='cool-slate'){root.classList.add('ui-cool-slate');root.classList.add('light');}
  // For 'original' style, just restore the user's colorMode preference
  if(style==='original'){applyColorMode(S.colorMode||'dark');}
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta){
    if(style==='paper-white')meta.content='#F7F7F5';
    else if(style==='warm-cream')meta.content='#FAF8F3';
    else if(style==='cool-slate')meta.content='#F2F4F7';
  }
}

window.setUiStyle=async style=>{
  S.uiStyle=style;
  applyUiStyle(style);
  try{await set(ref(db,'users/'+S.user.uid+'/preferences/uiStyle'),style);}
  catch(e){console.warn('uiStyle save:',e);}
  renderPage();
};

function applyFontStyle(style){
  const root=document.documentElement;
  root.classList.remove('font-tally','font-rounded','font-modern','font-combifi','font-tallyai');
  if(style==='tally')root.classList.add('font-tally');
  else if(style==='rounded')root.classList.add('font-rounded');
  else if(style==='modern')root.classList.add('font-modern');
  else if(style==='combifi')root.classList.add('font-combifi');
  else if(style==='tallyai')root.classList.add('font-tallyai');
  // 'original' = no class added, uses default Sora + DM Mono
}

window.setFontStyle=async style=>{

// ── Generic crop helpers ──
function _drawIconCrop(ns,canvas,img,zoom,offX,offY){
  if(!canvas||!img)return;
  const ctx=canvas.getContext('2d');const S2=canvas.width||200;
  ctx.clearRect(0,0,S2,S2);
  for(let r=0;r<S2;r+=10)for(let c=0;c<S2;c+=10){ctx.fillStyle=((r+c)/10)%2===0?'#333':'#444';ctx.fillRect(c,r,10,10);}
  ctx.drawImage(img,offX,offY,img.naturalWidth*zoom,img.naturalHeight*zoom);
  ctx.save();ctx.beginPath();ctx.rect(0,0,S2,S2);ctx.arc(S2/2,S2/2,S2/2,0,Math.PI*2,true);ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fill();ctx.restore();
  ctx.beginPath();ctx.arc(S2/2,S2/2,S2/2-2,0,Math.PI*2);ctx.strokeStyle='rgba(108,99,255,0.8)';ctx.lineWidth=2;ctx.stroke();
}
function _clampIconCrop(img,zoom,offX,offY,S2=200){
  if(!img)return{offX,offY};
  const iw=img.naturalWidth*zoom,ih=img.naturalHeight*zoom;
  return{offX:Math.min(0,Math.max(S2-iw,offX)),offY:Math.min(0,Math.max(S2-ih,offY))};
}
function _attachIconCropListeners(ns,getState,setState){
  const canvas=document.getElementById(ns+'CropCanvas');
  if(!canvas||canvas._listenersAttached)return;
  canvas._listenersAttached=true;
  canvas.addEventListener('mousedown',e=>{setState({dragging:true,lastX:e.clientX,lastY:e.clientY});canvas.style.cursor='grabbing';});
  window.addEventListener('mousemove',e=>{
    const st=getState();if(!st.dragging)return;
    const r=_clampIconCrop(st.img,st.zoom,st.offX+(e.clientX-st.lastX),st.offY+(e.clientY-st.lastY));
    setState({...r,lastX:e.clientX,lastY:e.clientY});_drawIconCrop(ns,canvas,st.img,st.zoom,r.offX,r.offY);
  });
  window.addEventListener('mouseup',()=>{setState({dragging:false});const c=document.getElementById(ns+'CropCanvas');if(c)c.style.cursor='grab';});
  canvas.addEventListener('wheel',e=>{
    e.preventDefault();const st=getState();const z=Math.max(0.5,Math.min(4,st.zoom+(e.deltaY>0?-0.1:0.1)));
    const r=_clampIconCrop(st.img,z,st.offX,st.offY,canvas.width||200);setState({zoom:z,...r});
    const sl=document.getElementById(ns+'CropZoom');if(sl)sl.value=z;
    _drawIconCrop(ns,canvas,st.img,z,r.offX,r.offY);
  },{passive:false});
  canvas.addEventListener('touchstart',e=>{
    if(e.touches.length===1){setState({dragging:true,lastX:e.touches[0].clientX,lastY:e.touches[0].clientY});}
    else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;setState({lastDist:Math.hypot(dx,dy)});}
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchmove',e=>{
    const st=getState();
    if(e.touches.length===1&&st.dragging){const r=_clampIconCrop(st.img,st.zoom,st.offX+(e.touches[0].clientX-st.lastX),st.offY+(e.touches[0].clientY-st.lastY));setState({...r,lastX:e.touches[0].clientX,lastY:e.touches[0].clientY});_drawIconCrop(ns,canvas,st.img,st.zoom,r.offX,r.offY);}
    else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const dist=Math.hypot(dx,dy);const z=Math.max(0.5,Math.min(4,st.zoom*(dist/(st.lastDist||dist))));const r=_clampIconCrop(st.img,z,st.offX,st.offY);setState({zoom:z,...r,lastDist:dist});const sl=document.getElementById(ns+'CropZoom');if(sl)sl.value=z;_drawIconCrop(ns,canvas,st.img,z,r.offX,r.offY);}
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchend',()=>setState({dragging:false}));
}
